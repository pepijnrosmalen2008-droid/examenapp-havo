<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slagio — Admin Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800;12..96,900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07080f;--card:#111827;--card2:#151e2d;
      --or:#f97316;--or-rgb:249,115,22;
      --text:#e4e8ef;--muted:rgba(255,255,255,.42);--border:rgba(255,255,255,.07);
      --green:#22c55e;--green-rgb:34,197,94;
      --blue:#60a5fa;--blue-rgb:96,165,250;
      --purple:#a78bfa;--purple-rgb:167,139,250;
      --red:#ef4444;--red-rgb:239,68,68;
      --teal:#14b8a6;--teal-rgb:20,184,166;
      --yellow:#fbbf24;--yellow-rgb:251,191,36;
      --font:'Inter',sans-serif;--font-head:'Bricolage Grotesque','Inter',sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{-webkit-font-smoothing:antialiased}
    body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

    /* ── Login ── */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#07080f,#0d0e1c);padding:2rem}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6)}
    .login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.75rem}
    .login-logo img{width:36px;height:36px;border-radius:10px}
    .login-logo-name{font-family:var(--font-head);font-weight:800;font-size:20px}
    .login-dot{width:7px;height:7px;border-radius:50%;background:var(--or);box-shadow:0 0 0 3px rgba(var(--or-rgb),.22);animation:ldot 3s ease-in-out infinite}
    @keyframes ldot{0%,100%{box-shadow:0 0 0 3px rgba(var(--or-rgb),.22)}50%{box-shadow:0 0 0 6px rgba(var(--or-rgb),.1)}}
    .login-h{font-family:var(--font-head);font-size:1.25rem;font-weight:800;margin-bottom:.35rem}
    .login-sub{color:var(--muted);font-size:.82rem;margin-bottom:1.75rem}
    .login-input{width:100%;padding:.85rem 1rem;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color .2s;margin-bottom:.75rem}
    .login-input:focus{border-color:rgba(var(--or-rgb),.5)}
    .login-btn{width:100%;padding:.9rem;background:var(--or);color:#fff;border:none;border-radius:12px;font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(var(--or-rgb),.4);transition:opacity .2s}
    .login-btn:hover{opacity:.9}
    .login-err{color:var(--red);font-size:.8rem;margin-top:.55rem;min-height:1.2em}

    /* ── Shell ── */
    #dashboard{display:none}
    .topbar{height:54px;display:flex;align-items:center;gap:10px;padding:0 1.25rem;border-bottom:1px solid var(--border);background:rgba(7,8,15,.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
    .topbar img{width:26px;height:26px;border-radius:7px}
    .topbar-name{font-family:var(--font-head);font-weight:800;font-size:15px}
    .live-chip{font-size:10.5px;font-weight:700;padding:.2rem .55rem;background:rgba(var(--green-rgb),.14);color:var(--green);border:1px solid rgba(var(--green-rgb),.28);border-radius:999px}
    .topbar-time{margin-left:auto;color:var(--muted);font-size:11.5px;font-family:monospace}
    .tb-btn{padding:.32rem .7rem;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted)}
    .tb-btn:hover{border-color:rgba(var(--or-rgb),.4);color:var(--or)}
    .tb-btn.danger{border-color:rgba(var(--red-rgb),.25);color:rgba(var(--red-rgb),.65)}
    .tb-btn.danger:hover{background:rgba(var(--red-rgb),.1);color:var(--red)}

    .body{max-width:1240px;margin:0 auto;padding:1.25rem 1rem 3rem}

    /* ── Section header ── */
    .sec{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(var(--or-rgb),.75);margin:1.75rem 0 .8rem;display:flex;align-items:center;gap:.5rem}
    .sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(var(--or-rgb),.3),transparent)}

    /* ── KPI grid ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.6rem}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:1rem 1.1rem;position:relative;overflow:hidden}
    .kpi::before{content:'';position:absolute;top:-25px;right:-25px;width:70px;height:70px;border-radius:50%;opacity:.2;pointer-events:none}
    .kpi.c-or::before{background:radial-gradient(circle,var(--or),transparent)}
    .kpi.c-gr::before{background:radial-gradient(circle,var(--green),transparent)}
    .kpi.c-bl::before{background:radial-gradient(circle,var(--blue),transparent)}
    .kpi.c-pu::before{background:radial-gradient(circle,var(--purple),transparent)}
    .kpi.c-tl::before{background:radial-gradient(circle,var(--teal),transparent)}
    .kpi.c-yw::before{background:radial-gradient(circle,var(--yellow),transparent)}
    .kpi-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:.45rem}
    .kpi-val{font-family:var(--font-head);font-size:1.9rem;font-weight:800;line-height:1;color:#fff;margin-bottom:.25rem}
    .kpi-sub{font-size:.75rem;color:var(--muted)}
    .kpi-delta{font-size:.72rem;font-weight:700;padding:.1rem .4rem;border-radius:999px;margin-left:.35rem}
    .kpi-delta.up{background:rgba(var(--green-rgb),.14);color:var(--green)}
    .kpi-delta.dn{background:rgba(var(--red-rgb),.14);color:var(--red)}

    /* ── Panel ── */
    .panel{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:1.1rem 1.2rem}
    .panel-h{font-family:var(--font-head);font-size:.9rem;font-weight:800;color:#fff;margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}
    .panel-h span{color:var(--muted);font-weight:400;font-family:var(--font);font-size:.78rem}

    /* ── Bar chart ── */
    .bar-wrap{display:flex;align-items:flex-end;gap:2px;height:100px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
    .bar-bar{width:100%;border-radius:2px 2px 0 0;background:rgba(var(--or-rgb),.5);min-height:2px;transition:background .15s}
    .bar-bar:hover,.bar-col:hover .bar-bar{background:var(--or)}
    .bar-lbl{font-size:7.5px;color:var(--muted);line-height:1}
    .bar-num{font-size:8.5px;font-weight:700;color:var(--muted)}

    /* ── Feature usage bars ── */
    .feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
    @media(max-width:700px){.feat-grid{grid-template-columns:1fr}}
    .feat-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:11px;padding:.85rem 1rem;display:flex;align-items:center;gap:.85rem}
    .feat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .feat-body{flex:1;min-width:0}
    .feat-name{font-size:.82rem;font-weight:700;color:#fff;margin-bottom:.3rem}
    .feat-bar-bg{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
    .feat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
    .feat-stats{display:flex;justify-content:space-between;margin-top:.3rem}
    .feat-count{font-family:var(--font-head);font-size:1.1rem;font-weight:800;color:#fff;line-height:1}
    .feat-pct{font-size:.72rem;color:var(--muted)}

    /* ── Two/three column rows ── */
    .row-2{display:grid;grid-template-columns:3fr 2fr;gap:.6rem}
    .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem}
    @media(max-width:900px){.row-2,.row-3{grid-template-columns:1fr}}

    /* ── Table ── */
    .t{width:100%;border-collapse:collapse;font-size:.8rem}
    .t th{text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:.35rem .5rem .6rem;font-weight:700;border-bottom:1px solid var(--border)}
    .t td{padding:.5rem .5rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
    .t tr:last-child td{border-bottom:none}
    .t tr:hover td{background:rgba(255,255,255,.02)}
    .rank{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:5px;font-size:9.5px;font-weight:800;background:rgba(255,255,255,.07);color:var(--muted)}
    .rank.g{background:rgba(251,191,36,.14);color:#fbbf24}
    .rank.s{background:rgba(200,200,200,.13);color:#d1d5db}
    .rank.b{background:rgba(180,120,80,.13);color:#cd7c54}
    .pill{display:inline-block;font-size:.65rem;font-weight:700;padding:.12rem .45rem;border-radius:999px}
    .pill.havo{background:rgba(var(--or-rgb),.12);color:var(--or);border:1px solid rgba(var(--or-rgb),.22)}
    .pill.vwo{background:rgba(var(--purple-rgb),.12);color:var(--purple);border:1px solid rgba(var(--purple-rgb),.22)}
    .sbar{display:flex;align-items:center;gap:.4rem}
    .sbar-bg{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
    .sbar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--or),#fbbf24)}

    /* ── Feed ── */
    .feed{display:flex;flex-direction:column;gap:.35rem;max-height:260px;overflow-y:auto}
    .feed::-webkit-scrollbar{width:3px}
    .feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .feed-row{display:flex;align-items:flex-start;gap:.55rem;padding:.45rem .55rem;background:rgba(255,255,255,.025);border-radius:8px}
    .feed-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
    .feed-dot.fresh{background:var(--green);box-shadow:0 0 0 3px rgba(var(--green-rgb),.18)}
    .feed-dot.old{background:rgba(255,255,255,.18)}
    .feed-main{flex:1;min-width:0}
    .feed-name{font-weight:700;font-size:.8rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
    .feed-detail{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .feed-time{font-size:.68rem;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-top:1px}

    /* ── Heatmap ── */
    .heatmap{display:flex;flex-wrap:wrap;gap:3px}
    .hm-c{width:11px;height:11px;border-radius:2px;background:rgba(255,255,255,.055);cursor:default;transition:transform .1s}
    .hm-c:hover{transform:scale(1.35)}
    .hm-c.l1{background:rgba(var(--or-rgb),.18)}
    .hm-c.l2{background:rgba(var(--or-rgb),.38)}
    .hm-c.l3{background:rgba(var(--or-rgb),.62)}
    .hm-c.l4{background:var(--or)}

    /* ── Misc ── */
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--or);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{text-align:center;padding:3rem;color:var(--muted)}
    .sql-box{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;font-family:monospace;font-size:.75rem;color:#94a3b8;white-space:pre-wrap;line-height:1.7;margin-top:.5rem}
    .warn-banner{background:rgba(var(--yellow-rgb),.07);border:1px solid rgba(var(--yellow-rgb),.25);border-radius:11px;padding:.85rem 1.1rem;font-size:.82rem;color:rgba(var(--yellow-rgb),.9);display:flex;gap:.7rem;align-items:flex-start}

    /* ── Time filter ── */
    .filter-bar{display:flex;gap:.4rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
    .filter-lbl{font-size:.72rem;color:var(--muted);margin-right:.15rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
    .filter-btn{padding:.28rem .75rem;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:var(--font)}
    .filter-btn:hover{border-color:rgba(var(--or-rgb),.35);color:var(--text)}
    .filter-btn.active{background:rgba(var(--or-rgb),.12);border-color:rgba(var(--or-rgb),.4);color:var(--or)}
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="/icon-192.png" alt="Slagio">
      <span class="login-logo-name">Slagio</span>
      <span class="login-dot"></span>
    </div>
    <div class="login-h">Admin Dashboard</div>
    <p class="login-sub">Alleen voor beheerders — toegang beperkt</p>
    <input type="password" id="pw" class="login-input" placeholder="Wachtwoord" autocomplete="current-password">
    <button class="login-btn" id="login-btn">Inloggen →</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <img src="/icon-192.png" alt="">
    <span class="topbar-name">Slagio Analytics</span>
    <span class="live-chip">● Live</span>
    <span class="topbar-time" id="clock"></span>
    <button class="tb-btn" onclick="loadAll()">↺ Vernieuwen</button>
    <button class="tb-btn danger" onclick="logout()">Uitloggen</button>
  </div>

  <div class="body">
    <div id="content"><div class="loading"><span class="spinner"></span><br><br>Data laden…</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.1/dist/umd/supabase.js" crossorigin="anonymous"></script>
<script>
const SB = window.supabase.createClient(
  'https://sxrjdssmgwwygtskovyc.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4cmpkc3NtZ3d3eWd0c2tvdnljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTEwNDAsImV4cCI6MjA4OTI2NzA0MH0.iML8S6I6wZ9zGUDBZJleyFHlpPYmUvdGyNyDSYcxon4'
);

const PW_HASH = '757eca20d189652b56f40345e30424c150f147099692ba7e1614261809b5b250';
const SK = 'slagio_admin_v2';

async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('');
}
const authed = () => sessionStorage.getItem(SK) === '1';
function logout() { sessionStorage.removeItem(SK); location.reload(); }

document.getElementById('login-btn').onclick = doLogin;
document.getElementById('pw').onkeydown = e => { if (e.key === 'Enter') doLogin(); };

async function doLogin() {
  const h = await sha256(document.getElementById('pw').value);
  if (h === PW_HASH) {
    sessionStorage.setItem(SK, '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    init();
  } else {
    const el = document.getElementById('login-err');
    el.textContent = 'Onjuist wachtwoord';
    document.getElementById('pw').value = '';
    setTimeout(() => el.textContent = '', 3000);
  }
}
if (authed()) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  init();
}

window._filter = window._filter || 'all';
function init() { startClock(); loadAll(); }

function startClock() {
  const tick = () => document.getElementById('clock').textContent =
    new Date().toLocaleString('nl-NL', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  tick(); setInterval(tick, 1000);
}

async function loadAll() {
  try {
    const [lbRes, evRes, aoRes] = await Promise.all([
      SB.from('leaderboard').select('user_id,naam,score,vak_naam,domein_naam,niveau,correct,total,avg_tijd,created_at').order('created_at',{ascending:false}).limit(1000),
      SB.from('events').select('naam,event_type,vak_naam,niveau,meta,created_at').order('created_at',{ascending:false}).limit(2000),
      SB.from('events').select('meta,niveau,created_at').eq('event_type','app_open').order('created_at',{ascending:false}).limit(5000)
    ]);
    const lb = (lbRes.data || []).filter(e => (e.score||0) <= 1000);
    const ev = evRes.data || [];
    const ao = aoRes.data || [];
    const evMissing = !!evRes.error;
    window._lb = lb; window._ev = ev; window._evMissing = evMissing; window._ao = ao;
    render(lb, ev, evMissing, ao);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="loading" style="color:var(--red)">Laad-fout: ${e.message}</div>`;
  }
}

function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  if (ms < 60000) return 'nu';
  if (ms < 3600000) return Math.floor(ms/60000) + 'm';
  if (ms < 86400000) return Math.floor(ms/3600000) + 'u';
  return Math.floor(ms/86400000) + 'd';
}

function render(lb, ev, evMissing, ao=[]) {
  // Apply time filter
  const filterMs = window._filter==='24h'?86400000:window._filter==='7d'?7*86400000:null;
  if (filterMs) {
    const cutoff = new Date(Date.now()-filterMs).toISOString();
    lb = lb.filter(e=>e.created_at>=cutoff);
    ev = ev.filter(e=>e.created_at>=cutoff);
    ao = ao.filter(e=>e.created_at>=cutoff);
  }

  const now = Date.now();
  const today = new Date().toISOString().slice(0,10);
  const yest  = new Date(now-86400000).toISOString().slice(0,10);
  const w7    = new Date(now-7*86400000).toISOString().slice(0,10);
  const m30   = new Date(now-30*86400000).toISOString().slice(0,10);

  // ── Leaderboard metrics ──
  const totalSess = lb.length;
  const uniqueU   = new Set(lb.map(e=>e.naam).filter(Boolean)).size;
  const todaySess = lb.filter(e=>e.created_at?.slice(0,10)===today).length;
  const yesterSess= lb.filter(e=>e.created_at?.slice(0,10)===yest).length;
  const weekSess  = lb.filter(e=>e.created_at?.slice(0,10)>=w7).length;
  const weekU     = new Set(lb.filter(e=>e.created_at?.slice(0,10)>=w7).map(e=>e.naam)).size;
  const monthSess = lb.filter(e=>e.created_at?.slice(0,10)>=m30).length;
  const avgScore  = lb.length ? Math.round(lb.reduce((s,e)=>s+(e.score||0),0)/lb.length) : 0;
  const accEntries= lb.filter(e=>e.total>0);
  const avgAcc    = accEntries.length ? Math.round(accEntries.reduce((s,e)=>s+e.correct/e.total,0)/accEntries.length*100) : 0;
  const havo      = lb.filter(e=>e.niveau==='havo').length;
  const vwo       = lb.filter(e=>e.niveau==='vwo').length;
  const dayDelta  = yesterSess>0 ? Math.round((todaySess-yesterSess)/yesterSess*100) : null;

  // ── Sessions per day last 40 ──
  const dayMap = {};
  lb.forEach(e=>{ const d=e.created_at?.slice(0,10); if(d) dayMap[d]=(dayMap[d]||0)+1; });
  const last40 = [];
  for (let i=39;i>=0;i--) {
    const d = new Date(now-i*86400000).toISOString().slice(0,10);
    last40.push({date:d, count:dayMap[d]||0});
  }
  const maxDay = Math.max(...last40.map(d=>d.count),1);

  // ── Top subjects ──
  const vakMap = {};
  lb.forEach(e=>{ const v=e.vak_naam||'?'; vakMap[v]=(vakMap[v]||0)+1; });
  const topVak = Object.entries(vakMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // ── Top users ──
  const uMap = {};
  lb.forEach(e=>{
    const n=e.naam||'Anoniem';
    if(!uMap[n]) uMap[n]={s:0,best:0,vakken:new Set(),last:e.created_at?.slice(0,10)};
    uMap[n].s++;
    if((e.score||0)>uMap[n].best) uMap[n].best=e.score;
    if(e.vak_naam) uMap[n].vakken.add(e.vak_naam);
  });
  const topU = Object.entries(uMap).sort((a,b)=>b[1].s-a[1].s).slice(0,12);

  // ── Event metrics ──
  const FEAT = [
    {key:'flashcard',       label:'Flashcards',      icon:'🃏', color:'var(--blue)'},
    {key:'simulatietoets',  label:'Simulatietoetsen',icon:'📋', color:'var(--purple)'},
    {key:'oud_examen_pdf',  label:'Oud examen (PDF)', icon:'📄', color:'var(--teal)'},
    {key:'oud_examen_quiz', label:'Oud examen (quiz)',icon:'📝', color:'var(--green)'},

      <div class="panel-h">Alle quiz-sessies <span>${lb.length} records · meest recent eerst</span></div>
      <table class="t">
        <thead><tr><th>Datum</th><th>Naam</th><th>Niveau</th><th>Vak</th><th>Domein</th><th>Score</th><th>Goed/Tot</th><th>Gem.tijd</th></tr></thead>
        <tbody>
          ${lb.map(e=>`<tr>
            <td style="color:var(--muted);font-family:monospace;font-size:.7rem">${e.created_at?.slice(0,16).replace('T',' ')}</td>
            <td style="font-weight:600">${e.naam||'—'}</td>
            <td><span class="pill ${e.niveau||''}">${(e.niveau||'').toUpperCase()}</span></td>
            <td>${e.vak_naam||'—'}</td>
            <td style="color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.domein_naam||'—'}</td>
            <td><div class="sbar"><div class="sbar-bg"><div class="sbar-fill" style="width:${(e.score||0)/10}%"></div></div><span style="font-weight:700;min-width:2.2rem;text-align:right">${e.score}</span></div></td>
            <td style="color:${e.correct===e.total&&e.total>0?'var(--green)':'var(--muted)'}">${e.correct??'—'}/${e.total??'—'}</td>
            <td style="color:var(--muted);font-family:monospace">${e.avg_tijd?e.avg_tijd.toFixed(1)+'s':'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;

  clearTimeout(window._rt);
  window._rt = setTimeout(loadAll, 60000);
}
</script>
</body>
</html>
