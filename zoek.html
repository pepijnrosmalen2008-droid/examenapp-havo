<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slagio Zoeken — doorzoek alle examens, begrippen & uitleg</title>
<meta name="robots" content="noindex"><!-- prototype: nog niet indexeren -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090b12;--bg2:#0c0e17;--surface:rgba(255,255,255,.045);--surface-2:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.09);--ink:#eef0f7;--mut:#8a94a6;--or:#e8580c;--or-rgb:232,88,12;
  --gold:#fbbf24;--radius:18px;--ease:cubic-bezier(.16,1,.3,1);
  --exam:#e8580c;--begrip:#38bdf8;--uitleg:#a78bfa;--oefen:#22c55e;
  --font:'Inter',system-ui,sans-serif;--head:'Bricolage Grotesque',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(900px 500px at 50% -140px,rgba(var(--or-rgb),.12),transparent 60%),
    radial-gradient(700px 600px at 88% 4%,rgba(167,139,250,.06),transparent 55%),
    linear-gradient(180deg,#090b12,#0b0d16 42%,#080a11);
  min-height:100vh;background-attachment:fixed}
.wrap{max-width:820px;margin:0 auto;padding:0 20px}

/* Header */
.top{padding:38px 0 8px;text-align:center}
.brand{display:inline-flex;align-items:center;gap:9px;font-family:var(--head);font-weight:800;font-size:17px;letter-spacing:-.3px;margin-bottom:22px;opacity:.9}
.brand-logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(140deg,#ff8a3d,var(--or));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px}
h1{font-family:var(--head);font-weight:800;font-size:clamp(26px,5vw,40px);letter-spacing:-1px;line-height:1.08;text-wrap:balance;margin-bottom:10px}
h1 em{font-style:normal;color:var(--or)}
.sub{color:var(--mut);font-size:15px;max-width:440px;margin:0 auto 26px}

/* Search box */
.search{position:sticky;top:14px;z-index:20;margin-bottom:14px}
.search-inner{position:relative;display:flex;align-items:center;
  background:rgba(12,14,23,.86);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--line);border-radius:16px;padding:0 16px;height:60px;
  box-shadow:0 20px 50px -24px rgba(0,0,0,.85),0 0 0 1px rgba(var(--or-rgb),0) inset;
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease)}
.search-inner:focus-within{border-color:rgba(var(--or-rgb),.5);
  box-shadow:0 20px 50px -20px rgba(0,0,0,.85),0 0 0 1px rgba(var(--or-rgb),.35),0 0 40px -8px rgba(var(--or-rgb),.3)}
.search-inner svg{width:22px;height:22px;stroke:var(--mut);flex-shrink:0;transition:stroke .25s}
.search-inner:focus-within svg{stroke:var(--or)}
#q{flex:1;border:none;outline:none;background:none;color:var(--ink);font:600 17px/1 var(--font);padding:0 12px;height:100%}
#q::placeholder{color:var(--mut);font-weight:500}
.clr{border:none;background:rgba(255,255,255,.07);color:var(--mut);width:28px;height:28px;border-radius:8px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.clr:hover{background:rgba(255,255,255,.14);color:var(--ink)}
.clr.on{display:flex}

/* Suggestion chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:30px}
.chip{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:20px;
  padding:7px 15px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s var(--ease)}
.chip:hover{border-color:rgba(var(--or-rgb),.45);background:rgba(var(--or-rgb),.1);transform:translateY(-1px)}
.chip small{color:var(--mut);font-weight:500;margin-left:4px}

/* Tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none;margin-bottom:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{border:1px solid var(--line);background:var(--surface);color:var(--mut);border-radius:12px;
  padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;
  display:inline-flex;align-items:center;gap:7px;transition:all .2s var(--ease)}
.tab .cnt{font-variant-numeric:tabular-nums;background:rgba(255,255,255,.08);border-radius:20px;padding:1px 7px;font-size:11px;color:var(--ink)}
.tab.on{color:var(--ink);border-color:rgba(var(--or-rgb),.5);background:rgba(var(--or-rgb),.12)}
.tab.on .cnt{background:rgba(var(--or-rgb),.3)}
.tab .dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}

/* Results */
#stats{color:var(--mut);font-size:13px;margin:2px 0 14px;font-weight:500}
#stats b{color:var(--ink);font-weight:700}
.res{display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 14px 34px -22px rgba(0,0,0,.7);
  transition:transform .2s var(--ease),border-color .2s var(--ease),box-shadow .2s var(--ease);cursor:default}
.card:hover{border-color:var(--surface-2);transform:translateY(-1px);box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 18px 40px -20px rgba(0,0,0,.8)}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.badge{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:7px;display:inline-flex;align-items:center;gap:5px}
.badge .dot{width:7px;height:7px;border-radius:2px}
.b-exam{color:#ffb488;background:rgba(232,88,12,.14)}
.b-begrip{color:#8fd6ff;background:rgba(56,189,248,.14)}
.b-uitleg{color:#c9b6ff;background:rgba(167,139,250,.14)}
.b-oefen{color:#86efac;background:rgba(34,197,94,.14)}
.meta{font-size:12px;color:var(--mut);font-weight:500;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.meta .sep{opacity:.4}
.q{font-size:15px;font-weight:600;color:var(--ink);line-height:1.5;margin-bottom:2px}
.ctx{font-size:13px;color:var(--mut);line-height:1.55;margin-bottom:8px}
mark{background:rgba(var(--or-rgb),.28);color:#ffd9c2;border-radius:3px;padding:0 2px;font-weight:700}
.ans{margin-top:9px}
.ans-toggle{border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--mut);border-radius:9px;
  padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.ans-toggle:hover{border-color:rgba(34,197,94,.4);color:#86efac}
.ans-toggle svg{width:13px;height:13px;stroke:currentColor;transition:transform .25s}
.ans-body{display:none;margin-top:9px;padding:11px 13px;border-radius:11px;background:rgba(34,197,94,.07);
  border:1px solid rgba(34,197,94,.18);font-size:13.5px;line-height:1.6;color:#d6f5e0}
.ans.open .ans-body{display:block;animation:fade .28s var(--ease)}
.ans.open .ans-toggle svg{transform:rotate(180deg)}
@keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.begrip-title{font-family:var(--head);font-weight:700;font-size:16px}

/* Empty / loading */
.state{text-align:center;padding:50px 20px;color:var(--mut)}
.state svg{width:44px;height:44px;stroke:var(--mut);opacity:.5;margin-bottom:14px}
.state h3{font-family:var(--head);font-weight:700;font-size:18px;color:var(--ink);margin-bottom:6px}
.more{text-align:center;margin-top:6px}
.more button{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.more button:hover{border-color:rgba(var(--or-rgb),.45);background:rgba(var(--or-rgb),.1)}
.foot{text-align:center;color:var(--mut);font-size:12px;padding:24px 0 40px;opacity:.7}
.foot a{color:var(--or);text-decoration:none}
@media(max-width:560px){.top{padding:26px 0 6px}.search{top:8px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="brand-logo">S</span>Slagio</div>
    <h1>Doorzoek <em>elk</em> examen, begrip&nbsp;&amp; uitleg</h1>
    <p class="sub">Eén zoekbalk over alle CE-examens, oud-examenvragen, begrippen, samenvattingen en oefenvragen — HAVO &amp; VWO.</p>
  </div>

  <div class="search">
    <div class="search-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Zoek op onderwerp, begrip of trefwoord…" autocomplete="off" autofocus>
      <button class="clr" id="clr" aria-label="Wissen"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
  </div>

  <div class="chips" id="chips"></div>
  <div class="tabs" id="tabs" style="display:none"></div>
  <div id="stats"></div>
  <div class="res" id="res"></div>
  <div class="more" id="more"></div>
  <div class="foot">Prototype · doorzoekt de echte Slagio-dataset volledig client-side · <a href="/havo">terug naar Slagio</a></div>
</div>

<!-- Echte Slagio-data -->
<script src="/data.js"></script>
<script src="/ce_data.js"></script>
<script src="/examens.js"></script>
<script>
(function(){
  'use strict';
  // ── Normalisatie: kleine letters, diacrieten weg, sub/superscript → gewoon cijfer ──
  var SUB='₀₁₂₃₄₅₆₇₈₉',SUP='⁰¹²³⁴⁵⁶⁷⁸⁹';
  function norm(s){
    return (s==null?'':String(s)).toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g,'')
      .replace(/[₀-₉]/g,function(c){return String(SUB.indexOf(c));})
      .replace(/[⁰-⁹]/g,function(c){return String(SUP.indexOf(c));})
      .replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim();
  }
  function stripHtml(s){return (s==null?'':String(s)).replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/g,' ');}
  function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  // ── Vak-id → naam map ──
  var VAKNAAM={};
  function collectNames(arr,niv){(arr||[]).forEach(function(v){VAKNAAM[v.id]={naam:v.naam,niveau:niv};});}
  collectNames(typeof VAKKEN!=='undefined'?VAKKEN:[], 'havo');
  collectNames(typeof VAKKEN_VWO!=='undefined'?VAKKEN_VWO:[], 'vwo');
  function vakNaam(id){return (VAKNAAM[id]&&VAKNAAM[id].naam)||id;}

  // ── Index opbouwen ──
  var INDEX=[];
  function indexVakken(vakken,niveau){
    (vakken||[]).forEach(function(v){
      (v.domeinen||[]).forEach(function(d){
        var samText=stripHtml(d.sam||'');
        var onderw=(d.onderwerpen||[]).join(' · ');
        // Uitleg / domein
        INDEX.push({type:'uitleg',vak:v.naam,niveau:niveau,
          title:'Domein '+d.id+': '+d.naam,
          ctx:d.beschrijving||samText.slice(0,180),
          norm:norm([v.naam,d.naam,d.beschrijving,onderw,samText].join(' '))});
        // Begrippen
        (d.onderwerpen||[]).forEach(function(o){
          INDEX.push({type:'begrip',vak:v.naam,niveau:niveau,dom:d.naam,
            title:o,norm:norm(o+' '+v.naam+' '+d.naam)});
        });
        // Oefenvragen (snelle quiz + oud-examen in data)
        ['sv','oe'].forEach(function(k){
          (d[k]||[]).forEach(function(qq){
            var ans=(qq.a&&typeof qq.c==='number')?qq.a[qq.c]:(qq.u||qq.a);
            INDEX.push({type:'oefen',vak:v.naam,niveau:niveau,dom:d.naam,
              title:qq.v,answer:ans,norm:norm((qq.v||'')+' '+(ans||''))});
          });
        });
      });
    });
  }
  indexVakken(typeof VAKKEN!=='undefined'?VAKKEN:[], 'havo');
  indexVakken(typeof VAKKEN_VWO!=='undefined'?VAKKEN_VWO:[], 'vwo');

  // Echte examens
  if(typeof EXAMENS!=='undefined'){
    Object.keys(EXAMENS).forEach(function(vid){
      (EXAMENS[vid]||[]).forEach(function(ex){
        (ex.vragen||[]).forEach(function(q){
          INDEX.push({type:'examen',vak:ex.titel||vakNaam(vid),niveau:ex.niveau,
            jaar:ex.jaar,tijdvak:ex.tijdvak,bron:ex.bron,punten:q.punten,
            title:q.vraag,ctx:q.context,answer:q.antwoord,
            norm:norm((q.context||'')+' '+(q.vraag||'')+' '+(q.antwoord||''))});
        });
      });
    });
  }
  // Oud-examenvragen (ce_data)
  if(typeof CE_OE!=='undefined'){
    Object.keys(CE_OE).forEach(function(vid){
      (CE_OE[vid]||[]).forEach(function(q){
        INDEX.push({type:'examen',vak:vakNaam(vid),niveau:(VAKNAAM[vid]&&VAKNAAM[vid].niveau),
          jaar:q.jaar,tijdvak:q.tijdvak,bron:q.bron,oud:true,
          title:q.v,answer:q.u,norm:norm((q.v||'')+' '+(q.u||''))});
      });
    });
  }

  var TYPES={
    examen:{label:'Examenvragen',cls:'b-exam',col:'var(--exam)'},
    begrip:{label:'Begrippen',cls:'b-begrip',col:'var(--begrip)'},
    uitleg:{label:'Uitleg & domeinen',cls:'b-uitleg',col:'var(--uitleg)'},
    oefen:{label:'Oefenvragen',cls:'b-oefen',col:'var(--oefen)'}
  };

  // ── Zoeken ──
  function runSearch(query){
    var qn=norm(query); if(!qn) return null;
    var toks=qn.split(' ').filter(Boolean);
    var out=[];
    for(var i=0;i<INDEX.length;i++){
      var e=INDEX[i],hay=e.norm,score=0,all=true;
      if(hay.indexOf(qn)>=0) score+=200;               // exacte frase
      for(var t=0;t<toks.length;t++){
        var pos=hay.indexOf(toks[t]);
        if(pos>=0){ score+=12; if(pos<40) score+=6; }  // vroeg in de tekst = relevanter
        else all=false;
      }
      if(!all && score<200) continue;                  // alle tokens (AND) of exacte frase
      if(e.type==='begrip') score+=8;                  // korte, precieze hits iets omhoog
      out.push({e:e,s:score});
    }
    out.sort(function(a,b){return b.s-a.s;});
    return out.map(function(x){return x.e;});
  }

  // ── Highlight ──
  function hl(text,toks){
    var safe=esc(text);
    toks.forEach(function(t){
      if(t.length<2) return;
      var re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
      safe=safe.replace(re,'<mark>$1</mark>');
    });
    return safe;
  }
  function clip(s,n){s=s||'';return s.length>n?s.slice(0,n).replace(/\s\S*$/,'')+'…':s;}

  // ── Render ──
  var elChips=document.getElementById('chips'),elTabs=document.getElementById('tabs'),
      elStats=document.getElementById('stats'),elRes=document.getElementById('res'),
      elMore=document.getElementById('more'),elQ=document.getElementById('q'),elClr=document.getElementById('clr');
  var STATE={all:[],filter:'all',shown:0,toks:[]};
  var PAGE=25;

  function card(e,toks){
    var t=TYPES[e.type],niv=e.niveau?e.niveau.toUpperCase():'';
    var meta=[];
    if(e.vak) meta.push(esc(e.vak));
    if(niv) meta.push(niv);
    if(e.dom && e.type!=='uitleg') meta.push(esc(e.dom));
    if(e.jaar) meta.push('CE '+e.jaar+(e.tijdvak?' · TV'+e.tijdvak:''));
    if(e.punten) meta.push(e.punten+' pnt');
    var metaHtml=meta.map(function(m,i){return (i?'<span class="sep">·</span>':'')+'<span>'+m+'</span>';}).join(' ');

    var body='';
    if(e.type==='begrip'){
      body='<div class="begrip-title">'+hl(e.title,toks)+'</div>';
    } else {
      if(e.ctx) body+='<div class="ctx">'+hl(clip(e.ctx,220),toks)+'</div>';
      body+='<div class="q">'+hl(clip(e.title,300),toks)+'</div>';
    }
    var ans='';
    if(e.answer){
      var aid='a'+(Math.random()*1e9|0);
      ans='<div class="ans" id="'+aid+'"><button class="ans-toggle" data-t="'+aid+'">'
        +'<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'
        +(e.type==='examen'?'Toon antwoord':'Toon uitwerking')+'</button>'
        +'<div class="ans-body">'+hl(clip(stripHtml(e.answer),600),toks)+'</div></div>';
    }
    return '<div class="card"><div class="card-top">'
      +'<span class="badge '+t.cls+'"><span class="dot" style="background:'+t.col+'"></span>'+t.label.replace(/ .*/,'')+(e.oud?' (oud)':'')+'</span>'
      +'<span class="meta">'+metaHtml+'</span></div>'+body+ans+'</div>';
  }

  function filtered(){
    return STATE.filter==='all'?STATE.all:STATE.all.filter(function(e){return e.type===STATE.filter;});
  }
  function renderList(reset){
    var list=filtered();
    if(reset){STATE.shown=0;elRes.innerHTML='';}
    var slice=list.slice(STATE.shown,STATE.shown+PAGE);
    var html=slice.map(function(e){return card(e,STATE.toks);}).join('');
    elRes.insertAdjacentHTML('beforeend',html);
    STATE.shown+=slice.length;
    elMore.innerHTML = STATE.shown<list.length
      ? '<button id="moreBtn">Toon meer ('+(list.length-STATE.shown)+')</button>' : '';
    var mb=document.getElementById('moreBtn');
    if(mb) mb.onclick=function(){renderList(false);};
  }

  function renderTabs(){
    var counts={all:STATE.all.length,examen:0,begrip:0,uitleg:0,oefen:0};
    STATE.all.forEach(function(e){counts[e.type]++;});
    var order=['all','examen','begrip','uitleg','oefen'];
    var html=order.map(function(k){
      if(k!=='all' && !counts[k]) return '';
      var lbl=k==='all'?'Alles':TYPES[k].label;
      var dot=k==='all'?'':'<span class="dot" style="background:'+TYPES[k].col+'"></span>';
      return '<button class="tab'+(STATE.filter===k?' on':'')+'" data-f="'+k+'">'+dot+lbl+'<span class="cnt">'+counts[k]+'</span></button>';
    }).join('');
    elTabs.innerHTML=html;elTabs.style.display=STATE.all.length?'flex':'none';
    [].forEach.call(elTabs.querySelectorAll('.tab'),function(b){
      b.onclick=function(){STATE.filter=b.getAttribute('data-f');renderTabs();renderList(true);
        window.scrollTo({top:0,behavior:'smooth'});};
    });
  }

  function doSearch(query){
    elClr.classList.toggle('on',!!query);
    if(!norm(query)){
      STATE.all=[];elTabs.style.display='none';elStats.innerHTML='';elMore.innerHTML='';
      showEmpty();return;
    }
    STATE.toks=norm(query).split(' ').filter(function(t){return t.length>=2;});
    STATE.all=runSearch(query)||[];STATE.filter='all';
    if(!STATE.all.length){
      elTabs.style.display='none';elStats.innerHTML='';elMore.innerHTML='';
      elRes.innerHTML='<div class="state"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><h3>Niets gevonden voor "'+esc(query)+'"</h3><p>Probeer een ander trefwoord of begrip.</p></div>';
      return;
    }
    elStats.innerHTML='<b>'+STATE.all.length.toLocaleString('nl')+'</b> resultaten voor <b>'+esc(query)+'</b>';
    renderTabs();renderList(true);
  }

  function showEmpty(){
    elRes.innerHTML='<div class="state"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7"><path d="M12 3v18M3 12h18" opacity="0"/><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><h3>Zoek in de hele Slagio-kennisbank</h3><p>'+INDEX.length.toLocaleString('nl')+' vragen, begrippen en uitleg-fragmenten doorzoekbaar.</p></div>';
  }

  // Suggestie-chips
  var SUGG=[['CO2','scheikunde'],['elasticiteit','economie'],['osmose','biologie'],['afgeleide','wiskunde'],['inflatie','economie'],['DNA','biologie'],['kracht','natuurkunde'],['argumentatie','nederlands']];
  elChips.innerHTML=SUGG.map(function(s){return '<button class="chip" data-q="'+s[0]+'">'+s[0]+'<small>'+s[1]+'</small></button>';}).join('');
  [].forEach.call(elChips.querySelectorAll('.chip'),function(c){
    c.onclick=function(){elQ.value=c.getAttribute('data-q');doSearch(elQ.value);elQ.focus();};
  });

  // Antwoord-toggle (event delegation)
  elRes.addEventListener('click',function(ev){
    var b=ev.target.closest('.ans-toggle');if(!b)return;
    var box=document.getElementById(b.getAttribute('data-t'));if(box)box.classList.toggle('open');
  });

  // Input met debounce
  var deb;
  elQ.addEventListener('input',function(){clearTimeout(deb);var v=elQ.value;deb=setTimeout(function(){doSearch(v);},120);});
  elClr.onclick=function(){elQ.value='';doSearch('');elQ.focus();};

  showEmpty();
  // Deep-link ?q=
  var m=location.search.match(/[?&]q=([^&]+)/);
  if(m){elQ.value=decodeURIComponent(m[1].replace(/\+/g,' '));doSearch(elQ.value);}
})();
</script>
</body>
</html>
