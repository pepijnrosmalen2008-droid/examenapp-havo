<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slagio Zoeken</title>
<meta name="robots" content="noindex">
<style>
  html,body{margin:0;height:100%;background:#090b12;color:#8a94a6;
    font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
  .m{text-align:center;font-size:14px}
  a{color:#e8580c}
</style>
</head>
<body>
<div class="m">Zoeken zit nu in de app… <a id="lnk" href="/havo#zoek">verder</a></div>
<script>
// De examenzoekmachine is verhuisd naar de app (scherm sc-zoek).
// Deze pagina stuurt door en bewaart een eventuele ?q=… voor de app.
(function(){
  var lvl='havo';
  try{var s=localStorage.getItem('examenapp_level');if(s==='havo'||s==='vwo')lvl=s;}catch(e){}
  var m=location.search.match(/[?&]q=([^&]+)/);
  if(m){try{sessionStorage.setItem('slagio_pending_zoek',decodeURIComponent(m[1].replace(/\+/g,' ')));}catch(e){}}
  var url='/'+lvl+'#zoek';
  document.getElementById('lnk').href=url;
  location.replace(url);
})();
</script>
</body>
</html>
