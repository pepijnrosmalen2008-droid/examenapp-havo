# Bot A — DCA (accumuleren + vasthouden). PAPER.
# Start vanaf je gedeelde portefeuille; mag vrij handelen in het hele universe.
# Draaien:  py bot.py --config config.dca.yaml

mode: PAPER
bot_id: dca
capital_eur: 157             # nominale referentie; seed hieronder bepaalt de echte startwaarde

pairs: [BTC-EUR, ETH-EUR, MOODENG-EUR]   # basis; universe voegt liquide markten toe

seed:
  enabled: true
  eur: 40                    # startcash (bijv. je maand-inleg)
  holdings:                  # EUR-waarde bij start → omgezet naar hoeveelheid tegen de prijs
    MOODENG-EUR: 96
    ETH-EUR: 15.70
    BTC-EUR: 5.76

risk:
  max_position_pct: 30
  stop_loss_pct: 25          # ruim: DCA wil niet panisch verkopen bij een dip
  take_profit_pct: null      # winnaars laten lopen (accumuleren)
  max_daily_loss_pct: 15
  max_drawdown_pct: 40
  max_portfolio_heat_pct: null   # uit: je begint bewust met een geconcentreerde (meme)positie

strategy:
  name: dca
  params: { amount_eur: 10, every_hours: 24 }

schedule:
  interval_minutes: 15

universe:
  enabled: true
  min_daily_volume_eur: 100000
  max_spread_pct: 1.0
  max_markets: 40
  always_include: [BTC-EUR, ETH-EUR, MOODENG-EUR]

costs:
  taker_fee_pct: 0.25
  slippage_pct: 0.1
