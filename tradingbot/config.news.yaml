# Bot 5 — Nieuws / event-bot. PAPER. (Conditie B: nieuwe informatiebron = niet-prijs.)
#
# PROACTIEF: haalt zelf publieke crypto-nieuwskoppen op (RSS) en zet ze deterministisch
# om naar events — geen LLM, geen social-scraping. Handelt NIET op koers; basisstrategie
# 'hold' geeft zelf geen signaal. Elke relevante kop wordt één keer als trade-VOORSTEL
# afgevuurd (en blijft daarna als factor meetellen), altijd via de confidence-poort én de
# risk engine. Kan de bestaande coins ook verkopen bij negatief nieuws. Niet tijdgebonden:
# hij handelt zodra er nieuws is, niet op een vaste koop-cyclus.
#
# Zijn gedachtegang (welke kop → welke coin → waarom) staat op slagio.nl/bot.html. Forward-
# only: nieuws is niet backtestbaar (leakage); de ruwe kop→richting-vertaling wordt door de
# leerlus afgerekend. Zie experiments/2026_news_event_bot.md voor de criteria.
#
# Handmatige events blijven mogelijk via research_events.json (naast de auto-feed).
# Draaien:  py bot.py --config config.news.yaml

mode: PAPER
bot_id: news
capital_eur: 158

pairs: [BTC-EUR, ETH-EUR, MOODENG-EUR]

seed:
  enabled: true
  eur: 40                     # cash om nieuws-koopjes mee te doen
  holdings:
    MOODENG-EUR: 96
    ETH-EUR: 15.70
    BTC-EUR: 5.76

risk:
  max_position_pct: 25
  stop_loss_pct: 15           # nieuws-trades hebben een korte houdbaarheid → strak
  take_profit_pct: 20
  max_daily_loss_pct: 15
  max_drawdown_pct: 40
  max_portfolio_heat_pct: null

strategy:
  name: hold                  # geen prijssignalen; de nieuws-laag beslist
  params: {}

# de nieuws-laag: zoekt zelf nieuws, stelt trades VOOR; risk engine kan verkleinen/blokkeren
research:
  enabled: true
  agent: newsfeed             # proactief RSS ophalen (i.p.v. handmatig events invoeren)
  min_confidence: 0.6         # onder deze zekerheid negeert hij een kop
  max_position_eur: 25        # bovengrens per nieuws-voorstel (risk engine kan verder knijpen)
  events_file: research_events.json   # optioneel: handmatige events naast de auto-feed
  fetch_minutes: 10           # hoogstens elke 10 min nieuwe koppen ophalen
  sources:
    - https://cointelegraph.com/rss
    - https://decrypt.co/feed
    - https://www.coindesk.com/arc/outboundfeeds/rss/

schedule:
  interval_minutes: 15

universe:
  enabled: false              # bewust de vaste mand; nieuws draait om déze coins

costs:
  taker_fee_pct: 0.25
  slippage_pct: 0.1
