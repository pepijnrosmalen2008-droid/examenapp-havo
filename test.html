{v:'Wat is het verschil tussen een eenmanszaak en een BV?',o:['Eenmanszaak: eigenaar onbeperkt aansprakelijk met heel zijn vermogen. BV: rechtspersoon, aansprakelijkheid beperkt tot ingebracht kapitaal.','Een eenmanszaak heeft altijd meer werknemers','Een BV betaalt altijd meer belasting','Er is geen juridisch verschil'],c:0,u:'Eenmanszaak: gemakkelijk op te richten, maar eigenaar is met privevermogen aansprakelijk voor bedrijfsschulden. BV biedt bescherming van privevermogen.'},
{v:'Wat is een rechtspersoon?',o:['Een organisatie die zelfstandig drager is van rechten en plichten, zoals een BV, NV, stichting of vereniging','Een persoon met een bedrijf','Elke organisatie met meer dan 10 werknemers','Alleen bedrijven die winst maken'],c:0,u:'Een rechtspersoon kan zelfstandig rechten en plichten hebben, contracten afsluiten en eigenaar zijn van bezittingen. Eenmanszaak en VOF zijn geen rechtspersonen.'},
{v:'Wat verstaan we onder continuiteit van een onderneming?',o:['Het streven van de ondernemingsleiding om de organisatie op lange termijn in stand te houden en te laten voortbestaan','Het berekenen van de break-even hoeveelheid','Het maximaliseren van de winst op korte termijn','Het handhaven van een vaste personeelsbezetting'],c:0,u:'Continuiteit is de langetermijndoelstelling van een onderneming: voortbestaan door waardecreatie voor alle stakeholders (people, planet, profit).'}
   ],
   oe:[
{bron:'HAVO Bedrijfseconomie CE 2023 Tijdvak 1 Samengestelde interest (geen afbeelding)',ctx:'Ouders leggen op de geboortedag van hun kind 5000 euro op een spaarrekening met 3% rente per jaar (samengesteld).',v:'(a) Bereken het bedrag na 18 jaar.\n(b) Na hoeveel jaar is het bedrag verdubbeld? Gebruik de regel van 72 als benadering en controleer met de formule.',o:[''],c:0,u:'(a) K18 = 5000 maal 1,03 tot de 18de macht = 5000 maal 1,7024 = 8512 euro.\n(b) Regel van 72: t = 72 gedeeld door 3 = 24 jaar. Controle: 1,03 tot de n = 2 geeft n = log 2 gedeeld door log 1,03 = 23,4 jaar. Klopt goed met de vuistregel.'},
{bron:'HAVO Bedrijfseconomie CE 2022 Tijdvak 2 Rechtsvormen (geen afbeelding)',ctx:'Twee vrienden (Amir en Bo) beginnen samen een fietsenreparatiewinkel. Ze overwegen twee rechtsvormen: een VOF of een BV.',v:'(a) Leg uit wat het grootste verschil is in aansprakelijkheid tussen een VOF en een BV.\n(b) Noem twee nadelen van het oprichten van een BV voor kleine ondernemers.',o:[''],c:0,u:'(a) VOF: beide vennoten zijn elk onbeperkt aansprakelijk voor de schulden van de VOF, ook met hun privevermogen. BV: de aandeelhouders zijn slechts aansprakelijk voor het ingebrachte kapitaal, privevermogen is beschermd.\n(b) Twee uit: (1) oprichtingskosten en notariskosten zijn hoger. (2) Meer administratieve verplichtingen (jaarrekening deponeren). (3) Minimaal startkapitaal vereist.'},
{bron:'HAVO Bedrijfseconomie CE 2024 Tijdvak 1 Hypotheek (geen afbeelding)',ctx:'Een stel koopt een woning van 350.000 euro. Ze sluiten een annuiteitenhypotheek af voor 300.000 euro. De rente is 4% per jaar en de looptijd is 30 jaar.',v:'(a) Leg uit wat een annuiteitenhypotheek inhoudt.\n(b) Vergelijk annuiteit met aflossingsvrije hypotheek: wat is het grootste verschil in het verloop van de maandlasten en de schuld?',o:[''],c:0,u:'(a) Annuiteit: elke maand hetzelfde totale bedrag betalen (bruto maandlast constant). Het aandeel rente daalt gedurende de looptijd en het aandeel aflossing stijgt. Aan het einde is de schuld volledig afgelost.\n(b) Annuiteit: schuld daalt, maandlast constant. Aflossingsvrij: schuld blijft constant (geen aflossing), rente blijft gelijk, aan het einde van de looptijd is de hele schuld nog open.'}
   ]},
  {id:'C',naam:'Interne organisatie',beschrijving:'Organisatiestructuren, personeelsbeleid en HRM',
   onderwerpen:['Organisatiestructuren (lijn, lijn-staf, functioneel, matrix)','Organisatiegrafieken lezen en interpreteren','Arbeidsovereenkomsten (bepaalde/onbepaalde tijd, uitzend, oproep)','Personeelsbeleid (werving, selectie, ontslag)','CAO en arbeidsrecht','Motivatie en beloningsvormen'],
   sam:'<strong>Lijnorganisatie</strong>: duidelijke gezagslijnen, eenvoudig. <strong>Lijn-staf</strong>: lijnmanagers hebben gezag; stafeenheden (HR, IT) adviseren zonder bevelsbevoegdheid. <strong>Functionele organisatie</strong>: specialisatie per functie (inkoop, productie, marketing). <strong>Matrixorganisatie</strong>: medewerkers hebben twee leidinggevenden (functioneel + project); flexibel maar rolconflict mogelijk. <strong>Arbeidsovereenkomst voor bepaalde tijd</strong>: eindigt automatisch; max 3 in 3 jaar daarna automatisch onbepaalde tijd. <strong>Onbepaalde tijd</strong>: ontslag alleen met toestemming UWV of rechter. <strong>CAO</strong>: collectieve arbeidsovereenkomst, afspraken op sectorniveau tussen werkgever(s) en vakbonden. <strong>Drie ontslaggronden</strong>: bedrijfseconomisch, disfunctioneren, verstoorde arbeidsrelatie.',
   sv:[
{v:'Wat is een lijn-staforganisatie?',o:['Lijnmanagers hebben gezag. Stafeenheden (HR, IT, Financien) adviseren maar hebben geen bevelsbevoegdheid over lijnmedewerkers.','Een vlakke organisatie zonder hierarchie','Een organisatie met twee gelijkwaardige bazen','Een matrix van projecten en functies'],c:0,u:'Lijn is de gezagslijn van hoog naar laag. Staf zijn specialisten die ondersteunen en adviseren zonder directe bevelsbevoegdheid.'},
{v:'Wat is het kenmerk van een matrixorganisatie?',o:['Medewerkers rapporteren aan twee leidinggevenden: zowel een functioneel hoofd als een projectleider.','Slechts een leidinggevende per medewerker','Alleen grote bedrijven gebruiken een matrix','Medewerkers zijn altijd vast ingedeeld per afdeling'],c:0,u:'Matrix: flexibel, kennisdeling mogelijk. Nadeel: twee bazen geeft rolconflict en onduidelijkheid over prioriteiten.'},
{v:'Wat is het verschil tussen een arbeidsovereenkomst voor bepaalde en onbepaalde tijd?',o:['Bepaalde tijd: eindigt automatisch op de einddatum. Onbepaalde tijd: eindigt niet automatisch, ontslag vereist instemming UWV of rechter.','Bepaalde tijd is altijd beter voor de werknemer','Onbepaalde tijd is verboden voor oproepkrachten','Er is geen juridisch verschil'],c:0,u:'Bij bepaalde tijd weet de werknemer van tevoren wanneer het eindigt. Bij onbepaalde tijd geldt sterke ontslagbescherming.'},
{v:'Wat is een CAO?',o:['Een collectieve arbeidsovereenkomst: afspraken op sectorniveau over loon, arbeidsomstandigheden en werktijden, afgesloten tussen werkgever(s) en vakbonden.','Een contract tussen werkgever en een individu','Een overheidswet over arbeidsrecht','Een intern beleidsdocument van het bedrijf'],c:0,u:'CAO geldt voor alle werknemers in een sector of bedrijf. Minimumafspraken; individuele contracten mogen gunstiger zijn maar niet slechter.'},
{v:'Wat zijn de drie hoofdgronden voor ontslag in Nederland?',o:['Bedrijfseconomische redenen, disfunctioneren van de werknemer en een verstoorde arbeidsrelatie.','Slechte prestaties, ziekte en te hoog salaris','Reorganisatie, pensionering en vrijwillig vertrek','Overlijden, faillissement en arbeidsconflict'],c:0,u:'Voor ontslag via UWV of rechter zijn de drie gronden: (1) bedrijfseconomisch (bijv. reorganisatie), (2) disfunctioneren en (3) verstoorde arbeidsrelatie.'}
   ],
   oe:[
{bron:'HAVO Bedrijfseconomie CE 2022 Tijdvak 1 Organisatievraag (geen afbeelding)',ctx:'Een consultancybureau werkt met drie vaste functionele afdelingen (Finance, HR, IT) en organiseert tegelijk meerdere klantprojecten. Elke projectmedewerker rapporteert aan zowel zijn functionele afdelingshoofd als aan zijn projectleider.',v:'(a) Welke organisatiestructuur is dit?\n(b) Noem twee voordelen en twee nadelen van deze structuur.',o:[''],c:0,u:'(a) Matrixorganisatie: medewerkers hebben twee leidinggevenden (functioneel + project).\nVoordelen: (1) flexibel inzetten van specialisten over projecten. (2) Kennisdeling tussen functies en projecten.\nNadelen: (1) twee bazen geeft rolconflict en onduidelijkheid over prioriteiten. (2) Hogere coordinatiekosten.'},
{bron:'HAVO Bedrijfseconomie CE 2023 Tijdvak 2 HRM-vraag (geen afbeelding)',ctx:'Een supermarkt heeft 40 medewerkers. De helft heeft een contract voor onbepaalde tijd, de rest heeft oproepcontracten.',v:'(a) Noem twee voordelen voor de supermarkt van oproepcontracten.\n(b) Noem twee nadelen voor de medewerkers met een oproepcontract.',o:[''],c:0,u:'Voordelen werkgever: (1) Flexibel inzetten bij piekdrukte (bijv. weekenden). (2) Geen loonkosten bij geen werk.\nNadelen werknemer: (1) Onzeker inkomen, moeilijk hypotheek of huur te krijgen. (2) Minder sociale bescherming en opbouw van rechten.'},
{bron:'HAVO Bedrijfseconomie CE 2024 Tijdvak 1 Organisatieverandering (geen afbeelding)',ctx:'Een middelgroot productiebedrijf heeft een traditionele lijnorganisatie. De directie wil overstappen naar een lijn-staforganisatie door een HR- en een financieelafdeling toe te voegen.',v:'Leg uit wat deze overstap betekent voor de bevoegdheden en verantwoordelijkheden van de nieuwe stafeenheden vergeleken met lijnmanagers.',o:[''],c:0,u:'Stafeenheden (HR en Financien) hebben geen directe bevelsbevoegdheid over de lijnmedewerkers. Ze adviseren en ondersteunen de lijnmanagers. De lijnmanagers behouden het gezag en de eindverantwoordelijkheid voor de dagelijkse aansturing van hun medewerkers. Dit onderscheid is cruciaal: stafeenheden mogen geen orders geven aan lijnpersoneel.'}
   ]},
  {id:'D',naam:'Marketing',beschrijving:'Marketing-mix, marktonderzoek en prijsstrategieen',
   onderwerpen:['Marketing-mix: de vier P\'s','Prijsstrategieen (penetratie, afroomstrategie)','Distributiekanalen en bedrijfskolom','Promotie en communicatiemix','Primair en secundair marktonderzoek','Kwantitatief en kwalitatief onderzoek','Marktvormen (monopolie, oligopolie, volkomen concurrentie)'],
   sam:'<strong>Marketing-mix (4 P\'s)</strong>: Product (kwaliteit, merk, assortiment), Prijs (strategie), Plaats (distributie), Promotie (reclame, PR, social media). <strong>Penetratiestrategie</strong>: lage introductieprijs voor snel marktaandeel. <strong>Afroomstrategie (skimming)</strong>: hoge introductieprijs voor early adopters, maximale marge. <strong>Bedrijfskolom</strong>: producent → groothandel → detailhandel → consument. Kortere kolom = meer directe controle. <strong>Primair marktonderzoek</strong>: zelf verzameld (enquete, interview, observatie). <strong>Secundair</strong>: bestaande bronnen (CBS, brancherapporten). <strong>Kwantitatief</strong>: cijfermatige data (hoeveel, hoe vaak). <strong>Kwalitatief</strong>: diepgaande meningen en motivaties. <strong>Marktvormen</strong>: volkomen concurrentie (veel aanbieders, homogeen product), monopolie (een aanbieder), oligopolie (weinig aanbieders).',
   sv:[
{v:'Wat zijn de vier P\'s van de marketing-mix?',o:['Product, Prijs, Plaats en Promotie','Persoon, Prijs, Productie en Promotie','Product, Processen, Plaats en Prestatie','Prijs, Publiek, Promotie en Prestatie'],c:0,u:'4 P\'s: Product (wat verkoop je), Prijs (voor hoeveel), Plaats (hoe bereik je klanten), Promotie (hoe maak je het bekend).'},
{v:'Wat is het verschil tussen penetratiestrategie en afroomstrategie?',o:['Penetratie: lage introductieprijs voor snel marktaandeel. Afroomstrategie: hoge introductieprijs voor early adopters, daarna verlagen.','Penetratie is altijd winstgevender','Afroomstrategie is alleen voor luxeproducten','Ze zijn hetzelfde bij hoge kwaliteitsproducten'],c:0,u:'Penetratie: marktaandeel veroveren via lage prijs. Afroomstrategie (skimming): maximale marge bij introductie. Keuze hangt af van doelgroep en concurrentie.'},
{v:'Wat is het verschil tussen primair en secundair marktonderzoek?',o:['Primair: zelf verzameld (enquete, interview, observatie). Secundair: bestaande bronnen gebruiken (rapporten, CBS).','Primair is altijd kwantitatief','Secundair is altijd betrouwbaarder','Primair is goedkoper dan secundair'],c:0,u:'Primair: originele data, duurder, specifiek voor jouw vraag. Secundair: sneller en goedkoper maar minder actueel.'},
{v:'Wat is de bedrijfskolom?',o:['De opeenvolgende schakels van producent naar eindconsument: producent, groothandel, detailhandel, consument','De hierarchie binnen een bedrijf','Een kolom in de jaarrekening','De kosten per productieschakel'],c:0,u:'Bedrijfskolom beschrijft de distributieketen. Een kortere kolom heeft minder tussenschakels en geeft meer controle over distributie.'},
{v:'Wat is het verschil tussen kwantitatief en kwalitatief marktonderzoek?',o:['Kwantitatief: cijfermatige data (hoeveel, hoe vaak) via enquetes. Kwalitatief: diepgaande inzichten in meningen en motivaties via interviews.','Kwantitatief is altijd beter','Kwalitatief levert meer respondenten','Ze zijn identiek qua methode'],c:0,u:'Kwantitatief is statistisch analyseerbaar en representatief. Kwalitatief geeft rijke inzichten maar is minder generaliseerbaar.'}
   ],
   oe:[
{bron:'HAVO Bedrijfseconomie CE 2023 Tijdvak 2 Marketingvraag (geen afbeelding)',ctx:'Een nieuw energiedrankje wordt gelanceerd met de volgende strategie: hoge introductieprijs, verkoop uitsluitend via exclusieve sportscholen, promotie via sportinfluencers op sociale media.',v:'(a) Welke prijsstrategie wordt gehanteerd en wat is het doel?\n(b) Analyseer de keuze voor exclusieve distributie (Plaats). Welk imago streeft het merk na?\n(c) Noem een risico van deze marketingstrategie.',o:[''],c:0,u:'(a) Afroomstrategie (skimming): hoge introductieprijs voor early adopters die voor kwaliteit willen betalen. Doel: hoge marge bij introductie.\n(b) Exclusieve distributie geeft schaarste en prestige: premiumimago. Het merk positioneert zich als luxeproduct.\n(c) Risico: kleine doelgroep bij hoge prijs, beperkt marktaandeel. Concurrenten kunnen met vergelijkbaar product voor lagere prijs komen.'},
{bron:'HAVO Bedrijfseconomie CE 2022 Tijdvak 1 Marktonderzoek (geen afbeelding)',ctx:'Een supermarktketen wil weten waarom klanten steeds vaker online boodschappen doen in plaats van de fysieke winkel te bezoeken.',v:'(a) Welk type marktonderzoek is het meest geschikt en waarom?\n(b) Noem drie concrete onderzoeksvragen voor een enquete.\n(c) Welke doelgroep selecteer je als steekproef?',o:[''],c:0,u:'(a) Combinatie: kwantitatief (enquete) voor omvang en patronen plus kwalitatief (diepte-interview) voor motivaties. De reden achter gedrag vraagt kwalitatief inzicht.\n(b) Drie uit: Hoe vaak bestelt u online per maand, Wat zijn de drie belangrijkste redenen voor online bestellen, Hoe tevreden bent u met de bezorging (schaal 1-10).\n(c) Klanten die zowel online als offline kopen plus voormalige klanten die volledig overstapten op online.'},
{bron:'HAVO Bedrijfseconomie CE 2024 Tijdvak 2 4P-analyse (geen afbeelding)',ctx:'Een startend bakkerijbedrijf overweegt zijn brood te verkopen via drie kanalen: een eigen winkel, een online webshop en via supermarkten.',v:'Analyseer de drie distributiekanalen (Plaats) voor het bakkerijbedrijf. Noem per kanaal een voordeel en een nadeel.',o:[''],c:0,u:'Eigen winkel: voordeel directe klantrelatie en volledige winstmarge. Nadeel hoge vaste kosten (huur, personeel).\nWebshop: voordeel breed bereik en lagere vaste kosten. Nadeel logistiek (bezorging vers brood) is complex en duur.\nSupermarkt: voordeel groot bereik en weinig eigen distributiekosten. Nadeel lagere marge door marge voor de supermarkt, minder controle over presentatie.'}
   ]},
  {id:'E',naam:'Financieel beleid',beschrijving:'Kosten, opbrengsten, investeringen en rentabiliteit',
   onderwerpen:['Vaste en variabele kosten','Break-evenanalyse en dekkingsbijdrage','Investeringsbeslissingen: TVT en NCW','Financieringsvormen (eigen en vreemd vermogen)','Rentabiliteit: REV en RTV','Hefboomwerking (positief en negatief)'],
   sam:'<strong>Vaste kosten (FK)</strong>: onafhankelijk van productie. <strong>Variabele kosten (VK)</strong>: stijgen evenredig met productie. <strong>Dekkingsbijdrage</strong>: <span class="fm">db = vp − vk</span>. <strong>Break-even</strong>: <span class="fm">Q_be = FK / db</span>. <strong>Winst</strong>: W = TO − TK = db·Q − FK. <strong>TVT (terugverdientijd)</strong>: investering / jaarlijkse nettokasinstroom. Eenvoudig maar negeert tijdswaarde. <strong>NCW (netto contante waarde)</strong>: Σ(kasinstroom·CW-factor) − investering. Positieve NCW = waardecreatie. Superieur aan TVT. <strong>RTV</strong>: (nettowinst + rente VV) / TV × 100%. <strong>REV</strong>: nettowinst / EV × 100%. <strong>Positieve hefboomwerking</strong>: RTV > rentevoet VV → REV > RTV. Lenen verhoogt rendement op eigen vermogen als RTV groter is dan de rente op het geleende geld.',
   sv:[
{v:'Wat is de dekkingsbijdrage per stuk?',o:['Verkoopprijs minus variabele kosten per stuk: de bijdrage per verkochte eenheid aan de dekking van vaste kosten en winst','Verkoopprijs minus vaste kosten per stuk','Totale winst gedeeld door het aantal stuks','Omzet minus alle kosten'],c:0,u:'db = vp min vk. Break-even: Q_be = FK gedeeld door db. Als db maal Q groter is dan FK is er winst.'},
{v:'Wat is het break-evenpunt?',o:['De hoeveelheid waarbij totale opbrengst gelijk is aan totale kosten: geen winst, geen verlies','Het punt van maximale winst','De minimale verkoopprijs','Het punt waarop variabele kosten nul zijn'],c:0,u:'Break-even: TO = TK. Q_be = FK gedeeld door (vp min vk).'},
{v:'Wat is positieve hefboomwerking?',o:['REV is groter dan RTV doordat vreemd vermogen goedkoper is dan de totale rentabiliteit: lenen verhoogt het rendement op eigen vermogen.','REV is altijd kleiner dan RTV bij lenen','Meer vreemd vermogen leidt altijd tot meer winst','Lenen is altijd schadelijk voor de REV'],c:0,u:'Positief hefboom: RTV groter dan rentevoet VV zodat het overschot de winst voor eigenaren vergroot en REV groter wordt dan RTV.'},
{v:'Wat is het verschil tussen TVT en NCW als investeringscriteria?',o:['TVT is eenvoudig maar negeert tijdswaarde geld en kasstromen na de TVT. NCW houdt rekening met alle kasstromen contant gemaakt en is economisch beter.','NCW is eenvoudiger dan TVT','TVT is altijd hoger dan NCW','Ze geven altijd dezelfde investeringsbeslissing'],c:0,u:'NCW = som van kasinstroom maal CW-factor min investering. Positieve NCW is waardecreatie. NCW is economisch superieur maar vereist een discontovoet.'},
{v:'Wat zijn vaste kosten en variabele kosten?',o:['Vaste kosten zijn onafhankelijk van productie (huur, afschrijving). Variabele kosten stijgen evenredig met de productie (materiaalkosten, directe arbeid).','Vaste kosten zijn altijd groter','Variabele kosten zijn ook bij nulproductie aanwezig','Er is geen praktisch onderscheid'],c:0,u:'Bij nulproductie: vaste kosten lopen door, variabele kosten zijn nul. Totale kosten = FK + VK.'}
   ],
   oe:[
{bron:'HAVO Bedrijfseconomie CE 2023 Tijdvak 1 Break-evenanalyse (geen afbeelding)',ctx:'Een fietsreparatiebedrijf heeft de volgende maandelijkse gegevens:\nHuur werkplaats: 1800 euro\nSalaris eigenaar: 2200 euro\nAfschrijving machines: 400 euro\nVariabele kosten per reparatie: 12 euro\nVerkoopprijs per reparatie: 45 euro',v:'(a) Bereken het break-evenpunt in reparaties per maand.\n(b) Bereken de winst bij 200 reparaties per maand.\n(c) Leg uit wat schaalvoordeel is in deze context.',o:[''],c:0,u:'(a) FK = 1800 + 2200 + 400 = 4400 euro. db = 45 min 12 = 33 euro. Q_be = 4400 gedeeld door 33 = 133 reparaties.\n(b) Winst = db maal Q min FK = 33 maal 200 min 4400 = 6600 min 4400 = 2200 euro.\n(c) Schaalvoordeel: bij meer reparaties worden de vaste kosten over meer eenheden verspreid, waardoor de vaste kosten per stuk dalen en de winst per stuk stijgt.'},
{bron:'HAVO Bedrijfseconomie CE 2022 Tijdvak 2 REV en hefboomwerking (geen afbeelding)',ctx:'Bedrijf Y:\nTotaal vermogen: 300.000 euro\nEigen vermogen: 100.000 euro\nVreemd vermogen: 200.000 euro (rente 4%)\nNettowinst voor renteaftrek: 27.000 euro',v:'(a) Bereken de RTV.\n(b) Bereken de nettowinst na rente.\n(c) Bereken de REV.\n(d) Is er sprake van positieve hefboomwerking?',o:[''],c:0,u:'(a) RTV = 27.000 gedeeld door 300.000 maal 100% = 9%.\n(b) Rente = 4% maal 200.000 = 8.000 euro. Nettowinst na rente = 27.000 min 8.000 = 19.000 euro.\n(c) REV = 19.000 gedeeld door 100.000 maal 100% = 19%.\n(d) Ja: RTV (9%) is groter dan rentevoet VV (4%), REV (19%) is groter dan RTV (9%), positieve hefboomwerking.'},
{bron:'HAVO Bedrijfseconomie CE 2024 Tijdvak 1 Investeringsanalyse (geen afbeelding)',ctx:'Een ondernemer overweegt een machine van 80.000 euro. Verwachte nettokasinstroom: 20.000 euro per jaar gedurende 5 jaar. Daarna is de machine waardeloos.\nDiscontovoet: 8%. CW-factor (8%, 5 jaar) = 3,993.',v:'(a) Bereken de terugverdientijd.\n(b) Bereken de NCW.\n(c) Adviseer de ondernemer op basis van de NCW.',o:[''],c:0,u:'(a) TVT = 80.000 gedeeld door 20.000 = 4 jaar.\n(b) NCW = 20.000 maal 3,993 min 80.000 = 79.860 min 80.000 = min 140 euro.\n(c) De NCW is licht negatief. De investering creëert bij een rendementseis van 8% nagenoeg geen waarde. Advies: niet uitvoeren tenzij de kasinstroom hoger kan of de aanschafprijs lager.'}
   ]},
  {id:'F',naam:'Verslaggeving',beschrijving:'Jaarrekening, balans, winst-en-verliesrekening en financiele kengetallen',
   onderwerpen:['Balans: activa en passiva','Eigen vermogen en vreemd vermogen','Winst-en-verliesrekening','Afschrijvingen','Liquiditeit: current ratio en quick ratio','Solvabiliteit','Rentabiliteit als kengetal'],
   sam:'<strong>Balans</strong>: momentopname. Activa (bezittingen) = Passiva (financiering). EV + VV = Totale activa. <strong>Activa</strong>: vaste activa (gebouwen, machines; langdurig) + vlottende activa (voorraden, debiteuren, kas; kortlopend). <strong>Passiva</strong>: eigen vermogen + vreemd vermogen (lang- en kortlopend). <strong>Winst-en-verliesrekening</strong>: omzet − kosten = winst/verlies over een periode. <strong>Afschrijving</strong> (lineair): (aanschaf − restwaarde) / gebruiksduur per jaar. <strong>Solvabiliteit</strong>: EV/TV × 100% (hoe sterk op lange termijn). <strong>Current ratio</strong>: vlottende activa / kortlopende schulden (≥ 1 is gezond). <strong>Quick ratio</strong>: (vlottende activa − voorraden) / kortlopende schulden (strenger dan current ratio, voorraden zijn minder liquide).',
   sv:[
{v:'Wat toont de balans van een onderneming?',o:['Een overzicht van bezittingen (activa) en financiering (passiva) op een bepaald moment','De winst en verlies over een periode','De kasstroom van een bedrijf','De omzet per productcategorie'],c:0,u:'Balans is een momentopname. Activa (bezittingen) = Passiva (financiering). Altijd: eigen vermogen + vreemd vermogen = totale activa.'},
{v:'Wat is het verschil tussen de current ratio en de quick ratio?',o:['Current ratio: vlottende activa gedeeld door kortlopende schulden. Quick ratio: vlottende activa minus voorraden gedeeld door kortlopende schulden. Quick ratio is strenger.','Ze zijn identiek','Quick ratio omvat ook de vaste activa','Current ratio telt voorraden niet mee'],c:0,u:'Quick ratio is strenger dan current ratio omdat voorraden worden uitgesloten. Voorraden zijn minder snel omzetbaar in geld dan debiteuren of kas.'},
{v:'Wat meet de solvabiliteit?',o:['Het aandeel eigen vermogen in het totale vermogen: EV gedeeld door TV maal 100 procent','De liquiditeit van het bedrijf op korte termijn','De winstgevendheid per euro omzet','De verhouding schuld gedeeld door winst'],c:0,u:'Hoge solvabiliteit betekent veel eigen vermogen. Minder afhankelijk van crediteuren en sterker op lange termijn.'},
{v:'Wat is lineaire afschrijving?',o:['De aanschafwaarde minus restwaarde wordt in gelijke jaarlijkse bedragen afgeschreven over de gebruiksduur','Afschrijving die elk jaar groter wordt','Afschrijving op basis van werkelijk gebruik','Directe volledige afschrijving bij aankoop'],c:0,u:'Jaarlijkse afschrijving = (aanschaf min restwaarde) gedeeld door gebruiksduur. De boekwaarde daalt elk jaar met hetzelfde bedrag.'},
{v:'Wat is het verschil tussen de balans en de winst-en-verliesrekening?',o:['Balans: momentopname van bezittingen en financiering op een bepaald moment. W&V-rekening: overzicht van opbrengsten en kosten over een periode.','Ze zijn hetzelfde document','Balans toont altijd de toekomst','W&V-rekening is een momentopname'],c:0,u:'Balans (statisch): wat bezit het bedrijf en hoe is het gefinancierd op dit moment. W&V-rekening (dynamisch): hoeveel heeft het bedrijf verdiend en uitgegeven in een periode (jaar).'}
   ],
   oe:[
{bron:'HAVO Bedrijfseconomie CE 2023 Tijdvak 2 Balansvraag (geen afbeelding)',ctx:'Balans Bedrijf X per 31 december:\nActiva: Gebouwen 180.000 euro, Inventaris 40.000 euro, Voorraden 25.000 euro, Debiteuren 15.000 euro, Bank 10.000 euro.\nPassiva: Eigen vermogen 120.000 euro, Langlopende lening 100.000 euro, Crediteuren 35.000 euro, Overige kortlopende schulden 15.000 euro.',v:'(a) Controleer of de balans klopt.\n(b) Bereken de solvabiliteit en de current ratio.\n(c) Beoordeel de financiele positie op basis van beide kengetallen.',o:[''],c:0,u:'(a) Activa = 180 + 40 + 25 + 15 + 10 = 270.000 euro. Passiva = 120 + 100 + 35 + 15 = 270.000 euro. De balans klopt.\n(b) Solvabiliteit = 120/270 maal 100% = 44,4%. Current ratio = (25 + 15 + 10) gedeeld door (35 + 15) = 50/50 = 1,0.\n(c) Solvabiliteit 44,4% is redelijk (meer dan 30% is doorgaans acceptabel). Current ratio 1,0 is minimaal acceptabel: juist voldoende vlottende activa voor kortlopende schulden.'},
{bron:'HAVO Bedrijfseconomie CE 2022 Tijdvak 1 Afschrijvingsvraag (geen afbeelding)',ctx:'Een transportbedrijf koopt een bestelwagen voor 45.000 euro. Verwachte gebruiksduur: 6 jaar. Restwaarde: 9.000 euro. Lineaire afschrijving.',v:'(a) Bereken de jaarlijkse afschrijving.\n(b) Stel de afschrijvingstabel op voor jaar 1 t/m 3 (beginboekwaarde, afschrijving, eindboekwaarde).\n(c) Wat is het effect van afschrijving op de winst-en-verliesrekening?',o:[''],c:0,u:'(a) Jaarlijkse afschrijving = (45.000 min 9.000) gedeeld door 6 = 6.000 euro.\n(b) Jaar 1: 45.000, 6.000, 39.000. Jaar 2: 39.000, 6.000, 33.000. Jaar 3: 33.000, 6.000, 27.000.\n(c) Afschrijving is een kostenpost in de W&V-rekening die de winst verlaagt. Tegelijk daalt de boekwaarde van het activum op de balans.'},
{bron:'HAVO Bedrijfseconomie CE 2024 Tijdvak 2 Jaarrekening (geen afbeelding)',ctx:'Winst-en-verliesrekening Bedrijf Z over het afgelopen jaar:\nOmzet: 850.000 euro\nInkoopwaarde: 510.000 euro\nBrutowinst: 340.000 euro\nVerkoopkosten: 80.000 euro\nAlgemene kosten: 120.000 euro\nAfschrijvingen: 40.000 euro\nBedrijfsresultaat: 100.000 euro\nFinanciele lasten (rente): 20.000 euro',v:'(a) Bereken de nettowinst voor belasting.\n(b) Bereken de RTV als het totale vermogen 500.000 euro is.\n(c) Leg uit wat het bedrijfsresultaat aangeeft.',o:[''],c:0,u:'(a) Nettowinst voor belasting = bedrijfsresultaat min financiele lasten = 100.000 min 20.000 = 80.000 euro.\n(b) RTV = (nettowinst + rente VV) gedeeld door TV maal 100% = (80.000 + 20.000) gedeeld door 500.000 maal 100% = 20%.\n(c) Het bedrijfsresultaat geeft aan hoeveel winst het bedrijf behaalt uit zijn kernactiviteiten, voor aftrek van financieringskosten (rente). Het laat zien hoe winstgevend de bedrijfsvoering zelf is, onafhankelijk van de financieringsstructuur.'}
   ]}
 ]},

{id:'en',naam:'Engels',code:'EN',kleur:'#6366F1',
 beschrijving:'Leesvaardigheid Engels op HAVO-niveau.',
 ceInfo:'CE = leesvaardigheid (domein B). Kijk- en luistervaardigheid, schrijf- en spreekvaardigheid zijn SE-stof.',
 domeinen:[
  {id:'B',naam:'Leesvaardigheid',beschrijving:'Engelse teksten begrijpen, analyseren en interpreteren',
   onderwerpen:['Main idea and supporting details','Vocabulary in context','Inference and implication','Tone, purpose and audience','Text structure and cohesion','Fact vs opinion in English texts','Reference words (pronouns, this/that/these)','Summary and paraphrase skills'],
   sam:'<strong>Main idea</strong>: the central message of the entire text. Look at title, introduction and conclusion. <strong>Supporting details</strong>: examples, facts, statistics that back up the main idea. <strong>Inference</strong>: reading between the lines; the author implies, the reader infers. <strong>Tone</strong>: the attitude of the writer (serious, ironic, humorous, critical). <strong>Purpose</strong>: to inform, persuade, entertain or instruct. <strong>Reference words</strong>: pronouns (it, they, this) refer back to earlier nouns — always check what they replace. <strong>Cohesion markers</strong>: however (contrast), moreover (addition), therefore (result), although (concession). <strong>Vocabulary in context</strong>: use surrounding sentences to guess meaning of unknown words.',
   sv:[
{v:'What does "inference" mean when reading a text?',o:['Drawing a conclusion based on evidence and reasoning rather than explicit statement','Copying the exact words from the text','Summarising the first paragraph','Translating difficult words'],c:0,u:'Inference means reading between the lines. The author implies something; the reader uses clues and background knowledge to infer the meaning.'},
{v:'Which word signals a contrast in English?',o:['However','Moreover','Therefore','Furthermore'],c:0,u:'However signals a contrast or opposition. Moreover and furthermore signal addition. Therefore signals a result or consequence.'},
{v:'What is the difference between tone and purpose?',o:['Tone is the attitude of the writer. Purpose is the reason for writing the text.','They mean the same thing','Tone is about the topic, purpose is about length','Purpose is the attitude, tone is the reason'],c:0,u:'Tone = how the writer feels (ironic, serious, critical). Purpose = what the writer wants to achieve (inform, persuade, entertain).'},
{v:'What should you do when you encounter an unknown word?',o:['Use the surrounding context to determine its meaning','Skip the word entirely','Always look it up in a dictionary during the exam','Guess randomly based on the first letter'],c:0,u:'Context clues: look at the sentence before and after. Synonyms, antonyms, examples or definitions nearby often reveal the meaning.'},
{v:'What is a reference word?',o:['A pronoun or phrase that refers back to something mentioned earlier in the text','A word that defines a technical term','A heading or subheading','A word borrowed from another language'],c:0,u:'Reference words (it, they, this, these, the former) point back to a noun or idea. Identifying the referent is key to understanding the text.'}
   ],
   oe:[
{bron:'HAVO Engels CE 2023 Tijdvak 1 Leesvaardigheid (geen afbeelding)',ctx:'Fragment from an opinion article:\n\n"Social media companies claim they protect young users, yet their own internal research shows that Instagram makes body image issues worse for one in three teenage girls. The platforms profit from engagement, and outrage drives engagement more than anything else."',v:'(a) What is the main argument of this passage?\n(b) The writer uses the word "yet" in the first sentence. What function does this word have?',o:[''],c:0,u:'(a) The main argument is that social media companies prioritise profit over the wellbeing of young users, despite claiming otherwise.\n(b) "Yet" introduces a contrast: it shows that the companies\' actions contradict their claims. It signals that what follows undermines the first statement.'},
{bron:'HAVO Engels CE 2022 Tijdvak 2 Leesvaardigheid (geen afbeelding)',ctx:'Fragment from a science article:\n\n"The octopus has three hearts, blue blood, and a brain that wraps around its throat. Two-thirds of its neurons are in its arms, which means each arm can taste, touch and move independently. Scientists believe this decentralised nervous system is key to the octopus\'s remarkable intelligence."',v:'(a) According to the text, why is the octopus considered intelligent?\n(b) What does "this" in "this decentralised nervous system" refer to?',o:[''],c:0,u:'(a) The octopus is considered intelligent because of its decentralised nervous system: most neurons are in its arms, allowing each arm to function independently.\n(b) "This" refers to the fact that two-thirds of the neurons are in the arms rather than in a central brain, giving each arm independent sensing and movement capabilities.'},
{bron:'HAVO Engels CE 2024 Tijdvak 1 Leesvaardigheid (geen afbeelding)',ctx:'Fragment from a travel essay:\n\n"Tourism can be a double-edged sword. While it brings revenue and jobs to remote communities, it can also erode the very culture and landscapes that attract visitors in the first place. Venice, Barcelona and Dubrovnik have all struggled with overtourism."',v:'(a) Explain the metaphor "double-edged sword" in this context.\n(b) What tone does the writer adopt: enthusiastic, balanced, or dismissive? Justify your answer.',o:[''],c:0,u:'(a) A double-edged sword means something that has both positive and negative effects. Here: tourism brings economic benefits but simultaneously damages culture and environment.\n(b) Balanced. The writer acknowledges both advantages (revenue, jobs) and disadvantages (erosion of culture, overtourism) without clearly favouring one side.'}
   ]}
 ]},

{id:'gs',naam:'Geschiedenis',code:'GS',kleur:'#92400E',
 beschrijving:'Historisch overzicht en historische contexten op HAVO-niveau.',
 ceInfo:'CE = domein B (Orientatiekennis: tien tijdvakken) en historische contexten. Voor 2026: De Republiek der Zeven Verenigde Nederlanden 1515-1648 en De Koude Oorlog 1945-1991.',
 domeinen:[
  {id:'B',naam:'Orientatiekennis',beschrijving:'Tien tijdvakken van de westerse geschiedenis en kenmerkende aspecten',
   onderwerpen:['Tijdvak 1: Jagers en boeren (tot 3000 v.C.)','Tijdvak 2: Grieken en Romeinen (3000 v.C.–500)','Tijdvak 3: Monniken en ridders (500–1000)','Tijdvak 4: Stedelingen en handelaren (1000–1500)','Tijdvak 5: Ontdekkers en hervormers (1500–1600)','Tijdvak 6: Regenten en vorsten (1600–1700)','Tijdvak 7: Pruiken en revoluties (1700–1800)','Tijdvak 8: Burgers en stoommachines (1800–1900)','Tijdvak 9: Wereldoorlogen (1900–1950)','Tijdvak 10: Televisie en computer (1950–heden)'],
   sam:'<strong>Tijdvak 1</strong>: overgang van nomadisch jagen/verzamelen naar landbouw en vaste nederzettingen. <strong>Tijdvak 2</strong>: Griekse democratie (Athene), Romeinse Rijk, verspreiding christendom. <strong>Tijdvak 3</strong>: feodalisme, hofstelsel, verspreiding christendom en islam, Karel de Grote. <strong>Tijdvak 4</strong>: opkomst steden, gilden, kruistochten, groei handel. <strong>Tijdvak 5</strong>: Renaissance, Reformatie (Luther, Calvijn), ontdekkingsreizen. <strong>Tijdvak 6</strong>: absolutisme (Lodewijk XIV), Gouden Eeuw Republiek, wetenschappelijke revolutie. <strong>Tijdvak 7</strong>: Verlichting, Amerikaanse en Franse Revolutie, mensenrechten. <strong>Tijdvak 8</strong>: Industriele Revolutie, nationalisme, socialisme, liberalisme, kolonialisme. <strong>Tijdvak 9</strong>: WO I, interbellum, opkomst fascisme/nazisme, WO II, Holocaust. <strong>Tijdvak 10</strong>: Koude Oorlog, dekolonisatie, Europese eenwording, globalisering.',
   sv:[
{v:'Welk tijdvak wordt gekenmerkt door de overgang van jagen en verzamelen naar landbouw?',o:['Tijdvak 1: Jagers en boeren (tot 3000 v.C.)','Tijdvak 2: Grieken en Romeinen','Tijdvak 3: Monniken en ridders','Tijdvak 4: Stedelingen en handelaren'],c:0,u:'De agrarische revolutie (neolithische revolutie) vond plaats in tijdvak 1. Mensen gingen gewassen verbouwen en dieren domesticeren, wat leidde tot vaste nederzettingen.'},
{v:'Wat is het feodale stelsel?',o:['Een middeleeuws systeem waarbij de koning land uitleende aan edelen in ruil voor militaire steun en trouw','Een democratisch systeem in de Griekse stadstaten','Een handelssysteem tussen steden in de late middeleeuwen','Een religieus systeem binnen de katholieke kerk'],c:0,u:'Feodalisme: de koning gaf land (leen) aan vazallen. Zij leverden militaire dienst en trouw. De boeren (horigen) bewerkten het land en waren gebonden aan de grond.'},
{v:'Wat was de kern van de Verlichting (18e eeuw)?',o:['Nadruk op rede, wetenschap en individuele rechten als basis voor vooruitgang en kritiek op kerk en absolutisme','Terugkeer naar klassieke Griekse kunst en filosofie','Verspreiding van het christendom over Europa','Industrialisatie en mechanisatie van arbeid'],c:0,u:'Verlichting: filosofen als Voltaire, Montesquieu en Rousseau bepleitten rede boven traditie, scheiding der machten en volkssoevereiniteit. Basis voor de Franse en Amerikaanse Revolutie.'},
{v:'Wat kenmerkt het absolutisme?',o:['Alle macht is geconcentreerd bij de vorst, die regeert bij de gratie Gods zonder controle van een parlement','De vorst deelt de macht met het parlement','Het volk kiest zijn eigen leider','De kerk heeft de hoogste politieke macht'],c:0,u:'Absolutisme: de vorst heeft onbeperkte macht. Lodewijk XIV van Frankrijk is het bekendste voorbeeld. Zijn uitspraak L etat c est moi (de staat, dat ben ik) vat het samen.'},
{v:'Welke ideologieen ontstonden in de 19e eeuw als reactie op de Industriele Revolutie?',o:['Socialisme (arbeidersrechten), liberalisme (individuele vrijheid en vrije markt) en nationalisme (eenheid van het volk)','Feodalisme en absolutisme','Humanisme en Renaissance','Calvinisme en lutheranisme'],c:0,u:'De Industriele Revolutie leidde tot slechte arbeidsomstandigheden. Socialisme (Marx) wilde gelijkheid. Liberalisme wilde individuele vrijheid. Nationalisme streefde naar eenheid van volkeren in natiestaten.'}
   ],
   oe:[
{bron:'HAVO Geschiedenis CE 2023 Tijdvak 1 Orientatiekennis (geen afbeelding)',ctx:'In de 16e eeuw verspreidde de Reformatie zich over Europa. Martin Luther publiceerde in 1517 zijn 95 stellingen tegen de aflaathandel van de Rooms-Katholieke Kerk.',v:'(a) Leg uit waarom Luther bezwaar had tegen de aflaathandel.\n(b) Noem twee gevolgen van de Reformatie voor de politieke situatie in Europa.',o:[''],c:0,u:'(a) Luther vond dat vergeving van zonden niet gekocht kon worden. Aflaten waren volgens hem onbijbels en werden misbruikt door de kerk om geld te verdienen.\n(b) 1. Godsdienstoorlogen tussen katholieken en protestanten. 2. Politieke versnippering: vorsten kozen voor protestantisme om onafhankelijk te worden van de paus en kerkelijk bezit te confisqueren.'},
{bron:'HAVO Geschiedenis CE 2022 Tijdvak 2 Orientatiekennis (geen afbeelding)',ctx:'De Franse Revolutie begon in 1789 met de bestorming van de Bastille. De revolutionairen streefden naar vrijheid, gelijkheid en broederschap.',v:'(a) Welke verlichtingsideeën lagen ten grondslag aan de Franse Revolutie?\n(b) Waarom wordt de Franse Revolutie gezien als een keerpunt in de Europese geschiedenis?',o:[''],c:0,u:'(a) Volkssoevereiniteit (Rousseau), scheiding der machten (Montesquieu), individuele vrijheden en gelijkheid voor de wet.\n(b) Keerpunt: einde van het Ancien Regime (standenmaatschappij), invoering van burgerrechten, inspiratie voor democratische bewegingen in heel Europa. De macht verschoof van adel en kerk naar het volk.'},
{bron:'HAVO Geschiedenis CE 2024 Tijdvak 1 Orientatiekennis (geen afbeelding)',ctx:'Na de Tweede Wereldoorlog werd Europa verdeeld in een westers en een oostelijk blok. De Verenigde Staten en de Sovjet-Unie stonden als supermachten tegenover elkaar.',v:'(a) Leg uit wat de Koude Oorlog was.\n(b) Noem twee gebeurtenissen die de spanning tussen Oost en West illustreren.',o:[''],c:0,u:'(a) De Koude Oorlog was een periode van politieke en ideologische spanning tussen de VS (kapitalisme, democratie) en de Sovjet-Unie (communisme), zonder direct militair conflict tussen beide.\n(b) Twee uit: Blokkade van Berlijn (1948-49), Cubacrisis (1962), Bouw van de Berlijnse Muur (1961), Koreaanse Oorlog (1950-53), Vietnamoorlog.'}
   ]},
  {id:'C',naam:'De Republiek 1515-1648',beschrijving:'Historische context: De Republiek der Zeven Verenigde Nederlanden',
   onderwerpen:['De Opstand tegen Spanje (1568)','Willem van Oranje en het verzet','De Unie van Utrecht (1579)','De val van Antwerpen (1585)','De VOC en overzeese handel','Religieuze tolerantie en vluchtelingen','Economische bloei van de Republiek','Bestuur: stadhouder, Staten-Generaal, regenten'],
   sam:'<strong>Opstand</strong>: de Nederlanden kwamen in opstand tegen Filips II van Spanje vanwege belastingdruk, centralisatiepolitiek en geloofsvervolging (inquisitie tegen protestanten). <strong>Willem van Oranje</strong>: leider van de opstand, pleitte voor gewetensvrijheid. <strong>Unie van Utrecht (1579)</strong>: verbond van noordelijke gewesten, basis voor de Republiek. <strong>Val van Antwerpen (1585)</strong>: Antwerpen viel terug aan Spanje, kooplieden vluchtten naar Amsterdam, stimulans voor economische bloei. <strong>VOC (1602)</strong>: eerste multinationale handelsonderneming, monopolie op Aziatische handel, aandelenuitgifte. <strong>Tolerantie</strong>: de Republiek bood relatieve godsdienstvrijheid, aantrekkelijk voor vluchtelingen (Joden, Hugenoten) die kennis en kapitaal meebrachten. <strong>Bestuur</strong>: geen koning maar stadhouder (militair leider uit Huis van Oranje) en Staten-Generaal (vertegenwoordiging gewesten). Regenten (rijke kooplieden) hadden grote politieke invloed.',
   sv:[
{v:'Waarom kwamen de Nederlanden in opstand tegen Filips II?',o:['Belastingdruk, centralisatiepolitiek en geloofsvervolging van protestanten door de inquisitie','Filips II wilde de VOC oprichten','De Nederlanden wilden zich bij Frankrijk aansluiten','Filips II verbood alle handel'],c:0,u:'Drie hoofdoorzaken: hoge belastingen, Filips centraliseerde de macht ten koste van lokale privileges, en de inquisitie vervolgde protestanten.'},
{v:'Wat was de Unie van Utrecht (1579)?',o:['Een verbond van noordelijke gewesten dat de basis vormde voor de Republiek der Zeven Verenigde Nederlanden','Een vredesverdrag met Spanje','Een handelsovereenkomst met Engeland','Een religieus akkoord tussen katholieken en protestanten'],c:0,u:'De Unie van Utrecht bond de noordelijke gewesten samen in militair en politiek opzicht. Het was het fundament van de latere Republiek.'},
{v:'Welk gevolg had de val van Antwerpen (1585) voor Amsterdam?',o:['Kooplieden en vaklieden vluchtten naar Amsterdam, wat bijdroeg aan de economische bloei van Holland','Amsterdam werd veroverd door Spanje','De handel in Amsterdam stortte in','Antwerpen werd de hoofdstad van de Republiek'],c:0,u:'Na de val van Antwerpen vluchtten duizenden kooplieden, bankiers en vaklieden naar het noorden, vooral naar Amsterdam. Ze brachten kapitaal, kennis en handelsnetwerken mee.'},
{v:'Wat was de VOC?',o:['De Verenigde Oost-Indische Compagnie: de eerste multinationale met aandelenuitgifte en monopolie op Aziatische handel','Een militaire organisatie tegen Spanje','Een religieuze instelling','Het bestuur van de Republiek'],c:0,u:'De VOC (1602) was een handelsonderneming met overheidsmonopolie op de handel ten oosten van Kaap de Goede Hoop. Ze gaf de eerste aandelen ter wereld uit.'},
{v:'Hoe was het bestuur van de Republiek georganiseerd?',o:['Geen koning maar een stadhouder als militair leider, Staten-Generaal als vergadering van gewesten, en regenten als bestuurders in de steden','Een absolute monarchie onder Willem van Oranje','Een democratie met algemeen kiesrecht','Een theocratie geleid door de calvinistische kerk'],c:0,u:'De Republiek had een uniek bestuur: de stadhouder (Oranje) leidde het leger, de Staten-Generaal namen besluiten namens de gewesten, en rijke regenten bestuurden de steden.'}
   ],
   oe:[
{bron:'HAVO Geschiedenis CE 2023 Tijdvak 2 Republiek (geen afbeelding)',ctx:'Willem van Oranje schreef in 1580 zijn Apologie, een verdedigingsschrift tegen de beschuldigingen van Filips II. Hierin verdedigde hij het recht van de onderdanen om in opstand te komen tegen een tiran.',v:'(a) Waarom schreef Willem van Oranje de Apologie?\n(b) Welk verlichtingsidee lijkt op Willems standpunt? Leg de overeenkomst uit.',o:[''],c:0,u:'(a) Filips II had Willem vogelvrij verklaard. De Apologie was een verdediging: Willem stelde dat Filips zijn plichten als vorst had geschonden door zijn onderdanen te vervolgen.\n(b) Volkssoevereiniteit (Rousseau): als een vorst het sociaal contract schendt, heeft het volk het recht in opstand te komen. Willem beargumenteerde al in 1580 dat een tiran zijn legitimiteit verliest.'},
{bron:'HAVO Geschiedenis CE 2022 Tijdvak 1 Republiek (geen afbeelding)',ctx:'In de 17e eeuw was de Republiek een toevluchtsoord voor religieuze vluchtelingen uit heel Europa: Joden uit Portugal en Spanje, Hugenoten uit Frankrijk en protestanten uit de Zuidelijke Nederlanden.',v:'(a) Waarom was de Republiek aantrekkelijk voor religieuze vluchtelingen?\n(b) Welk economisch voordeel hadden deze vluchtelingen voor de Republiek?',o:[''],c:0,u:'(a) De Republiek kende relatieve godsdienstvrijheid: hoewel de gereformeerde kerk bevoorrecht was, werden andere geloven (katholiek, joods, luthers) in de praktijk getolereerd.\n(b) Vluchtelingen brachten kapitaal, handelsnetwerken, ambachtelijke kennis en internationale contacten mee. Portugese Joden brachten kennis van de diamanthandel, Hugenoten brachten textieltechnologie.'},
{bron:'HAVO Geschiedenis CE 2024 Tijdvak 2 Republiek (geen afbeelding)',ctx:'De VOC werd in 1602 opgericht door de Staten-Generaal. Ze kreeg het monopolie op de handel in Azie en had het recht om verdragen te sluiten, forten te bouwen en oorlog te voeren.',v:'(a) Waarom richtten de Staten-Generaal de VOC op als een monopolie?\n(b) De VOC gaf aandelen uit. Leg uit waarom dit een vernieuwing was.',o:[''],c:0,u:'(a) Een monopolie voorkwam onderlinge concurrentie tussen Nederlandse handelaren, bundelde kapitaal en versterkte de positie tegenover buitenlandse concurrenten (Portugal, Engeland).\n(b) Door aandelenuitgifte kon de VOC groot kapitaal ophalen bij veel investeerders. Risico werd gespreid. Aandelen waren verhandelbaar op de Amsterdamse beurs: de eerste aandelenbeurs ter wereld.'}
   ]},
  {id:'D',naam:'De Koude Oorlog 1945-1991',beschrijving:'Historische context: De Koude Oorlog en de tweedeling van de wereld',
   onderwerpen:['Ontstaan Koude Oorlog: ideologische tegenstelling','Trumandoctrine en Marshallplan','NAVO en Warschaupact','Berlijnse Muur en deling van Duitsland','Cubacrisis (1962)','Detente en wapenwedloop','Vietnamoorlog','Val van de Muur (1989) en einde Sovjet-Unie (1991)'],
   sam:'<strong>Ideologische tegenstelling</strong>: VS (kapitalisme, democratie, vrije markt) vs. Sovjet-Unie (communisme, planeconomie, eenpartijstaat). <strong>Trumandoctrine (1947)</strong>: VS steunt landen die bedreigd worden door communisme (containment). <strong>Marshallplan (1948)</strong>: Amerikaanse economische hulp aan West-Europa, versterkt westerse invloedssfeer. <strong>NAVO (1949)</strong>: westerse militaire alliantie. <strong>Warschaupact (1955)</strong>: oostelijke militaire alliantie. <strong>Berlijnse Muur (1961)</strong>: scheidde Oost- en West-Berlijn, symbool van de deling. <strong>Cubacrisis (1962)</strong>: Sovjet-raketten op Cuba, hoogtepunt spanning, bijna kernoorlog. <strong>Detente (jaren 70)</strong>: ontspanning, wapenbeheersingsverdragen (SALT). <strong>Val Muur (1989)</strong>: einde IJzeren Gordijn. <strong>1991</strong>: Sovjet-Unie valt uiteen, einde Koude Oorlog.',
   sv:[
{v:'Wat was de Trumandoctrine?',o:['Het Amerikaanse beleid om landen te steunen die bedreigd werden door communisme (containment)','Een Sovjet-plan om communisme in Europa te verspreiden','Een economisch hulpprogramma voor Oost-Europa','Een wapenbeheersingsverdrag tussen VS en Sovjet-Unie'],c:0,u:'President Truman verklaarde in 1947 dat de VS vrije volkeren zou helpen die bedreigd werden door communistische expansie. Dit containmentbeleid was de basis van de Amerikaanse Koude-Oorlogstrategie.'},
{v:'Waarom werd de Berlijnse Muur gebouwd (1961)?',o:['Om te voorkomen dat Oost-Duitsers naar het welvarende West-Berlijn vluchtten','Om West-Berlijn te beschermen tegen een Sovjet-invasie','Als onderdeel van het Marshallplan','Om de NAVO-grens te markeren'],c:0,u:'Miljoenen Oost-Duitsers vluchtten naar het Westen via Berlijn. De DDR bouwde de Muur om deze braindrain te stoppen. De Muur werd het symbool van de deling van Europa.'},
{v:'Wat was de Cubacrisis (1962)?',o:['De ontdekking van Sovjet-kernraketten op Cuba, waardoor de VS en Sovjet-Unie op de rand van een kernoorlog stonden','Een handelsconflict tussen de VS en Cuba','De invasie van Cuba door Amerikaanse troepen','Een diplomatiek conflict over de Berlijnse Muur'],c:0,u:'Chroesjtsjov plaatste kernraketten op Cuba. Kennedy eiste verwijdering en blokkeerde Cuba met de marine. Na 13 dagen spanning werden de raketten teruggetrokken in ruil voor verwijdering van Amerikaanse raketten uit Turkije.'},
{v:'Wat betekende detente in de context van de Koude Oorlog?',o:['Een periode van ontspanning en diplomatiek overleg tussen Oost en West in de jaren 70','De opbouw van kernwapens door beide supermachten','Het einde van de Koude Oorlog in 1991','De oprichting van de NAVO'],c:0,u:'Detente: na de gevaarlijke jaren 50-60 zochten beide zijden naar ontspanning. SALT-verdragen beperkten kernwapens. Helsingkiakkoorden (1975) verbeterden mensenrechten in Oost-Europa.'},
{v:'Waardoor viel de Sovjet-Unie uiteen in 1991?',o:['Economische stagnatie, Gorbatsjovs hervormingen (glasnost en perestrojka) en nationalistische bewegingen in Sovjet-republieken','Een militaire nederlaag tegen de NAVO','Een succesvolle staatsgreep door het leger','De VS veroverde Moskou'],c:0,u:'Gorbatsjov voerde glasnost (openheid) en perestrojka (hervorming) in. De economie stortte in, Sovjet-republieken eisten onafhankelijkheid. Na een mislukte staatsgreep in 1991 viel de Sovjet-Unie uiteen.'}
   ],
   oe:[
{bron:'HAVO Geschiedenis CE 2023 Tijdvak 1 Koude Oorlog (geen afbeelding)',ctx:'In 1948 blokkeerde de Sovjet-Unie alle wegen en spoorlijnen naar West-Berlijn. De westerse geallieerden reageerden met een luchtbrug die bijna een jaar duurde.',v:'(a) Waarom blokkeerde Stalin de toegang tot West-Berlijn?\n(b) Waarom kozen de westerse geallieerden voor een luchtbrug in plaats van een militaire doorbraak?',o:[''],c:0,u:'(a) De westerse geallieerden voerden een nieuwe munt in (D-Mark) in hun zones, inclusief West-Berlijn. Stalin zag dit als provocatie en wilde West-Berlijn dwingen zich bij de Sovjet-zone aan te sluiten.\n(b) Een militaire doorbraak zou directe oorlog met de Sovjet-Unie betekenen, met risico op kernoorlog. De luchtbrug was een vreedzaam alternatief dat West-Berlijn bevoorraadde zonder militaire confrontatie.'},
{bron:'HAVO Geschiedenis CE 2022 Tijdvak 2 Koude Oorlog (geen afbeelding)',ctx:'Het Marshallplan (1948) bood miljarden dollars aan economische hulp aan West-Europese landen. De Sovjet-Unie wees het plan af en verbood Oost-Europese landen om deel te nemen.',v:'(a) Welke twee doelen had het Marshallplan voor de VS?\n(b) Waarom weigerde de Sovjet-Unie deelname?',o:[''],c:0,u:'(a) 1. Economisch herstel van Europa voorkwam dat armoede leidde tot communistische sympathie. 2. Welvarende Europese landen waren betere handelspartners voor Amerikaanse export.\n(b) De Sovjet-Unie zag het Marshallplan als een instrument van Amerikaans imperialisme dat Oost-Europa in de westerse invloedssfeer zou trekken. Deelname zou de Sovjet-controle over satellietstaten ondermijnen.'},
{bron:'HAVO Geschiedenis CE 2024 Tijdvak 1 Koude Oorlog (geen afbeelding)',ctx:'In 1985 werd Gorbatsjov leider van de Sovjet-Unie. Hij voerde glasnost (openheid) en perestrojka (economische hervorming) in.',v:'(a) Wat hield glasnost in en wat was het effect?\n(b) Leg uit waarom Gorbatsjovs hervormingen uiteindelijk leidden tot het einde van de Sovjet-Unie.',o:[''],c:0,u:'(a) Glasnost: meer vrijheid van meningsuiting en pers. Effect: burgers konden openlijk kritiek uiten op het systeem, misstanden werden zichtbaar, nationalistische bewegingen kregen ruimte.\n(b) Glasnost maakte kritiek mogelijk, perestrojka faalde economisch. Sovjet-republieken eisten onafhankelijkheid. Gorbatsjov weigerde militair in te grijpen (anders dan voorgangers). Het systeem implodeerde door de combinatie van economische crisis en politieke vrijheid.'}
   ]}
 ]},

{id:'ak',naam:'Aardrijkskunde',code:'AK',kleur:'#059669',
 beschrijving:'Leefomgeving, wonen en wereld op HAVO-niveau.',
 ceInfo:'CE = domein B (Wereld), domein C (Aarde) en domein D (Leefomgeving). Vaardigheden (domein A) zijn verweven door alle CE-onderdelen.',
 domeinen:[
  {id:'B',naam:'Wereld',beschrijving:'Globalisering, ontwikkelingsvraagstukken en mondiale patronen',
   onderwerpen:['Globalisering: handel, migratie en cultuur','Centrum-periferiemodel','Ontwikkelingsindicatoren (BNP, HDI, Gini)','Internationale arbeidsverdeling','Multinationale ondernemingen','Migratie: push- en pullfactoren','Demografische transitie'],
   sam:'<strong>Globalisering</strong>: toenemende mondiale verbondenheid in handel, communicatie, migratie en cultuur. <strong>Centrum-periferie</strong>: rijke kernlanden (VS, EU, Japan) domineren economisch; perifere landen leveren grondstoffen. Semiperiferie (BRICS) groeit snel. <strong>HDI</strong>: Human Development Index meet welvaart via levensverwachting, onderwijs en inkomen (0-1). <strong>Gini-coefficient</strong>: maat voor inkomensongelijkheid (0 = gelijk, 1 = ongelijk). <strong>Internationale arbeidsverdeling</strong>: productieprocessen verspreid over landen. Hoofdkantoor in kernland, productie in lagelonenlanden. <strong>Push-factoren migratie</strong>: armoede, oorlog, vervolging. <strong>Pull-factoren</strong>: werkgelegenheid, veiligheid, vrijheid. <strong>Demografische transitie</strong>: 4 fasen van hoog geboortecijfer/sterftecijfer naar laag/laag, met bevolkingsgroei in fase 2-3.',
   sv:[
{v:'Wat meet de HDI?',o:['Welvaart op basis van levensverwachting, onderwijs en inkomen per hoofd van de bevolking','Alleen het bruto nationaal product per capita','De mate van globalisering van een land','De CO2-uitstoot per inwoner'],c:0,u:'HDI (Human Development Index) combineert drie dimensies: gezondheid (levensverwachting), kennis (onderwijs) en levensstandaard (BNI per capita). Score tussen 0 en 1.'},
{v:'Wat zijn push- en pullfactoren bij migratie?',o:['Pushfactoren duwen mensen weg uit hun land (oorlog, armoede). Pullfactoren trekken mensen naar een ander land (werk, veiligheid).','Push is economisch, pull is cultureel','Push gaat over immigratie, pull over emigratie','Er is geen verschil'],c:0,u:'Push: factoren in het herkomstland die vertrek aandrijven. Pull: factoren in het bestemmingsland die aantrekken. Migratie is het resultaat van beide.'},
{v:'Wat is het centrum-periferiemodel?',o:['Rijke kernlanden domineren economisch en politiek, perifere landen zijn afhankelijk en leveren grondstoffen','Een model over stadsontwikkeling','Een geologisch model over de aardkern','Een klimaatmodel'],c:0,u:'Centrum (VS, EU, Japan): hightechproductie, diensten, macht. Periferie (veel Afrikaanse landen): afhankelijk van grondstofexport. Semiperiferie (BRICS): opkomende economieen.'},
{v:'Wat is demografische transitie?',o:['Een model dat de overgang beschrijft van hoog geboorte- en sterftecijfer naar laag geboorte- en sterftecijfer in vier fasen','De verhuizing van mensen van platteland naar stad','De overgang van landbouw naar industrie','Een model voor klimaatverandering'],c:0,u:'Fase 1: hoog geboorte- en sterftecijfer, stabiele bevolking. Fase 2: sterftecijfer daalt, bevolking groeit snel. Fase 3: geboortecijfer daalt, groei vertraagt. Fase 4: beide laag, stabiele bevolking.'},
{v:'Wat is de Gini-coefficient?',o:['Een maat voor inkomensongelijkheid: 0 betekent volledige gelijkheid, 1 betekent maximale ongelijkheid','Een maat voor economische groei','Het gemiddelde inkomen per land','Een index voor biodiversiteit'],c:0,u:'Gini 0 = iedereen verdient evenveel. Gini 1 = een persoon verdient alles. Hoge Gini (bijv. Zuid-Afrika) wijst op grote kloof tussen arm en rijk.'}
   ],
   oe:[
{bron:'HAVO Aardrijkskunde CE 2023 Tijdvak 1 (geen afbeelding)',ctx:'Bangladesh is een van de dichtstbevolkte landen ter wereld. Miljoenen Bengalen werken in textielfabrieken voor westerse merken. Het minimumloon is een van de laagste ter wereld.',v:'(a) Leg uit waarom westerse kledingmerken productie uitbesteden aan Bangladesh.\n(b) Gebruik het centrum-periferiemodel om de positie van Bangladesh te beschrijven.',o:[''],c:0,u:'(a) Lage loonkosten, grote arbeidspool, minder strenge milieu- en arbeidswetgeving. Dit verlaagt de productiekosten voor westerse merken.\n(b) Bangladesh is een perifeer land: het levert goedkope arbeid aan kernlanden (VS, EU). De toegevoegde waarde en winst gaan grotendeels naar de kernlanden (hoofdkantoren, merken). Bangladesh is afhankelijk van deze exportindustrie.'},
{bron:'HAVO Aardrijkskunde CE 2022 Tijdvak 2 (geen afbeelding)',ctx:'India bevindt zich in fase 3 van de demografische transitie. Het geboortecijfer daalt maar is nog hoger dan het sterftecijfer.',v:'(a) Beschrijf wat er in fase 3 van de demografische transitie gebeurt.\n(b) Noem twee factoren die bijdragen aan de daling van het geboortecijfer in India.',o:[''],c:0,u:'(a) Fase 3: geboortecijfer daalt richting sterftecijfer. De bevolking groeit nog maar steeds langzamer. Urbanisatie en veranderende normen spelen een rol.\n(b) Twee uit: betere toegang tot onderwijs (vooral voor vrouwen), beschikbaarheid anticonceptie, urbanisatie (minder behoefte aan veel kinderen), hogere kosten van kinderopvoeding in de stad.'},
{bron:'HAVO Aardrijkskunde CE 2024 Tijdvak 1 (geen afbeelding)',ctx:'De Gini-coefficient van Zweden is 0,27 en van Brazilie is 0,53.',v:'(a) Wat zeggen deze getallen over de inkomensverdeling in beide landen?\n(b) Noem twee mogelijke oorzaken voor het verschil.',o:[''],c:0,u:'(a) Zweden (0,27): relatief gelijke inkomensverdeling. Brazilie (0,53): grote inkomensongelijkheid, grote kloof tussen arm en rijk.\n(b) Twee uit: Zweden heeft een sterk sociaal vangnet en progressief belastingstelsel. Brazilie heeft historische landongelijkheid, beperktere sociale voorzieningen, en grote regionale verschillen in ontwikkeling.'}
   ]},
  {id:'C',naam:'Aarde',beschrijving:'Natuurlijke systemen: klimaat, weer, tectoniek en waterkringloop',
   onderwerpen:['Platentektoniek en aardbevingen','Vulkanisme en gebergtevorming','Weer en klimaat: verschil en factoren','Klimaatzones en klimaatclassificatie','Waterkringloop en grondwater','Klimaatverandering en broeikaseffect','Verwering en erosie'],
   sam:'<strong>Platentektoniek</strong>: aardkorst bestaat uit platen die bewegen op de mantel. Divergerend (uit elkaar, rift), convergerend (naar elkaar, subductie/gebergte), transform (langs elkaar, breuk). <strong>Aardbevingen</strong>: bij plaatgrenzen, door spanning in de korst. Richter: magnitude. <strong>Vulkanisme</strong>: bij convergerende grenzen en hotspots. Magma bereikt oppervlak. <strong>Weer vs klimaat</strong>: weer = korte termijn, lokaal. Klimaat = gemiddelde weersomstandigheden over 30+ jaar. <strong>Broeikaseffect</strong>: CO2, methaan houden warmte vast. Versterkt broeikaseffect door fossiele brandstoffen leidt tot opwarming. <strong>Waterkringloop</strong>: verdamping, condensatie, neerslag, afvoer, infiltratie. <strong>Verwering</strong>: afbraak van gesteente door fysische (vorst), chemische (zure regen) of biologische processen.',
   sv:[
{v:'Wat gebeurt er bij een convergerende plaatgrens?',o:['Twee platen bewegen naar elkaar toe, wat leidt tot subductie, gebergtevorming of aardbevingen','Twee platen bewegen van elkaar af','Twee platen glijden langs elkaar','De platen staan stil'],c:0,u:'Convergerend: oceaanplaat duikt onder continentale plaat (subductie, diepzeetrog, vulkanisme) of twee continentale platen botsen (gebergtevorming, bijv. Himalaya).'},
{v:'Wat is het verschil tussen weer en klimaat?',o:['Weer is de toestand van de atmosfeer op een bepaald moment en plaats. Klimaat is het gemiddelde weer over minimaal 30 jaar.','Weer gaat over temperatuur, klimaat over neerslag','Er is geen verschil','Klimaat verandert dagelijks, weer niet'],c:0,u:'Weer: vandaag regent het. Klimaat: in dit gebied valt gemiddeld 800 mm neerslag per jaar. Klimaat is statistisch, weer is actueel.'},
{v:'Wat is het versterkte broeikaseffect?',o:['De toename van broeikasgassen door menselijke activiteit, waardoor meer warmte wordt vastgehouden en de aarde opwarmt','Het natuurlijke broeikaseffect zonder menselijke invloed','De afname van de ozonlaag','De toename van zuurstof in de atmosfeer'],c:0,u:'Natuurlijk broeikaseffect houdt de aarde leefbaar (gemiddeld 15 graden C). Door verbranding van fossiele brandstoffen stijgt CO2, wordt meer warmte vastgehouden en stijgt de temperatuur.'},
{v:'Wat is subductie?',o:['Het proces waarbij een oceaanplaat onder een andere plaat duikt bij een convergerende grens','Het proces waarbij twee platen van elkaar af bewegen','Het ontstaan van een vulkaan op een hotspot','De horizontale verplaatsing van een breuk'],c:0,u:'Subductie: de zwaardere oceaanplaat duikt onder de lichtere continentale plaat. Hierbij ontstaan diepzeetroggen, vulkanen en aardbevingen.'},
{v:'Welke drie vormen van verwering zijn er?',o:['Fysische (vorst, temperatuurwisseling), chemische (oplossing, zure regen) en biologische (plantenwortels, organismen)','Alleen fysische en chemische','Erosie, sedimentatie en verwering','Verwering bestaat uit een proces'],c:0,u:'Fysisch: mechanische afbraak (vorstsplijting). Chemisch: reactie van gesteente met water/zuren. Biologisch: wortels dringen in spleten, organismen breken gesteente af.'}
   ],
   oe:[
{bron:'HAVO Aardrijkskunde CE 2023 Tijdvak 2 (geen afbeelding)',ctx:'Japan ligt op het snijpunt van vier tektonische platen. Het land wordt regelmatig getroffen door aardbevingen en tsunami\'s.',v:'(a) Leg uit waarom Japan zo vaak aardbevingen heeft.\n(b) Beschrijf hoe een tsunami kan ontstaan bij een aardbeving.',o:[''],c:0,u:'(a) Japan ligt bij convergerende plaatgrenzen: de Pacifische plaat duikt onder de Euraziatische en Filipijnse plaat (subductie). De spanning die opbouwt wordt als aardbevingen vrijgegeven.\n(b) Een onderzeeese aardbeving verplaatst de zeebodem verticaal. Dit duwt een enorme watermassa omhoog, die als golf richting de kust beweegt. In ondiep water wordt de golf hoger en breekt als tsunami op de kust.'},
{bron:'HAVO Aardrijkskunde CE 2022 Tijdvak 1 (geen afbeelding)',ctx:'De gemiddelde temperatuur op aarde is sinds 1900 met circa 1,1 graden gestegen. De concentratie CO2 in de atmosfeer is gestegen van 280 naar ruim 420 ppm.',v:'(a) Leg het verband uit tussen CO2-concentratie en temperatuurstijging.\n(b) Noem twee gevolgen van klimaatverandering voor kustregio\'s.',o:[''],c:0,u:'(a) CO2 is een broeikasgas: het absorbeert warmtestraling van de aarde en straalt die deels terug. Hogere CO2-concentratie versterkt dit effect, waardoor de gemiddelde temperatuur stijgt.\n(b) Twee uit: zeespiegelstijging door smelten landijs en uitzetten van water, kusterosie neemt toe, overstromingsrisico stijgt, verzilting van grondwater in kustgebieden.'},
{bron:'HAVO Aardrijkskunde CE 2024 Tijdvak 2 (geen afbeelding)',ctx:'IJsland ligt op de Mid-Atlantische Rug, een divergerende plaatgrens. Het eiland heeft veel vulkanen en geisers.',v:'(a) Leg uit waarom IJsland veel vulkanisme kent.\n(b) IJsland gebruikt aardwarmte (geothermische energie). Leg uit hoe dit samenhangt met de tektonische ligging.',o:[''],c:0,u:'(a) IJsland ligt op een divergerende plaatgrens waar de Noord-Amerikaanse en Euraziatische plaat uit elkaar bewegen. Magma stijgt op in de spleet, wat vulkanisme veroorzaakt. Bovendien ligt IJsland boven een hotspot.\n(b) Door de dunne korst en nabijheid van magma is de temperatuur ondergronds hoog. IJsland pompt heet water/stoom op om huizen te verwarmen en elektriciteit op te wekken.'}
   ]},
  {id:'D',naam:'Leefomgeving',beschrijving:'Stedelijke en landelijke gebieden in Nederland en Europa',
   onderwerpen:['Verstedelijking en suburbanisatie','Ruimtelijke ordening in Nederland','Segregatie en gentrificatie','Bereikbaarheid en mobiliteit','Overstromingsrisico en waterbeheer','Leefbaarheid en functiemenging','Duurzame gebiedsontwikkeling'],
   sam:'<strong>Verstedelijking</strong>: groei van steden door migratie en natuurlijke aanwas. <strong>Suburbanisatie</strong>: trek van stad naar buitenwijken (ruimte, groen). <strong>Reurbanisatie</strong>: terugkeer naar de stad (voorzieningen, werk). <strong>Gentrificatie</strong>: opwaardering van oude wijken; hogere inkomensgroepen trekken in, oorspronkelijke bewoners worden verdrongen, huren stijgen. <strong>Segregatie</strong>: ruimtelijke scheiding van bevolkingsgroepen naar inkomen, etniciteit of leeftijd. <strong>Ruimtelijke ordening NL</strong>: overheid stuurt via bestemmingsplannen, Structuurvisie, NOVI. Deltaplan: bescherming tegen overstromingen. <strong>Waterbeheer</strong>: waterschappen, dijken, Maeslantkering, Ruimte voor de Rivier. <strong>Functiemenging</strong>: wonen, werken en voorzieningen in dezelfde wijk voor leefbaarheid.',
   sv:[
{v:'Wat is gentrificatie?',o:['De opwaardering van een verouderde stadswijk waarbij hogere inkomensgroepen instromen en oorspronkelijke bewoners worden verdrongen door stijgende huren','Het verlaten van de stad richting buitenwijken','De aanleg van nieuwe bedrijventerreinen','Het samenvoegen van gemeenten'],c:0,u:'Gentrificatie: investeerders en hogere inkomensgroepen renoveren een oude wijk. Huren stijgen, oorspronkelijke bewoners kunnen het niet meer betalen en vertrekken.'},
{v:'Wat houdt het programma Ruimte voor de Rivier in?',o:['Rivieren meer ruimte geven door dijkverlegging, uiterwaardverlaging en bypasses, zodat water veilig kan worden afgevoerd bij hoog water','Het bouwen van hogere dijken langs alle rivieren','Het afsluiten van alle rivieren met dammen','Het verplaatsen van steden weg van rivieren'],c:0,u:'Ruimte voor de Rivier: in plaats van dijken alleen maar te verhogen, krijgt de rivier meer ruimte. Uiterwaarden worden verlaagd, nevengeulen gegraven en dijken verlegd. Dit verlaagt de waterstand bij hoog water.'},
{v:'Wat is het verschil tussen verstedelijking en suburbanisatie?',o:['Verstedelijking is de groei van steden. Suburbanisatie is de trek vanuit de stad naar omliggende buitenwijken.','Ze betekenen hetzelfde','Verstedelijking gaat over buitenwijken','Suburbanisatie is de groei van steden'],c:0,u:'Verstedelijking: mensen trekken naar de stad (werkgelegenheid). Suburbanisatie: mensen trekken juist weg uit de stad naar buitenwijken (meer ruimte, groen, kindvriendelijk).'},
{v:'Wat is ruimtelijke segregatie?',o:['De ruimtelijke scheiding van bevolkingsgroepen in een stad naar inkomen, etniciteit of leeftijd','Een type stadsplanning waarbij functies gemengd worden','De verdeling van groen en grijs in een stad','Het verschil tussen stad en platteland'],c:0,u:'Segregatie: verschillende groepen wonen gescheiden. Kan ontstaan door woningprijzen (arme en rijke wijken), discriminatie of eigen keuze. Kan leiden tot ongelijke kansen.'},
{v:'Wat is functiemenging?',o:['Het combineren van wonen, werken en voorzieningen in dezelfde wijk of buurt','Het scheiden van woon- en werkgebieden','Het bouwen van alleen kantoren in een wijk','Het verplaatsen van industrie naar de stadsrand'],c:0,u:'Functiemenging verhoogt de leefbaarheid: mensen hoeven minder te reizen, de wijk is levendiger, en voorzieningen zijn dichtbij. Tegenovergestelde is functiescheiding (modernistische stedenbouw).'}
   ],
   oe:[
{bron:'HAVO Aardrijkskunde CE 2023 Tijdvak 1 (geen afbeelding)',ctx:'In Amsterdam-Noord vond de afgelopen jaren sterke gentrificatie plaats. Voormalige industrieterreinen werden omgebouwd tot hippe woningen en creatieve werkplekken. De gemiddelde huurprijs steeg met 40%.',v:'(a) Beschrijf het proces van gentrificatie in Amsterdam-Noord.\n(b) Noem een voordeel en een nadeel van gentrificatie voor de buurt.',o:[''],c:0,u:'(a) Oude industriegebieden worden herontwikkeld. Creatieve ondernemers en hogere inkomensgroepen vestigen zich. Woningen worden gerenoveerd, voorzieningen verbeteren, maar huren stijgen sterk.\n(b) Voordeel: de wijk wordt fysiek aantrekkelijker, meer voorzieningen, minder verloedering. Nadeel: oorspronkelijke bewoners met lagere inkomens worden verdrongen door hoge huren, sociale samenhang verdwijnt.'},
{bron:'HAVO Aardrijkskunde CE 2022 Tijdvak 2 (geen afbeelding)',ctx:'Nederland investeert miljarden in het Deltaprogramma om het land te beschermen tegen overstromingen en de gevolgen van klimaatverandering.',v:'(a) Waarom is waterbeheer zo belangrijk voor Nederland?\n(b) Beschrijf twee strategieen die Nederland gebruikt tegen overstromingsrisico.',o:[''],c:0,u:'(a) Grote delen van Nederland liggen onder zeeniveau (polders). Zonder dijken, pompen en waterkeringen zou circa 60% van het land regelmatig overstromen. Klimaatverandering vergroot het risico door zeespiegelstijging en extremer weer.\n(b) 1. Dijkversterking en stormvloedkeringen (Maeslantkering). 2. Ruimte voor de Rivier: meer ruimte voor waterafvoer via dijkverlegging en uiterwaardverlaging.'},
{bron:'HAVO Aardrijkskunde CE 2024 Tijdvak 1 (geen afbeelding)',ctx:'In veel Nederlandse steden is een tekort aan betaalbare woningen. De overheid overweegt meer sociale huurwoningen te bouwen in buitenwijken.',v:'(a) Leg uit hoe suburbanisatie kan bijdragen aan het oplossen van het woningtekort.\n(b) Noem twee nadelen van bouwen in buitenwijken.',o:[''],c:0,u:'(a) In buitenwijken is meer ruimte beschikbaar voor nieuwbouw. Door daar woningen te bouwen wordt de druk op de binnenstad verminderd en neemt het woningaanbod toe.\n(b) 1. Toename van autoverkeer en files doordat bewoners voor werk naar de stad reizen. 2. Aantasting van groen en landbouwgrond. Mogelijk ook minder levendige wijken door functiescheiding.'}
   ]}
 ]},

{id:'ec',naam:'Economie',code:'EC',kleur:'#0891B2',
 beschrijving:'Micro- en macro-economie op HAVO-niveau.',
 ceInfo:'CE = domein C (Markt), domein D (Overheid en bestuur) en domein E (Goede tijden, slechte tijden). Domein B (Concept Schaarste) is verweven.',
 domeinen:[
  {id:'C',naam:'Markt',beschrijving:'Vraag en aanbod, marktvormen, prijsvorming en marktfalen',
   onderwerpen:['Vraag en aanbod: de markt','Vraagelasticiteit en aanbodelasticiteit','Marktvormen: volkomen concurrentie, monopolie, oligopolie','Prijsvorming en evenwichtsprijs','Consumentensurplus en producentensurplus','Marktfalen: externe effecten en collectieve goederen','Minimumloon en maximumprijs'],
   sam:'<strong>Vraag</strong>: bij hogere prijs minder gevraagd (negatief verband). <strong>Aanbod</strong>: bij hogere prijs meer aangeboden (positief verband). <strong>Evenwichtsprijs</strong>: waar vraag = aanbod. <strong>Vraagelasticiteit</strong>: Ev = %verandering Qv / %verandering P. Ev groter dan 1: elastisch (luxe). Ev kleiner dan 1: inelastisch (noodzakelijk). <strong>Marktvormen</strong>: volkomen concurrentie (veel aanbieders, homogeen product), monopolie (een aanbieder), oligopolie (weinig aanbieders, onderlinge afhankelijkheid). <strong>Consumentensurplus</strong>: verschil tussen betalingsbereidheid en werkelijke prijs. <strong>Producentensurplus</strong>: verschil tussen prijs en minimale verkoopprijs. <strong>Marktfalen</strong>: externe effecten (kosten/baten voor derden niet in de prijs), collectieve goederen (niet-uitsluitbaar, niet-rivaliserend). <strong>Maximumprijs</strong>: onder evenwicht, veroorzaakt tekort. <strong>Minimumprijs</strong>: boven evenwicht, veroorzaakt overschot.',
   sv:[
{v:'Wat is de evenwichtsprijs?',o:['De prijs waarbij de gevraagde hoeveelheid gelijk is aan de aangeboden hoeveelheid','De hoogste prijs die consumenten willen betalen','De laagste prijs waarvoor producenten willen verkopen','De prijs die de overheid vaststelt'],c:0,u:'Bij de evenwichtsprijs is er geen tekort en geen overschot. De markt is in balans. Als de prijs boven het evenwicht ligt ontstaat een overschot, eronder een tekort.'},
{v:'Wat betekent een vraagelasticiteit groter dan 1?',o:['De vraag is elastisch: een prijsverandering leidt tot een relatief grotere verandering in de gevraagde hoeveelheid','De vraag reageert niet op prijsveranderingen','Het aanbod is groter dan de vraag','De prijs is vastgezet door de overheid'],c:0,u:'Elastisch: luxeproducten. Prijsverhoging leidt tot flinke vraagdaling. Inelastisch (Ev kleiner dan 1): noodzakelijke goederen. Prijsverhoging heeft weinig effect op de vraag (bijv. benzine, brood).'},
{v:'Wat is een extern effect?',o:['Kosten of baten van een transactie die niet in de prijs zijn opgenomen en die derden treffen','De winst van een bedrijf','De belasting op een product','Het verschil tussen vraag en aanbod'],c:0,u:'Negatief extern effect: fabriek vervuilt rivier (kosten voor omwonenden niet in productprijs). Positief: imker helpt bestuiving van fruit bij buurman. Overheid kan ingrijpen via belasting of subsidie.'},
{v:'Wat kenmerkt een oligopolie?',o:['Weinig grote aanbieders die onderling afhankelijk zijn van elkaars strategische beslissingen','Veel kleine aanbieders met een identiek product','Een enkele aanbieder zonder concurrentie','Vrije toetreding en uittreding'],c:0,u:'Oligopolie: enkele grote spelers (bijv. telecom, supermarkten). Ze houden elkaars prijzen en strategieen in de gaten. Risico op kartelvorming (prijsafspraken).'},
{v:'Wat is het verschil tussen een maximumprijs en een minimumprijs?',o:['Maximumprijs ligt onder de evenwichtsprijs en veroorzaakt een tekort. Minimumprijs ligt boven de evenwichtsprijs en veroorzaakt een overschot.','Ze zijn hetzelfde','Maximumprijs veroorzaakt overschot','Minimumprijs ligt onder de evenwichtsprijs'],c:0,u:'Maximumprijs (bijv. huurgrens): beschermt consumenten, maar leidt tot tekort. Minimumprijs (bijv. minimumtarief melk): beschermt producenten, maar leidt tot overschot.'}
   ],
   oe:[
{bron:'HAVO Economie CE 2023 Tijdvak 1 (geen afbeelding)',ctx:'De overheid voert een accijnsverhoging door op sigaretten. De prijs stijgt van 8 naar 10 euro per pakje. De gevraagde hoeveelheid daalt van 100 miljoen naar 90 miljoen pakjes per jaar.',v:'(a) Bereken de vraagelasticiteit.\n(b) Is de vraag naar sigaretten elastisch of inelastisch? Verklaar.',o:[''],c:0,u:'(a) %verandering Qv = (90-100)/100 maal 100% = -10%. %verandering P = (10-8)/8 maal 100% = 25%. Ev = -10/25 = -0,4.\n(b) Inelastisch (Ev = 0,4, kleiner dan 1). Sigaretten zijn verslavend, de vraag reageert relatief weinig op een prijsverhoging. De accijnsverhoging levert de overheid dus relatief veel belastinginkomsten op.'},
{bron:'HAVO Economie CE 2022 Tijdvak 2 (geen afbeelding)',ctx:'In een stad zijn drie grote supermarktketens actief. Ze voeren regelmatig prijsoorlogen en reclamecampagnes.',v:'(a) Over welke marktvorm gaat het hier? Noem twee kenmerken.\n(b) Leg uit waarom deze marktstructuur kan leiden tot kartelvorming.',o:[''],c:0,u:'(a) Oligopolie. Kenmerken: weinig grote aanbieders en onderlinge afhankelijkheid (elke prijsbeslissing beinvloedt de concurrenten).\n(b) Prijsoorlogen zijn kostbaar: alle partijen verliezen marge. Een kartel (illegale prijsafspraak) voorkomt dit en houdt de winst voor alle partijen hoog. Het is echter verboden door de ACM.'},
{bron:'HAVO Economie CE 2024 Tijdvak 1 (geen afbeelding)',ctx:'De gemeente Amsterdam stelt een maximumhuur in van 1200 euro voor alle vrije-sectorwoningen.',v:'(a) Teken in een diagram wat er gebeurt met de markt als de maximumprijs onder de evenwichtsprijs ligt.\n(b) Welk probleem ontstaat er op de woningmarkt?',o:[''],c:0,u:'(a) Bij een maximumprijs onder de evenwichtsprijs is de gevraagde hoeveelheid groter dan de aangeboden hoeveelheid: er ontstaat een tekort (vraagoverschot).\n(b) Verhuurders bieden minder woningen aan (minder rendabel). Meer mensen zoeken een woning dan er beschikbaar zijn. Dit leidt tot wachtlijsten, onderhuur en zwarte markt.'}
   ]},
  {id:'D',naam:'Overheid en bestuur',beschrijving:'De rol van de overheid in de economie, belastingen en sociale zekerheid',
   onderwerpen:['Functies van de overheid: allocatie, herverdeling, stabilisatie','Belastingen: direct en indirect','Progressief, proportioneel en degressief tarief','Sociale zekerheid: verzekeringen en voorzieningen','Collectieve lastendruk','Overheidsbegroting: begrotingstekort en staatsschuld','Conjunctuurbeleid en automatische stabilisatoren'],
   sam:'<strong>Allocatiefunctie</strong>: overheid produceert collectieve goederen (defensie, dijken) en corrigeert marktfalen. <strong>Herverdelingsfunctie</strong>: via belastingen en uitkeringen verkleint de overheid inkomensongelijkheid. <strong>Stabilisatiefunctie</strong>: overheid dempt conjunctuurschommelingen. <strong>Directe belasting</strong>: op inkomen/winst (loonbelasting, vpb). <strong>Indirecte belasting</strong>: op bestedingen (btw, accijns). <strong>Progressief</strong>: hoger inkomen, hoger percentage. <strong>Proportioneel</strong>: vast percentage. <strong>Sociale zekerheid</strong>: verzekeringen (WW, WIA, premie-betaald) en voorzieningen (bijstand, AOW, uit belasting). <strong>Begrotingstekort</strong>: overheidsuitgaven groter dan inkomsten. <strong>Staatsschuld</strong>: optelsom van alle tekorten. <strong>Automatische stabilisatoren</strong>: bij recessie stijgen uitkeringen automatisch en dalen belastinginkomsten, wat de economie stabiliseert zonder nieuw beleid.',
   sv:[
{v:'Wat zijn de drie functies van de overheid in de economie?',o:['Allocatie (collectieve goederen), herverdeling (inkomensongelijkheid verkleinen) en stabilisatie (conjunctuurschommelingen dempen)','Productie, consumptie en export','Belasting heffen, geld drukken en handel reguleren','Privatisering, deregulering en liberalisering'],c:0,u:'Allocatie: overheid biedt goederen die de markt niet levert (defensie, dijken). Herverdeling: via belastingen en uitkeringen. Stabilisatie: dempen van economische schommelingen.'},
{v:'Wat is het verschil tussen directe en indirecte belasting?',o:['Direct is belasting op inkomen of winst. Indirect is belasting op bestedingen zoals btw en accijns.','Direct is btw, indirect is loonbelasting','Er is geen functioneel verschil','Direct betaal je aan de gemeente, indirect aan het Rijk'],c:0,u:'Direct: je betaalt op basis van je inkomen (loonbelasting, inkomstenbelasting). Indirect: je betaalt bij aankoop (btw, accijns op brandstof of alcohol). Indirect treft lage inkomens relatief zwaarder.'},
{v:'Wat is een progressief belastingstelsel?',o:['Hoe hoger het inkomen, hoe hoger het belastingpercentage','Iedereen betaalt hetzelfde percentage','Hoe hoger het inkomen, hoe lager het percentage','Een vast bedrag voor iedereen'],c:0,u:'Progressief: schijvenstelsel. Eerste schijf bijv. 37%, boven een grens bijv. 49,5%. Doel: inkomensherverdeling. Het tegenovergestelde is regressief.'},
{v:'Wat zijn automatische stabilisatoren?',o:['Mechanismen die zonder nieuw beleid de economie stabiliseren: bij recessie stijgen uitkeringen automatisch en dalen belastinginkomsten','Handmatige ingrepen door de overheid bij een crisis','Renteverhogingen door de centrale bank','Subsidies aan specifieke sectoren'],c:0,u:'Bij recessie: meer werklozen, meer WW-uitkeringen, meer besteedbaar inkomen ondanks crisis. Tegelijk daalt de belastingopbrengst. Dit remt de neergang automatisch af.'},
{v:'Wat is het verschil tussen sociale verzekeringen en sociale voorzieningen?',o:['Verzekeringen worden betaald uit premies van werkenden (WW, WIA). Voorzieningen worden betaald uit belastingen en zijn er voor iedereen die voldoet aan de voorwaarden (bijstand).','Verzekeringen zijn voor rijken, voorzieningen voor armen','Er is geen verschil','Voorzieningen worden betaald door werkgevers'],c:0,u:'Verzekering: je betaalt premie, recht op uitkering bij werkloosheid of ziekte (WW, WIA, ZW). Voorziening: uit algemene middelen, voor iedereen die het nodig heeft (bijstand, AOW, Wmo).'}
   ],
   oe:[
