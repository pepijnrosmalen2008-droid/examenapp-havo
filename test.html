{bron:'HAVO Economie CE 2023 Tijdvak 2 (geen afbeelding)',ctx:'Nederland heeft een progressief belastingstelsel met twee schijven: 36,93% tot 73.031 euro en 49,50% daarboven.',v:'(a) Leg uit waarom Nederland een progressief stelsel gebruikt.\n(b) Bereken de belasting over een inkomen van 90.000 euro.',o:[''],c:0,u:'(a) Progressief belastingstelsel dient de herverdelingsfunctie: hogere inkomens dragen een groter deel bij. Dit verkleint de inkomensongelijkheid na belasting.\n(b) Eerste schijf: 73.031 maal 36,93% = 26.977 euro. Tweede schijf: (90.000-73.031) maal 49,50% = 16.969 maal 0,495 = 8.400 euro. Totaal: 35.377 euro.'},
{bron:'HAVO Economie CE 2022 Tijdvak 1 (geen afbeelding)',ctx:'Tijdens de coronacrisis in 2020 steeg het begrotingstekort van de Nederlandse overheid aanzienlijk. De overheid gaf veel meer uit aan steunpakketten terwijl de belastinginkomsten daalden.',v:'(a) Leg uit hoe automatische stabilisatoren werkten tijdens de coronacrisis.\n(b) Waarom koos de overheid ervoor het begrotingstekort te laten oplopen?',o:[''],c:0,u:'(a) Meer werklozen kregen automatisch WW en bijstand (uitgaven stijgen). Bedrijven maakten minder winst, werknemers verdienden minder, dus belastinginkomsten daalden. Dit stabiliseerde de koopkracht automatisch.\n(b) Door extra uitgaven (NOW, TOZO) te doen in de crisis hield de overheid bedrijven en consumenten overeind. Bezuinigen zou de recessie verdiepen. Een tijdelijk tekort is minder schadelijk dan een economische ineenstorting.'},
{bron:'HAVO Economie CE 2024 Tijdvak 2 (geen afbeelding)',ctx:'De overheid overweegt de btw op gezond voedsel te verlagen van 9% naar 0% om gezonder eten te stimuleren.',v:'(a) Btw is een indirecte belasting. Leg uit waarom indirecte belastingen lage inkomens relatief zwaarder treffen.\n(b) Welke functie van de overheid hoort bij het verlagen van de btw op gezond voedsel?',o:[''],c:0,u:'(a) Lage inkomens besteden een groter deel van hun inkomen aan consumptie (en dus aan btw). De btw als percentage van het totale inkomen is daardoor hoger voor lage inkomens: de belasting werkt regressief.\n(b) Allocatiefunctie: de overheid stuurt het consumptiegedrag richting gezonder voedsel door de relatieve prijs te verlagen (correctie van marktfalen, merit good).'}
   ]},
  {id:'E',naam:'Goede tijden, slechte tijden',beschrijving:'Conjunctuur, economische groei, werkloosheid en inflatie',
   onderwerpen:['BBP en economische groei','Conjunctuurcyclus: hoogconjunctuur en laagconjunctuur','Bestedingen: consumptie, investeringen, overheid en export','Werkloosheid: conjunctureel en structureel','Inflatie en deflatie','Monetair beleid: ECB en rente','Wisselkoersen en internationale handel'],
   sam:'<strong>BBP</strong>: totale waarde van alle goederen en diensten geproduceerd in een land in een jaar. Reeel BBP gecorrigeerd voor inflatie. <strong>Conjunctuur</strong>: golfbeweging in economische activiteit. Hoogconjunctuur: groei boven trend, lage werkloosheid, risico inflatie. Laagconjunctuur: groei onder trend, stijgende werkloosheid. <strong>Bestedingsmethode</strong>: BBP = C + I + O + (E - M). <strong>Conjuncturele werkloosheid</strong>: door lage vraag in laagconjunctuur. <strong>Structurele werkloosheid</strong>: mismatch vaardigheden/vraag, onafhankelijk van conjunctuur. <strong>Inflatie</strong>: algemene prijsstijging, koopkracht daalt. Oorzaken: bestedingsinflatie (vraag te hoog) of kosteninflatie (productiekosten stijgen). <strong>ECB</strong>: Europese Centrale Bank, stuurt rente. Lage rente stimuleert lenen/besteden. Hoge rente remt inflatie.',
   sv:[
{v:'Wat is het verschil tussen conjuncturele en structurele werkloosheid?',o:['Conjunctureel: door lage vraag in laagconjunctuur, tijdelijk. Structureel: door mismatch tussen vaardigheden en arbeidsmarkt, langdurig.','Conjunctureel is langdurig, structureel is tijdelijk','Er is geen verschil','Structureel komt alleen voor bij hoogconjunctuur'],c:0,u:'Conjunctureel: bij recessie worden mensen ontslagen, bij herstel weer aangenomen. Structureel: banen verdwijnen permanent (automatisering) of vaardigheden sluiten niet aan bij beschikbare banen.'},
{v:'Wat is inflatie en wat zijn de oorzaken?',o:['Algemene prijsstijging waardoor de koopkracht daalt. Oorzaken: bestedingsinflatie (te veel vraag) of kosteninflatie (hogere productiekosten).','Daling van alle prijzen','Stijging van het BBP','Daling van de werkloosheid'],c:0,u:'Bestedingsinflatie: te veel geld jaagt te weinig goederen na. Kosteninflatie: stijgende grondstof- of loonkosten worden doorberekend in hogere prijzen.'},
{v:'Hoe kan de ECB inflatie bestrijden?',o:['Door de rente te verhogen, waardoor lenen duurder wordt, consumenten en bedrijven minder besteden en de vraag daalt','Door meer geld te drukken','Door de belastingen te verlagen','Door de overheidsuitgaven te verhogen'],c:0,u:'Hogere rente: sparen wordt aantrekkelijker, lenen duurder. Consumptie en investeringen dalen, vraag daalt, opwaartse prijsdruk neemt af. Dit is monetair beleid.'},
{v:'Hoe wordt het BBP berekend via de bestedingsmethode?',o:['BBP = Consumptie + Investeringen + Overheidsbestedingen + (Export minus Import)','BBP = Winst van alle bedrijven','BBP = Totale belastingopbrengst','BBP = Inkomen van alle werknemers'],c:0,u:'C + I + O + (E - M). Consumptie: huishoudens. Investeringen: bedrijven. O: overheid. Export minus import: netto buitenlandse vraag.'},
{v:'Wat kenmerkt hoogconjunctuur?',o:['Economische groei boven de trendlijn, lage werkloosheid, stijgende prijzen en risico op oververhitting','Hoge werkloosheid en dalende prijzen','Economische krimp en faillissementen','Stabiele prijzen en lonen'],c:0,u:'Hoogconjunctuur: veel vraag, bedrijven draaien op volle capaciteit, werkloosheid laag, lonen en prijzen stijgen. Risico: oververhitting en inflatie.'}
   ],
   oe:[
{bron:'HAVO Economie CE 2023 Tijdvak 1 (geen afbeelding)',ctx:'In 2022 steeg de inflatie in Nederland tot 10%, voornamelijk door gestegen energieprijzen als gevolg van de oorlog in Oekraine.',v:'(a) Welk type inflatie trad hier op? Verklaar.\n(b) Beschrijf hoe hoge inflatie de koopkracht van huishoudens beinvloedt.',o:[''],c:0,u:'(a) Kosteninflatie: de hogere energieprijzen verhoogden de productiekosten, die werden doorberekend in consumentenprijzen. Niet veroorzaakt door te hoge vraag.\n(b) Als prijzen sneller stijgen dan lonen, daalt de koopkracht: huishoudens kunnen minder kopen voor hetzelfde inkomen. Vooral lagere inkomens worden hard getroffen omdat zij een groter deel besteden aan energie en voedsel.'},
{bron:'HAVO Economie CE 2022 Tijdvak 2 (geen afbeelding)',ctx:'De ECB verhoogde in 2022 voor het eerst in 11 jaar de rente om de inflatie te beteugelen.',v:'(a) Leg stap voor stap uit hoe een renteverhoging de inflatie kan verlagen.\n(b) Noem een negatief bijeffect van renteverhoging.',o:[''],c:0,u:'(a) Hogere rente maakt lenen duurder. Consumenten lenen minder (minder hypotheken, minder uitgaven). Bedrijven stellen investeringen uit. De totale vraag daalt. Minder vraagdruk op prijzen, inflatie remt af.\n(b) Economische groei vertraagt: minder investeringen, minder consumptie, werkloosheid kan stijgen. De economie kan in een recessie raken. Ook stijgen hypotheeklasten voor huiseigenaren.'},
{bron:'HAVO Economie CE 2024 Tijdvak 1 (geen afbeelding)',ctx:'Het reele BBP van Nederland groeide in 2024 met 1,2%. De nominale groei was 4,5%. De inflatie was 3,3%.',v:'(a) Leg het verschil uit tussen reeel en nominaal BBP.\n(b) Verklaar waarom reeel BBP een betere maatstaf is voor welvaart.',o:[''],c:0,u:'(a) Nominaal BBP: niet gecorrigeerd voor prijsstijgingen. Reeel BBP: gecorrigeerd voor inflatie, meet de werkelijke productiegroei. Reeel = nominaal minus inflatie (bij benadering).\n(b) Nominaal BBP kan stijgen puur door prijsstijgingen, zonder dat er meer wordt geproduceerd. Reeel BBP laat zien of er werkelijk meer goederen en diensten zijn: een betere indicator voor materiele welvaart.'}
   ]}
 ]},

{id:'mw',naam:'Maatschappijwetenschappen',code:'MW',kleur:'#7C3AED',
 beschrijving:'Politieke en maatschappelijke vraagstukken op HAVO-niveau.',
 ceInfo:'CE = domein C (Politieke besluitvorming) en domein D (Maatschappelijke vraagstukken). Vaardigheden (domein A) en Analyse van een tweetal tweedelingsbenaderingen (domein B) zijn verweven.',
 domeinen:[
  {id:'C',naam:'Politieke besluitvorming',beschrijving:'Het Nederlandse politieke systeem, verkiezingen, bestuur en grondrechten',
   onderwerpen:['Parlementaire democratie en rechtsstaat','Grondrechten: klassiek en sociaal','Verkiezingen en coalitievorming','Politieke partijen en ideologieen','Trias politica: wetgevende, uitvoerende en rechterlijke macht','Lobbyisme en pressiegroepen','Media en politiek','Europese Unie en nationale soevereiniteit'],
   sam:'<strong>Parlementaire democratie</strong>: het volk kiest de Tweede Kamer, die controleert de regering. <strong>Rechtsstaat</strong>: overheid is gebonden aan de wet, grondrechten beschermen burgers. <strong>Klassieke grondrechten</strong>: vrijheid van meningsuiting, godsdienst, vergadering (overheid mag niet ingrijpen). <strong>Sociale grondrechten</strong>: recht op onderwijs, gezondheidszorg, huisvesting (overheid moet actief zorgen). <strong>Trias politica</strong>: scheiding van wetgevende (parlement), uitvoerende (regering) en rechterlijke macht. Checks and balances. <strong>Coalitie</strong>: na verkiezingen vormen partijen met meerderheid in Tweede Kamer een regering. <strong>Ideologieen</strong>: liberalisme (individuele vrijheid, vrije markt), sociaal-democratie (gelijkheid, sterke overheid), christendemocratie (gemeenschap, solidariteit), populisme (volkswil vs. elite). <strong>Lobbyisme</strong>: belangenorganisaties beinvloeden politieke besluitvorming.',
   sv:[
{v:'Wat houdt de trias politica in?',o:['Scheiding van wetgevende, uitvoerende en rechterlijke macht om machtsmisbruik te voorkomen','De drie grootste politieke partijen in Nederland','De drie niveaus van bestuur: gemeente, provincie, Rijk','De drie grondrechten'],c:0,u:'Montesquieu: macht moet verdeeld zijn. Wetgevende macht (parlement) maakt wetten. Uitvoerende macht (regering) voert uit. Rechterlijke macht (rechters) toetst. Voorkomt machtsconcentratie.'},
{v:'Wat is het verschil tussen klassieke en sociale grondrechten?',o:['Klassieke grondrechten beschermen de burger tegen de overheid (vrijheidsrechten). Sociale grondrechten verplichten de overheid te zorgen voor welzijn.','Er is geen verschil','Klassieke rechten gelden alleen voor staatsburgers','Sociale rechten zijn alleen voor werknemers'],c:0,u:'Klassiek: overheid houdt zich afzijdig (vrijheid van meningsuiting, godsdienst). Sociaal: overheid is actief (recht op onderwijs, huisvesting). Klassieke rechten zijn afdwingbaar, sociale rechten zijn inspanningsverplichtingen.'},
{v:'Hoe werkt coalitievorming in Nederland?',o:['Na verkiezingen onderhandelen partijen die samen een meerderheid in de Tweede Kamer vormen over een regeerakkoord','De grootste partij vormt automatisch de regering','De koning kiest de coalitiepartijen','Alle partijen vormen samen de coalitie'],c:0,u:'Geen enkele partij haalt een meerderheid (76 zetels). Partijen onderhandelen, een informateur zoekt een werkbare combinatie. Ze schrijven een regeerakkoord en vormen samen de regering.'},
{v:'Wat is populisme?',o:['Een politieke stroming die de volkswil centraal stelt en zich afzet tegen de gevestigde elite en instituties','Een stroming die streeft naar volledige privatisering','Een religieuze politieke beweging','Een stroming die de macht van de EU wil vergroten'],c:0,u:'Populisme: het volk vs. de elite. Populisten beweren de stem van het gewone volk te vertolken. Kritiek op gevestigde politiek, media en instituties. Kan zowel links als rechts zijn.'},
{v:'Wat is lobbyisme?',o:['Het beinvloeden van politieke besluitvorming door belangenorganisaties, bedrijven of maatschappelijke groepen','Het stemmen op een politieke partij','Het oprichten van een nieuwe politieke partij','Het organiseren van verkiezingen'],c:0,u:'Lobbyisten proberen Kamerleden, ministers of ambtenaren te beinvloeden. Kan constructief zijn (expertise inbrengen) maar ook problematisch (ongelijke toegang voor machtige organisaties).'}
   ],
   oe:[
{bron:'HAVO Maatschappijwetenschappen CE 2023 Tijdvak 1 (geen afbeelding)',ctx:'Na de Tweede Kamerverkiezingen van 2023 duurde de formatie maanden. Uiteindelijk werd een coalitie van vier partijen gevormd.',v:'(a) Waarom is coalitievorming in Nederland vaak complex?\n(b) Leg uit waarom de formatie in een meerpartijenstelsel langer duurt dan in een tweepartijenstelsel.',o:[''],c:0,u:'(a) Geen enkele partij haalt een meerderheid. Partijen moeten compromissen sluiten over standpunten die soms ver uit elkaar liggen. Hoe meer partijen nodig, hoe complexer de onderhandelingen.\n(b) In een tweepartijenstelsel wint een partij de meerderheid en vormt direct de regering. In Nederland moeten 3-4 partijen het eens worden over een regeerakkoord, wat meer tijd kost.'},
{bron:'HAVO Maatschappijwetenschappen CE 2022 Tijdvak 2 (geen afbeelding)',ctx:'Er is discussie over de vrijheid van meningsuiting op sociale media. Sommigen vinden dat haatberichten verboden moeten worden, anderen vrezen censuur.',v:'(a) Leg uit waarom vrijheid van meningsuiting een klassiek grondrecht is.\n(b) In welke situaties mag de overheid de vrijheid van meningsuiting beperken?',o:[''],c:0,u:'(a) Klassiek grondrecht: beschermt de burger tegen overheidsinmenging. De overheid mag burgers niet verbieden hun mening te uiten. Het is vastgelegd in de Grondwet (art. 7) en het EVRM.\n(b) Beperkingen zijn toegestaan bij haatzaaien, discriminatie, bedreiging en belediging. De wet stelt grenzen: je mag een mening hebben, maar mag niet aanzetten tot haat of geweld.'},
{bron:'HAVO Maatschappijwetenschappen CE 2024 Tijdvak 1 (geen afbeelding)',ctx:'De Europese Unie neemt steeds meer besluiten die direct gelden in Nederland. Er is discussie over de verhouding tussen Europese en nationale soevereiniteit.',v:'(a) Noem twee voorbeelden van beleidsterreinen waarop de EU besluiten neemt die voor Nederland gelden.\n(b) Leg het spanningsveld uit tussen Europese integratie en nationale soevereiniteit.',o:[''],c:0,u:'(a) Twee uit: milieubeleid (stikstofnormen), handelsbeleid (gemeenschappelijke buitentarieven), landbouwbeleid (GLB), migratie- en asielbeleid, mededingingsbeleid.\n(b) Europese integratie betekent dat lidstaten bevoegdheden overdragen aan de EU voor gemeenschappelijk beleid. Dit botst met nationale soevereiniteit: het vermogen om als land zelf te beslissen. Voordelen: sterkere positie in de wereld. Nadelen: minder democratische controle op nationaal niveau.'}
   ]},
  {id:'D',naam:'Maatschappelijke vraagstukken',beschrijving:'Sociale ongelijkheid, criminaliteit, media en pluriforme samenleving',
   onderwerpen:['Sociale ongelijkheid en sociale stratificatie','Sociale mobiliteit','Criminaliteit: oorzaken en aanpak','Verzorgingsstaat en participatiesamenleving','Pluriforme samenleving en integratie','Cultuur, socialisatie en identiteit','Maatschappelijke tegenstellingen'],
   sam:'<strong>Sociale stratificatie</strong>: verdeling van de samenleving in lagen op basis van inkomen, opleiding en beroep. <strong>Sociale mobiliteit</strong>: mogelijkheid om van laag te veranderen. Intergenerationeel (vergeleken met ouders) of intragenerationeel (binnen eigen leven). <strong>Meritocratisch ideaal</strong>: positie hangt af van eigen verdienste (opleiding, talent). In praktijk spelen herkomst, netwerk en discriminatie ook een rol. <strong>Verzorgingsstaat</strong>: overheid biedt sociale zekerheid. Trend naar participatiesamenleving: burgers nemen meer eigen verantwoordelijkheid. <strong>Criminaliteit</strong>: oorzaken volgens straintheorie (Merton): spanning tussen doelen en middelen. Bindingstheorie (Hirschi): zwakke sociale bindingen. Aanpak: preventie, repressie, resocialisatie. <strong>Pluriforme samenleving</strong>: diversiteit in culturele, religieuze en etnische groepen. Integratie: deelnemen aan de samenleving met behoud van eigen identiteit.',
   sv:[
{v:'Wat is sociale mobiliteit?',o:['De mogelijkheid om te stijgen of dalen op de maatschappelijke ladder qua inkomen, opleiding of status','De fysieke verplaatsing van mensen tussen steden','Het aantal verhuizingen per jaar','De mate waarin mensen van baan wisselen'],c:0,u:'Intergenerationele mobiliteit: vergelijk je positie met die van je ouders. Intragenerationele mobiliteit: verandering binnen je eigen leven. Hoge sociale mobiliteit wijst op een open samenleving.'},
{v:'Wat is de straintheorie van Merton?',o:['Criminaliteit ontstaat door spanning tussen maatschappelijke doelen en de legale middelen die iemand heeft om die doelen te bereiken','Criminaliteit is aangeboren','Alle criminaliteit is het gevolg van armoede','Criminaliteit ontstaat door te veel politie'],c:0,u:'Merton: de samenleving benadrukt succes (geld, status) maar niet iedereen heeft gelijke toegang tot legale middelen. De spanning tussen doel en middelen kan leiden tot criminaliteit als alternatieve route.'},
{v:'Wat is het verschil tussen verzorgingsstaat en participatiesamenleving?',o:['In een verzorgingsstaat zorgt de overheid voor burgers. In een participatiesamenleving nemen burgers meer eigen verantwoordelijkheid en wordt het vangnet kleiner.','Ze betekenen hetzelfde','De participatiesamenleving heeft meer overheidsuitgaven','De verzorgingsstaat is nieuwer'],c:0,u:'Verzorgingsstaat (na WO II): brede sociale voorzieningen. Participatiesamenleving (sinds 2013): overheid doet een stap terug, burgers worden aangesproken op zelfredzaamheid en mantelzorg.'},
{v:'Wat wordt bedoeld met een pluriforme samenleving?',o:['Een samenleving met grote diversiteit in culturele, religieuze en etnische achtergronden van de bevolking','Een samenleving met maar een cultuur','Een samenleving zonder religie','Een samenleving met alleen economische verschillen'],c:0,u:'Pluriform: meerdere culturen, religies en levenswijzen naast elkaar. In Nederland door migratie, koloniaal verleden en globalisering. Brengt verrijking maar ook spanningen rond integratie en identiteit.'},
{v:'Wat is het verschil tussen integratie en assimilatie?',o:['Integratie: deelnemen aan de samenleving met behoud van eigen culturele identiteit. Assimilatie: de eigen cultuur volledig opgeven en opgaan in de dominante cultuur.','Ze betekenen hetzelfde','Integratie is altijd gedwongen','Assimilatie behoudt de eigen cultuur'],c:0,u:'Integratie: tweetaligheid, werk, onderwijs, maar ook eigen tradities behouden. Assimilatie: volledige aanpassing aan de dominante cultuur. In Nederland wordt integratie als beleidsdoel gehanteerd.'}
   ],
   oe:[
{bron:'HAVO Maatschappijwetenschappen CE 2023 Tijdvak 2 (geen afbeelding)',ctx:'Onderzoek toont aan dat kinderen van hoogopgeleide ouders gemiddeld een hoger opleidingsniveau bereiken dan kinderen van laagopgeleide ouders.',v:'(a) Leg uit hoe dit gegeven zich verhoudt tot het meritocratische ideaal.\n(b) Noem twee factoren die deze ongelijkheid in kansen kunnen verklaren.',o:[''],c:0,u:'(a) Het meritocratische ideaal stelt dat je positie afhangt van talent en inspanning. Als afkomst de kansen beinvloedt, is de samenleving niet volledig meritocratisch: herkomst bepaalt mede de uitkomst.\n(b) Twee uit: cultureel kapitaal (boeken, taalvaardigheid thuis), sociaal kapitaal (netwerk van ouders), financiele middelen (bijles, studiemogelijkheden), verwachtingen van docenten (pygmalioneffect).'},
{bron:'HAVO Maatschappijwetenschappen CE 2022 Tijdvak 1 (geen afbeelding)',ctx:'De Nederlandse overheid heeft het beleid verschoven van verzorgingsstaat naar participatiesamenleving. Burgers worden meer aangesproken op zelfredzaamheid en mantelzorg.',v:'(a) Noem twee redenen waarom de overheid deze verschuiving heeft ingezet.\n(b) Welke groepen in de samenleving worden het meest getroffen door deze verschuiving?',o:[''],c:0,u:'(a) 1. Stijgende kosten van de verzorgingsstaat (vergrijzing, zorgkosten). 2. Ideologische verschuiving: eigen verantwoordelijkheid en zelfredzaamheid als waarde.\n(b) Kwetsbare groepen: ouderen zonder netwerk, mensen met een beperking, laagopgeleiden, alleenstaanden. Zij hebben minder sociaal kapitaal om op terug te vallen en zijn meer afhankelijk van professionele zorg.'},
{bron:'HAVO Maatschappijwetenschappen CE 2024 Tijdvak 2 (geen afbeelding)',ctx:'In een grote stad is de criminaliteit in een achterstandswijk hoger dan gemiddeld. De gemeente overweegt zowel preventieve als repressieve maatregelen.',v:'(a) Verklaar de hogere criminaliteit vanuit de straintheorie.\n(b) Geef een voorbeeld van een preventieve en een repressieve maatregel en leg het verschil uit.',o:[''],c:0,u:'(a) Straintheorie: bewoners van een achterstandswijk hebben minder toegang tot legale middelen (opleiding, banen) om maatschappelijke doelen (welvaart) te bereiken. De spanning tussen doelen en beperkte middelen kan leiden tot criminaliteit.\n(b) Preventief: meer jeugdwerk, sportvoorzieningen, stageplekken (voorkomen dat jongeren in criminaliteit belanden). Repressief: meer politie-inzet, cameratoezicht, strenger straffen (bestraffen en afschrikken). Preventie richt zich op oorzaken, repressie op bestrijding.'}
   ]}
 ]},

{id:'wb',naam:'Wiskunde B',code:'WB',kleur:'#DC2626',
 beschrijving:'Analyse, meetkunde en goniometrie op HAVO-niveau.',
 ceInfo:'CE = domein B (Algebra en tellen), domein C (Verbanden) en domein D (Verandering). Meetkunde (domein E) is deels CE-stof.',
 domeinen:[
  {id:'B',naam:'Algebra en tellen',beschrijving:'Algebraische vaardigheden, vergelijkingen en ongelijkheden',
   onderwerpen:['Haakjes uitwerken en herleiden','Kwadratische vergelijkingen en abc-formule','Ontbinden in factoren','Breukvergelijkingen','Stelsels vergelijkingen','Ongelijkheden oplossen','Exponenten en logaritmen'],
   sam:'<strong>Kwadratische vergelijking</strong>: <span class="fm">ax2 + bx + c = 0</span>. Oplossingen via abc-formule: <span class="fm">x = (-b +/- wortel(b2-4ac)) / 2a</span>. Discriminant D = b2-4ac. D groter dan 0: twee oplossingen. D = 0: een oplossing. D kleiner dan 0: geen. <strong>Ontbinden</strong>: ax2+bx+c = a(x-p)(x-q) waarbij p en q de nulpunten zijn. <strong>Breukvergelijking</strong>: noemer mag niet 0 zijn. Vermenigvuldig met de noemer om op te lossen, controleer of de oplossing geldig is. <strong>Logaritmen</strong>: <span class="fm">log_a(x) = y <=> a^y = x</span>. Rekenregels: log(ab) = log a + log b, log(a/b) = log a - log b, log(a^n) = n log a. <strong>Ongelijkheden</strong>: bij vermenigvuldigen met negatief getal draait het teken om.',
   sv:[
{v:'Wat is de discriminant en wat zegt die?',o:['D = b kwadraat min 4ac. Als D groter dan 0: twee oplossingen. D = 0: een oplossing. D kleiner dan 0: geen oplossingen.','D geeft de waarde van x aan','D is altijd positief','D is de som van de oplossingen'],c:0,u:'De discriminant bepaalt het aantal snijpunten van de parabool met de x-as. Bij D kleiner dan 0 snijdt de parabool de x-as niet.'},
{v:'Hoe los je een breukvergelijking op?',o:['Vermenigvuldig beide leden met de noemer, los de vergelijking op en controleer of de oplossing niet nul maakt in de noemer','Deel beide leden door de noemer','Vervang de breuk door een geheel getal','Breukvergelijkingen zijn niet oplosbaar'],c:0,u:'Na vermenigvuldigen met de noemer verdwijnt de breuk. Belangrijk: controleer altijd of je oplossing de noemer niet nul maakt (anders is het geen geldige oplossing).'},
{v:'Wat is de abc-formule?',o:['x = (-b plus of min wortel van (b kwadraat min 4ac)) gedeeld door 2a','x = -b gedeeld door 2a','x = a plus b plus c','x = b kwadraat min 4ac'],c:0,u:'De abc-formule geeft de oplossingen van elke kwadratische vergelijking ax2 + bx + c = 0. De plus/min geeft twee mogelijke oplossingen.'},
{v:'Wat gebeurt er met een ongelijkheidsteken als je vermenigvuldigt met een negatief getal?',o:['Het teken draait om: groter dan wordt kleiner dan en andersom','Het teken blijft hetzelfde','De ongelijkheid wordt een gelijkheid','Er gebeurt niets'],c:0,u:'Belangrijk: -2x groter dan 6 wordt x kleiner dan -3. Bij vermenigvuldigen of delen met een negatief getal draait het teken altijd om.'},
{v:'Hoe ontbind je x kwadraat min 5x plus 6 in factoren?',o:['(x min 2)(x min 3), want min 2 maal min 3 = 6 en min 2 plus min 3 = min 5','(x plus 2)(x plus 3)','(x min 1)(x min 6)','(x min 2)(x plus 3)'],c:0,u:'Zoek twee getallen die vermenigvuldigd c (6) geven en opgeteld b (-5). Dat zijn -2 en -3. Dus: (x-2)(x-3). Nulpunten: x=2 en x=3.'}
   ],
   oe:[
{bron:'HAVO Wiskunde B CE 2023 Tijdvak 1 (geen afbeelding)',ctx:'Gegeven de vergelijking: 2x kwadraat min 3x min 5 = 0.',v:'(a) Bereken de discriminant.\n(b) Bereken de exacte oplossingen met de abc-formule.',o:[''],c:0,u:'(a) D = (-3) kwadraat min 4 maal 2 maal (-5) = 9 + 40 = 49.\n(b) x = (3 plus of min wortel 49) gedeeld door (2 maal 2) = (3 plus of min 7) gedeeld door 4. x1 = 10/4 = 2,5. x2 = -4/4 = -1.'},
{bron:'HAVO Wiskunde B CE 2022 Tijdvak 2 (geen afbeelding)',ctx:'Los op: 3 gedeeld door (x min 1) = x + 2.',v:'Los deze breukvergelijking op en controleer je antwoord.',o:[''],c:0,u:'Vermenigvuldig met (x-1): 3 = (x+2)(x-1) = x kwadraat + x - 2. Dus x kwadraat + x - 5 = 0. D = 1 + 20 = 21. x = (-1 plus of min wortel 21) gedeeld door 2. Controle: x mag niet 1 zijn. Wortel 21 is circa 4,58, dus x1 = 1,79 en x2 = -2,79. Beide ongelijk aan 1, dus geldig.'},
{bron:'HAVO Wiskunde B CE 2024 Tijdvak 1 (geen afbeelding)',ctx:'Gegeven: log(x kwadraat) = 4.',v:'(a) Los deze vergelijking op.\n(b) Leg uit waarom er twee oplossingen zijn.',o:[''],c:0,u:'(a) log(x kwadraat) = 4 geeft x kwadraat = 10 tot de 4de = 10.000. Dus x = 100 of x = -100.\n(b) x kwadraat = 10.000 heeft twee oplossingen: de positieve en negatieve wortel. Beide geven x kwadraat = 10.000, dus log(x kwadraat) = 4.'}
   ]},
  {id:'C',naam:'Verbanden',beschrijving:'Functies, grafieken en transformaties',
   onderwerpen:['Lineaire en kwadratische functies','Machtsfuncties en wortelfuncties','Exponentiële en logaritmische functies','Goniometrische functies (sinus, cosinus)','Transformaties van grafieken','Inverse functies','Asymptoten'],
   sam:'<strong>Kwadratisch</strong>: <span class="fm">f(x) = ax2+bx+c</span>. Parabool, top bij x = -b/(2a). <strong>Machtsfunctie</strong>: <span class="fm">f(x) = x^n</span>. Even n: dalparabool. Oneven n: stijgende S-vorm. <strong>Exponentieel</strong>: <span class="fm">f(x) = a maal g^x</span>. Horizontale asymptoot bij y=0. <strong>Logaritmisch</strong>: inverse van exponentieel. <span class="fm">f(x) = log(x)</span>. Verticale asymptoot bij x=0. <strong>Sinus</strong>: periodiek, amplitude, periode 2 pi. <span class="fm">f(x) = a sin(bx+c)+d</span>. Amplitude |a|, periode 2 pi/b. <strong>Transformaties</strong>: f(x)+d is d omhoog. f(x-c) is c naar rechts. a maal f(x) is verticaal rekken met factor a. f(bx) is horizontaal persen met factor 1/b. <strong>Asymptoot</strong>: lijn waar de grafiek naar toe gaat maar nooit raakt.',
   sv:[
{v:'Wat is de amplitude van f(x) = 3sin(2x)?',o:['3, want de amplitude is de absolute waarde van de factor voor de sinusfunctie','2, want dat is de factor in het argument','6, want 3 maal 2','1, want sinus heeft altijd amplitude 1'],c:0,u:'Amplitude = |a| = |3| = 3. De grafiek schommelt tussen -3 en +3. De periode is 2 pi gedeeld door 2 = pi.'},
{v:'Wat is het effect van f(x-3) vergeleken met f(x)?',o:['De grafiek verschuift 3 naar rechts','De grafiek verschuift 3 naar links','De grafiek verschuift 3 omhoog','De grafiek verschuift 3 omlaag'],c:0,u:'f(x-3): vervang x door x-3. De grafiek schuift 3 naar rechts. Tegenintuïtief: min in het argument geeft een verschuiving naar rechts.'},
{v:'Wat is een asymptoot?',o:['Een lijn waar de grafiek steeds dichter bij komt maar nooit bereikt','Een snijpunt van de grafiek met de x-as','De top van een parabool','Een keerpunt van de functie'],c:0,u:'Horizontale asymptoot: y-waarde waar de grafiek naar convergeert bij x naar oneindig (bijv. y=0 bij exponentieel verval). Verticale asymptoot: x-waarde waar de functie niet gedefinieerd is (bijv. x=0 bij 1/x).'},
{v:'Wat is de inverse functie van f(x) = 10 tot de macht x?',o:['f inverse(x) = log(x), de logaritme met grondtal 10','f inverse(x) = x tot de macht 10','f inverse(x) = 10x','f inverse(x) = 1 gedeeld door 10 tot de macht x'],c:0,u:'De logaritme is de inverse van de exponentiële functie. Als y = 10^x, dan x = log(y). De grafiek van de inverse is de spiegeling in de lijn y=x.'},
{v:'Wat is de periode van f(x) = sin(3x)?',o:['2 pi gedeeld door 3','2 pi','3 pi','6 pi'],c:0,u:'Periode = 2 pi / b = 2 pi / 3. De factor b in sin(bx) comprimeert de grafiek horizontaal: grotere b geeft kortere periode.'}
   ],
   oe:[
{bron:'HAVO Wiskunde B CE 2023 Tijdvak 2 (geen afbeelding)',ctx:'Gegeven de functie f(x) = 2 maal 3 tot de macht (x min 1) + 4.',v:'(a) Bepaal de horizontale asymptoot.\n(b) Beschrijf de transformaties ten opzichte van g(x) = 3 tot de macht x.',o:[''],c:0,u:'(a) Horizontale asymptoot bij y = 4. Want 3 tot de macht (x-1) nadert 0 als x naar min oneindig, dus f(x) nadert 0 + 4 = 4.\n(b) g(x) = 3^x wordt: 1 naar rechts verschoven (x-1), verticaal vermenigvuldigd met 2 (factor 2), en 4 omhoog verschoven (+4).'},
{bron:'HAVO Wiskunde B CE 2022 Tijdvak 1 (geen afbeelding)',ctx:'De hoogte van het water in een haven wordt beschreven door h(t) = 3sin(pi/6 maal t) + 5, met t in uren na middernacht en h in meters.',v:'(a) Bepaal de amplitude en de periode.\n(b) Op welk tijdstip is het water het hoogst?',o:[''],c:0,u:'(a) Amplitude = |3| = 3 meter. Periode = 2 pi gedeeld door (pi/6) = 12 uur.\n(b) Sinus is maximaal (=1) als het argument pi/2 is. pi/6 maal t = pi/2 geeft t = 3 uur. Om 03:00 is het water het hoogst: h(3) = 3 maal 1 + 5 = 8 meter.'},
{bron:'HAVO Wiskunde B CE 2024 Tijdvak 2 (geen afbeelding)',ctx:'Gegeven f(x) = x kwadraat min 4x + 3.',v:'(a) Bepaal de nulpunten door ontbinden in factoren.\n(b) Bepaal de coordinaten van de top.\n(c) Voor welke x geldt f(x) kleiner dan 0?',o:[''],c:0,u:'(a) f(x) = (x-1)(x-3). Nulpunten: x = 1 en x = 3.\n(b) x-top = -(-4)/(2 maal 1) = 2. f(2) = 4 - 8 + 3 = -1. Top: (2, -1).\n(c) f(x) kleiner dan 0 tussen de nulpunten: 1 kleiner dan x kleiner dan 3.'}
   ]},
  {id:'D',naam:'Verandering',beschrijving:'Differentiaalrekening: afgeleide, helling en extremen',
   onderwerpen:['Gemiddelde en momentane verandering','Afgeleide: differentieren','Afgeleideregels: machtsfuncties, kettingregel','Raaklijn en helling','Extremen: maximum en minimum','Toenemend en afnemend stijgen/dalen','Optimalisatieproblemen'],
   sam:'<strong>Gemiddelde verandering</strong>: (f(b)-f(a))/(b-a), helling van de koorde. <strong>Momentane verandering</strong>: afgeleide f\'(x), helling van de raaklijn. <strong>Differentieren</strong>: f(x) = x^n geeft f\'(x) = n maal x^(n-1). Constante factor blijft: (cf)\' = cf\'. Som: (f+g)\' = f\'+g\'. <strong>Kettingregel</strong>: f(g(x))\' = f\'(g(x)) maal g\'(x). <strong>Raaklijn</strong> in punt a: y = f\'(a)(x-a) + f(a). <strong>Extremen</strong>: f\'(x) = 0 en tekenwissel. f\' van + naar -: maximum. f\' van - naar +: minimum. <strong>Toenemend stijgend</strong>: f\' groter dan 0 en f\'\' groter dan 0 (steeds sneller stijgend). <strong>Afnemend stijgend</strong>: f\' groter dan 0 en f\'\' kleiner dan 0 (steeds langzamer stijgend).',
   sv:[
{v:'Wat is de afgeleide van f(x) = 3x tot de 4de?',o:['f\'(x) = 12x tot de 3de, want de exponent komt naar voren en wordt met 1 verminderd','f\'(x) = 3x tot de 3de','f\'(x) = 4x tot de 3de','f\'(x) = 3x tot de 5de'],c:0,u:'Regel: (ax^n)\' = n maal a maal x^(n-1). Dus (3x^4)\' = 4 maal 3 maal x^3 = 12x^3.'},
{v:'Hoe vind je een maximum of minimum van een functie?',o:['Bereken f\'(x) = 0 en controleer of er een tekenwissel is: van positief naar negatief is maximum, van negatief naar positief is minimum','Bereken f(0)','Zoek de nulpunten van f(x)','Neem de tweede afgeleide en stel die gelijk aan 0'],c:0,u:'f\'(x) = 0 geeft de x-waarden van mogelijke extremen. Tekenwissel van f\' bepaalt of het een max of min is. Alternatief: f\'\'(x) kleiner dan 0 bij x is maximum.'},
{v:'Wat is de vergelijking van de raaklijn aan f(x) in het punt x = a?',o:['y = f\'(a) maal (x min a) + f(a)','y = f(a) maal x + f\'(a)','y = f\'(x) maal a','y = f(x) maal (x min a)'],c:0,u:'De raaklijn heeft helling f\'(a) en gaat door het punt (a, f(a)). Invullen in de lijnvergelijking y - f(a) = f\'(a)(x - a) geeft het antwoord.'},
{v:'Wat betekent toenemend stijgend?',o:['De functie stijgt en de stijging wordt steeds sneller: f\' groter dan 0 en f\'\' groter dan 0','De functie daalt steeds sneller','De functie stijgt met een constant tempo','De functie stijgt steeds langzamer'],c:0,u:'Toenemend stijgend: f\' positief (stijgend) en f\'\' positief (de stijging neemt toe). De grafiek buigt omhoog. Afnemend stijgend: f\' positief maar f\'\' negatief (stijging vlakt af).'},
{v:'Wat is de kettingregel?',o:['Bij samengestelde functies f(g(x)) is de afgeleide f\'(g(x)) maal g\'(x): buitenste differentiëren maal binnenste differentiëren','De afgeleide van een product van functies','De afgeleide van een breuk van functies','De integraal van een samengestelde functie'],c:0,u:'Kettingregel: buitenste functie differentiëren, binnenste laten staan, vermenigvuldigen met de afgeleide van de binnenste. Voorbeeld: (sin(3x))\' = cos(3x) maal 3.'}
   ],
   oe:[
