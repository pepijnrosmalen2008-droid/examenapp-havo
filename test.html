const VAKKEN = [

{id:'nl',naam:'Nederlands',code:'NE',kleur:'#E85C0D',
 beschrijving:'Leesvaardigheid en literatuur op HAVO-niveau.',
 ceInfo:'CE = leesvaardigheid (domein B) en literatuur (domein F). Schrijfvaardigheid (domein E) telt alleen mee voor het schoolexamen.',
 domeinen:[
  {id:'B',naam:'Leesvaardigheid',beschrijving:'Tekstbegrip, tekststructuur en argumentatieve teksten',
   onderwerpen:['Hoofdgedachte en deelonderwerpen','Signaalwoorden en tekststructuur','Feit en mening','Argumentatiestructuur','Tekstsoorten (betoog, beschouwing, instructie)','Bedoeling en toon van de schrijver'],
   sam:'<strong>Hoofdgedachte</strong>: het overkoepelende standpunt of de centrale boodschap die de hele tekst draagt. <strong>Signaalwoorden</strong>: geven tekstrelaties aan. Gevolg: daardoor, dus, zodat. Tegenstelling: maar, echter, toch. Toevoeging: bovendien, daarnaast. Concessie: weliswaar, hoewel. <strong>Feit vs. mening</strong>: feiten zijn controleerbaar; meningen bevatten waardeoordelen. <strong>Argumentatiestructuur</strong>: enkelvoudig (één argument), meervoudig (meerdere onafhankelijke argumenten), onderschikkend (argument wordt zelf onderbouwd). <strong>Concessie en weerlegging</strong>: auteur erkent tegenargument (concessie) maar handhaaft standpunt (weerlegging). <strong>Tekstsoorten</strong>: betoog (overtuigen), beschouwing (meerdere kanten belichten), informatieve tekst, instructie.',
   sv:[
{v:'Wat is de hoofdgedachte van een tekst?',o:['Het overkoepelende standpunt of centrale boodschap die de hele tekst draagt','De eerste zin van de inleiding','Het onderwerp van de eerste alinea','De definitie waarmee de tekst opent'],c:0,u:'De hoofdgedachte is het centrale idee dat elke alinea ondersteunt. Het is het standpunt of de boodschap over het onderwerp, niet het onderwerp zelf.'},
{v:'Welk signaalwoord geeft een tegenstelling aan?',o:['Echter','Daardoor','Bovendien','Weliswaar'],c:0,u:'Echter geeft een tegenstelling aan. Daardoor is een gevolg. Bovendien is een toevoeging. Weliswaar leidt een concessie in.'},
{v:'Wat is het verschil tussen een betoog en een beschouwing?',o:['Een betoog verdedigt één standpunt om te overtuigen. Een beschouwing belicht meerdere perspectieven zonder te willen overtuigen.','Een betoog is altijd langer dan een beschouwing','Een beschouwing bevat alleen feiten','Er is geen verschil in communicatief doel'],c:0,u:'Betoog: overtuigen van één standpunt. Beschouwing: verkennen van een vraagstuk en meerdere kanten laten zien.'},
{v:'Wat is een concessie in een betoog?',o:['De schrijver erkent een tegenargument maar handhaaft zijn eigen standpunt','De schrijver trekt zijn standpunt volledig in','De schrijver somt zijn argumenten op','De schrijver herhaalt de stelling aan het einde'],c:0,u:'Concessie: de auteur geeft iets toe (weliswaar klopt X) maar handhaaft het eigen standpunt (maar toch geldt Y). Dit maakt de redenering geloofwaardiger.'},
{v:'Wat onderscheidt een feit van een mening?',o:['Een feit is objectief controleerbaar. Een mening bevat een waardeoordeel dat niet objectief bewezen kan worden.','Een feit staat altijd in de krant','Een mening begint altijd met ik vind','Feiten zijn altijd positief geformuleerd'],c:0,u:'Feiten zijn aantoonbaar waar of onwaar. Meningen bevatten subjectieve oordelen zoals goed, slecht of onacceptabel.'}
   ],
   oe:[
{bron:'HAVO Nederlands CE 2023 Tijdvak 1 Tekst 3 (geen afbeelding)',ctx:'Fragment uit een opinieartikel over smartphones op school:\n\n"Scholen die smartphones verbieden, denken het probleem op te lossen. Maar verbieden werkt averechts: leerlingen worden nieuwsgieriger en smokkelen hun telefoon naar binnen. Bovendien missen ze de kans om te leren omgaan met afleiding. Toch zijn er goede redenen om de telefoon tijdens lessen weg te houden: concentratie is meetbaar beter als het scherm wegblijft."',v:'Beschrijf de redeneerstructuur van deze passage. Welke twee standpunten worden tegenover elkaar gezet en hoe lost de schrijver de spanning op?',o:[''],c:0,u:'De schrijver stelt dat verbieden averechts werkt (standpunt 1, twee argumenten). Via een concessie erkent hij dat beperkt schermgebruik zinvol kan zijn. De spanning wordt niet volledig opgelost, het eindigt bij een genuanceerd compromis.'},
{bron:'HAVO Nederlands CE 2022 Tijdvak 2 Tekst 1 (geen afbeelding)',ctx:'Fragment over sociale media en zelfbeeld:\n\n"Onderzoek toont aan dat 41% van de meisjes tussen 12 en 18 aangeeft dat sociale media hun zelfbeeld negatief beinvloeden. Deskundigen wijzen op het mechanisme van sociale vergelijking. Een deel van de onderzoekers relativeert echter de uitkomsten: correlatie is geen causaliteit. Misschien zijn jongeren die al onzeker zijn meer geneigd sociale media te gebruiken."',v:'Leg uit wat de onderzoeker bedoelt met correlatie is geen causaliteit en waarom dit relevant is voor de conclusie.',o:[''],c:0,u:'Correlatie: twee dingen gaan samen. Causaliteit: het een veroorzaakt het ander. De onderzoeker waarschuwt dat de richting onduidelijk is. Misschien kiezen onzekere jongeren voor meer social media, niet andersom. Dit verzwakt de conclusie dat social media het zelfbeeld schaadt.'},
{bron:'HAVO Nederlands CE 2024 Tijdvak 1 Tekst 2 (geen afbeelding)',ctx:'Fragment uit een betoog over literatuuronderwijs:\n\n"Wie pleit voor meer beta op school, vergeet de kern: taal is het fundament van elk vak. Zonder leesvaardige leerlingen produceert ook het beste wiskundecurriculum slechte resultaten. Literatuur is daarbij onmisbaar, niet als tijdverdrijf, maar als oefening in perspectief nemen."',v:'Identificeer het standpunt en twee argumenten. Welke schrijftechniek gebruikt de auteur door te beginnen met Wie pleit voor meer beta?',o:[''],c:0,u:'Standpunt: literatuuronderwijs is onmisbaar. Argument 1: taal is fundament van alle vakken. Argument 2: literatuur traint perspectief nemen. De opener is een retorische aanval op de tegenstander: door de tegenstander te beschrijven als iemand die de kern vergeet, positioneert de auteur zichzelf als degene die het wel begrijpt.'}
   ]},
  {id:'F',naam:'Literatuur',beschrijving:'Literaire begrippen, stromingen en tekstanalyse',
   onderwerpen:['Vertelstandpunt en focalisatie','Thema en motief','Literaire stromingen (Romantiek, Realisme, Modernisme)','Personages en karakterisering','Chronologie en tijdsverschijnselen','Poëzie: klank, beeld en structuur'],
   sam:'<strong>Ik-verteller</strong>: personage in het verhaal, begrensd perspectief. <strong>Alwetende verteller</strong>: weet gedachten van alle personages. <strong>Personale verteller</strong>: derde persoon, perspectief van een personage. <strong>Focalisatie</strong>: door wiens ogen zien we de wereld van het verhaal? <strong>Thema</strong>: centrale abstracte boodschap (eenzaamheid, identiteit). <strong>Motief</strong>: concreet terugkerend element dat het thema ondersteunt (bijv. een leeg huis als motief bij eenzaamheid). <strong>Romantiek</strong> (19e eeuw): gevoel, natuur, verheerlijking verleden, afwijzing moderniteit. <strong>Realisme</strong>: objectieve weergave werkelijkheid, sociale misstanden. <strong>Modernisme</strong>: stream of consciousness, fragmentarisch vertellen, innerlijk bewustzijn. <strong>Retarderende momenten</strong>: spanning opbouwende vertragingen. <strong>In medias res</strong>: verhaal begint midden in de actie.',
   sv:[
{v:'Wat is een ik-verteller?',o:['Een personage in het verhaal dat in de eerste persoon vertelt met een begrensd perspectief','Een alwetende verteller die alle gedachten kent','Een verteller die buiten het verhaal staat','Een verteller in de tweede persoon'],c:0,u:'Ik-verteller: subjectief, weet alleen wat hij of zij zelf ervaart. Geen toegang tot gedachten van andere personages.'},
{v:'Welke literaire stroming kenmerkt zich door stream of consciousness?',o:['Modernisme','Realisme','Romantiek','Naturalisme'],c:0,u:'Modernisme (vroeg 20e eeuw): nadruk op innerlijk bewustzijn, experimentele vertelvormen, stream of consciousness.'},
{v:'Wat is het verschil tussen thema en motief?',o:['Thema is de centrale abstracte boodschap van de hele tekst. Motief is een terugkerend concreet element dat het thema ondersteunt.','Ze zijn synoniemen','Thema is voor poëzie en motief voor proza','Motief is de samenvatting van het thema'],c:0,u:'Thema is abstract (eenzaamheid). Motief is concreet en terugkerend, bijv. een leeg huis dat steeds verschijnt als symbool van eenzaamheid.'},
{v:'Wat kenmerkt het Realisme?',o:['Objectieve getrouwe weergave van de werkelijkheid inclusief sociale misstanden en armoede','Nadruk op gevoel en verheerlijking van de natuur','Ironie en conventiedoorbreking','Innerlijk bewustzijn en experimentele vertelvorm'],c:0,u:'Realisme (19e eeuw): schrijvers wilden de maatschappij eerlijk weergeven, inclusief armoede en sociale ongelijkheid. Reactie op de romantische idealisering.'},
{v:'Wat is focalisatie?',o:['Vanuit wiens perspectief de wereld van het verhaal wordt waargenomen','De schrijfstijl van de auteur','Het tempo van de vertelling','Het aantal vertelperspectieven in een tekst'],c:0,u:'Focalisatie is het gezichtspunt: door wiens ogen zien we de wereld van het verhaal? Dit hoeft niet samen te vallen met de verteller.'}
   ],
   oe:[
{bron:'HAVO Nederlands CE 2023 Tijdvak 1 Literatuurvraag proza (geen afbeelding)',ctx:'Fragment:\n\n"Hij zag haar staan bij het raam, maar hij zag haar niet echt zien. Ze keek naar buiten naar iets wat hij nooit zou kunnen zien. Hij had er lang geleden mee leren leven: er bestond in haar een kamer waartoe hij geen toegang had."',v:'(a) Wat is het vertelstandpunt in dit fragment? (b) Welk literair motief wordt gebruikt en wat symboliseert het?',o:[''],c:0,u:'(a) Personale derde-persoons verteller. We volgen de mannelijke hoofdpersoon en kennen zijn gedachten, maar niet die van haar. (b) Het motief van de gesloten kamer en het raam symboliseert emotionele afstand en onbereikbaarheid. Het raam is een klassiek grensmotief.'},
{bron:'HAVO Nederlands CE 2022 Tijdvak 2 Literatuurvraag stromingen (geen afbeelding)',ctx:'Fragment A: "De fabriek stampte en dreunde. Haar handen bewogen machinaal, tien uur lang, elke dag. Thuis wachtte de kelder, het kraanwater en de kinderen."\n\nFragment B: "O, natuur! Ik werp mij in uw armen. Laat uw wouden mij omsluiten, laat uw rivieren mijn ziel reinigen van de smet der beschaving."',v:'Aan welke literaire stromingen horen Fragment A en B? Noem per fragment twee kenmerken die je keuze onderbouwen.',o:[''],c:0,u:'Fragment A is Realisme: objectieve beschrijving van arbeidersomstandigheden, sociale ellende zonder idealisering, alledaagse taal. Fragment B is Romantiek: verheerlijking van de natuur, emotioneel taalgebruik, afwijzing van de beschaving.'},
{bron:'HAVO Nederlands CE 2024 Tijdvak 1 Literatuurvraag thema en motief (geen afbeelding)',ctx:'Samenvatting roman: Een jonge vrouw keert terug naar het huis van haar jeugd na het overlijden van haar moeder. Steeds als ze een kamer bezoekt duiken herinneringen op. Het huis staat te koop en wordt afgebroken. Aan het einde vertrekt ze zonder naar het afbreken te kijken.',v:'Noem het thema van deze roman en leg uit hoe het motief van het huis dit thema ondersteunt.',o:[''],c:0,u:'Thema: rouw en loslaten, of de verhouding tussen verleden en heden. Het huis belichaamt het verleden en de moeder. Het afbreken staat voor het definitief afsluiten van het verleden. Door niet te kijken laat de hoofdpersoon los, wat de rouwverwerking verbeeldt.'}
   ]}
 ]},

{id:'wa',naam:'Wiskunde A',code:'WA',kleur:'#2563EB',
 beschrijving:'Algebra, verbanden en statistiek op HAVO-niveau.',
 ceInfo:'CE = domein B (Algebra en tellen), domein C (Verbanden) en domein E (Statistiek). Kansen is geen CE-domein voor Wiskunde A HAVO.',
 domeinen:[
  {id:'B',naam:'Algebra en tellen',beschrijving:'Rekenen, algebra, exponenten en telproblemen',
   onderwerpen:['Rekenen met breuken en procenten','Algebra: herleiden en oplossen','Exponenten en wortels','Logaritmen','Telproblemen: vermenigvuldigingsprincipe en combinaties'],
   sam:'<strong>Algebraisch herleiden</strong>: vereenvoudigen van uitdrukkingen, werken met haakjes. <strong>Vergelijkingen oplossen</strong>: lineair (ax+b=c), kwadratisch (abc-formule). <strong>Exponenten</strong>: <span class="fm">aˣ · aʸ = aˣ⁺ʸ</span>, <span class="fm">(aˣ)ʸ = aˣʸ</span>. <strong>Logaritmen</strong>: inverse van machtsverheffen. <span class="fm">ˡᵒᵍa = x ⟺ 10ˣ = a</span>. Rekenregels: <span class="fm">log(a·b) = log a + log b</span>, <span class="fm">log(aⁿ) = n·log a</span>. <strong>Telproblemen</strong>: vermenigvuldigingsprincipe, combinaties <span class="fm">C(n,k) = n!/(k!(n-k)!)</span>.',
   sv:[
{v:'Wat is het resultaat van log(1000)?',o:['3','10','100','1000'],c:0,u:'Log 1000 = 3 want 10 tot de derde macht = 1000. Logaritme is de inverse van machtsverheffen met grondtal 10.'},
{v:'Wat is een logaritme?',o:['De omgekeerde bewerking van machtsverheffen: log a = x betekent 10 tot de macht x = a','Een speciaal type exponentiële functie','De wortel van een getal','De verhouding tussen twee functies'],c:0,u:'Logaritme is de inverse van machtsverheffing. Log 10000 = 4 want 10 tot de 4de = 10000.'},
{v:'Welke rekenregel geldt voor log(a maal b)?',o:['log a + log b','log a maal log b','log a min log b','log(a+b)'],c:0,u:'Log(a maal b) = log a + log b. Dit volgt uit de exponenregel: 10 tot de x maal 10 tot de y = 10 tot de macht x+y.'},
{v:'Wat is C(5,2), het aantal combinaties van 2 uit 5?',o:['10','20','5','120'],c:0,u:'C(5,2) = 5! gedeeld door (2! maal 3!) = 120 gedeeld door 12 = 10. Bij combinaties telt volgorde niet mee.'},
{v:'Wat is het verschil tussen een combinatie en een permutatie?',o:['Bij een combinatie telt volgorde niet mee. Bij een permutatie telt volgorde wel mee.','Bij een permutatie telt volgorde niet mee','Combinaties zijn altijd groter','Er is geen verschil'],c:0,u:'Permutatie: volgorde telt, meer mogelijkheden. Combinatie: volgorde telt niet, C(n,k) = n! gedeeld door k! maal (n min k)!.'}
   ],
   oe:[
{bron:'HAVO Wiskunde A CE 2023 Tijdvak 2 Telvraag (geen afbeelding)',ctx:'Een restaurant heeft 8 voorgerechten, 6 hoofdgerechten en 5 desserts. Een gast kiest altijd precies 1 van elk.',v:'(a) Hoeveel verschillende driegangenmenu\'s zijn er mogelijk?\n(b) De chef kiest 3 voorgerechten voor de chef\'s selection (volgorde maakt niet uit). Op hoeveel manieren?',o:[''],c:0,u:'(a) 8 maal 6 maal 5 = 240 driegangenmenu\'s (vermenigvuldigingsprincipe).\n(b) C(8,3) = 8 maal 7 maal 6 gedeeld door 6 = 56 manieren.'},
{bron:'HAVO Wiskunde A CE 2022 Tijdvak 1 Logaritmevraag (geen afbeelding)',ctx:'Een geluidsniveau wordt gemeten in decibel (dB). De formule is: L = 10 maal log(I gedeeld door I0), waarbij I de geluidsintensiteit is en I0 = 10 tot de macht min 12 W/m2.',v:'(a) Bereken het geluidsniveau bij I = 10 tot de macht min 6 W/m2.\n(b) Als het geluidsniveau verdubbelt, met hoeveel dB stijgt het niveau?',o:[''],c:0,u:'(a) L = 10 maal log(10 tot de macht min 6 gedeeld door 10 tot de macht min 12) = 10 maal log(10 tot de macht 6) = 10 maal 6 = 60 dB.\n(b) 10 maal log(2I gedeeld door I0) min 10 maal log(I gedeeld door I0) = 10 maal log 2 is gelijk aan 10 maal 0,301 is gelijk aan 3 dB.'},
{bron:'HAVO Wiskunde A CE 2024 Tijdvak 1 Wachtwoordvraag (geen afbeelding)',ctx:'Een wachtwoord bestaat uit 4 letters uit het alfabet van 26 letters. Letters mogen worden herhaald.',v:'(a) Hoeveel wachtwoorden zijn er?\n(b) Hoeveel wachtwoorden beginnen met de letter A?\n(c) Bereken de kans dat een willekeurig wachtwoord begint met A.',o:[''],c:0,u:'(a) 26 tot de 4de macht = 456.976.\n(b) 1 maal 26 maal 26 maal 26 = 17.576.\n(c) P = 17.576 gedeeld door 456.976 = 1 gedeeld door 26 = 3,8%.'}
   ]},
  {id:'C',naam:'Verbanden',beschrijving:'Lineaire en exponentiële verbanden, functies en grafieken',
   onderwerpen:['Tabellen en grafieken interpreteren','Lineaire verbanden: rico en y-snijpunt','Exponentiële verbanden: groeifactor en halveringstijd','Kwadratische verbanden','Formules met variabelen','Vergelijkingen en ongelijkheden grafisch oplossen'],
   sam:'<strong>Lineair verband</strong>: <span class="fm">y = ax + b</span>. Rico a = steilheid. b = beginwaarde (snijpunt y-as). <strong>Exponentieel verband</strong>: <span class="fm">y = a · gˣ</span>. Groeifactor g > 1 is groei; 0 < g < 1 is verval. Procentuele verandering per stap is constant. <strong>Groeifactor bij p%</strong>: g = 1 + p/100. <strong>Halveringstijd</strong>: tijd om de helft te worden. <span class="fm">T½ = log(0,5) / log(g)</span>. <strong>Verdubbelingstijd</strong>: <span class="fm">T₂ = log(2) / log(g)</span>. <strong>Kwadratisch verband</strong>: <span class="fm">y = ax² + bx + c</span>. Top op <span class="fm">x = -b/(2a)</span>.',
   sv:[
{v:'Wat is een exponentieel verband?',o:['Een verband waarbij de procentuele verandering per stap constant is: y = a maal g tot de macht x','Een verband waarbij de absolute verandering per stap constant is','Een rechte lijn door de oorsprong','Een kwadratisch verband'],c:0,u:'Exponentieel: y = a maal g tot de macht x. Groeifactor g groter dan 1 is groei; 0 kleiner dan g kleiner dan 1 is verval. De procentuele verandering per stap is constant.'},
{v:'Wat is de groeifactor bij een groei van 7% per jaar?',o:['1,07','0,93','7','0,07'],c:0,u:'Groeifactor = 1 + p/100 = 1 + 7/100 = 1,07. Bij verval van 7% zou het 1 min 0,07 = 0,93 zijn.'},
{v:'Wat beschrijft de rico van een lineaire functie?',o:['De helling: hoeveel y verandert als x met 1 toeneemt','Het snijpunt met de y-as','Het snijpunt met de x-as','De maximumwaarde van de functie'],c:0,u:'Rico a is de steilheid van de lijn. Positief: stijgend. Negatief: dalend. Berekening: a = verandering y gedeeld door verandering x.'},
{v:'Wat is de halveringstijd bij exponentieel verval?',o:['De tijd die nodig is om de hoeveelheid te halveren: T half = log(0,5) gedeeld door log(g)','De tijd om de hoeveelheid te verdubbelen','De helft van de beginhoeveelheid','De groeifactor van het verval'],c:0,u:'Halveringstijd: na een halveringstijd is er nog 50% over. Formule: T half = log(0,5) gedeeld door log(g). Radioactief verval en medicijnafbraak volgen dit patroon.'},
{v:'Hoe bereken je de top van een kwadratische functie y = ax2 + bx + c?',o:['x-coordinaat top = min b gedeeld door (2 maal a)','x-coordinaat top = b gedeeld door (2 maal a)','x-coordinaat top = min b gedeeld door a','De top is altijd bij x = 0'],c:0,u:'De top van een parabool ligt bij x = min b gedeeld door (2 maal a). De y-coordinaat volgt door invullen in de functie.'}
   ],
   oe:[
{bron:'HAVO Wiskunde A CE 2023 Tijdvak 1 Exponentieel verband (geen afbeelding)',ctx:'Een gemeente meet fijnstofconcentratie in microg/m3. Op 1 januari 2020 is de concentratie 80 microg/m3. Door milieubeleid daalt de concentratie elk jaar met 8%. De WHO-norm is 15 microg/m3.',v:'(a) Schrijf een formule voor de concentratie C na t jaar.\n(b) Na hoeveel jaar wordt de WHO-norm bereikt?',o:[''],c:0,u:'(a) C(t) = 80 maal 0,92 tot de macht t (verval 8%, groeifactor 0,92).\n(b) 80 maal 0,92 tot de t = 15 geeft 0,92 tot de t = 0,1875 geeft t = log(0,1875) gedeeld door log(0,92) is gelijk aan 20,2 jaar.'},
{bron:'HAVO Wiskunde A CE 2022 Tijdvak 2 Kwadratische functie (geen afbeelding)',ctx:'De hoogte in meters van een bal t seconden na de worp wordt beschreven door:\nf(t) = min2 maal t kwadraat + 8t + 3',v:'(a) Bepaal de maximale hoogte en het tijdstip.\n(b) Wat betekent de top in deze context?',o:[''],c:0,u:'(a) t-top = min 8 gedeeld door (2 maal min 2) = 2 seconden. f(2) = min 8 + 16 + 3 = 11 meter.\n(b) Na 2 seconden bereikt de bal zijn hoogste punt van 11 meter. Daarna valt hij terug.'},
{bron:'HAVO Wiskunde A CE 2024 Tijdvak 1 Groeimodel (geen afbeelding)',ctx:'Een bedrijf heeft op t = 0 een omzet van 500.000 euro. De eerste 5 jaar groeit de omzet met 6% per jaar. Daarna groeit de omzet met 2% per jaar.',v:'Bereken in welk jaar de omzet voor het eerst 1.000.000 euro overschrijdt.',o:[''],c:0,u:'Na 5 jaar: 500.000 maal 1,06 tot de 5de macht is gelijk aan 669.113 euro.\nFase 2: 669.113 maal 1,02 tot de macht (t min 5) = 1.000.000 geeft 1,02 tot de macht (t min 5) = 1,4945 geeft t min 5 = log(1,4945) gedeeld door log(1,02) is gelijk aan 20,2. Dus t is gelijk aan 25,2. In jaar 26 wordt 1 miljoen overschreden.'}
   ]},
  {id:'E',naam:'Statistiek',beschrijving:'Beschrijvende statistiek, normale verdeling en hypothesetoetsen',
   onderwerpen:['Gemiddelde, mediaan, modus en spreiding','Standaardafwijking','Normale verdeling en vuistregels','Z-scores','Steekproef en populatie','Hypothesetoets: H0 en H1'],
   sam:'<strong>Gemiddelde</strong>: som gedeeld door n. <strong>Mediaan</strong>: middelste waarde (minder gevoelig voor uitschieters). <strong>Standaardafwijking s</strong>: maat voor spreiding; hoe groter s, hoe meer variatie. <strong>Normale verdeling</strong> vuistregel: mu plus of min sigma is 68%, mu plus of min 2 sigma is 95%, mu plus of min 3 sigma is 99,7%. <strong>Z-score</strong>: <span class="fm">z = (x − μ) / σ</span>. Geeft aan hoeveel standaardafwijkingen een waarde van het gemiddelde afwijkt. <strong>Hypothesetoets</strong>: H0 = nulhypothese (geen verschil, status quo). H1 = alternatieve hypothese. Als p kleiner dan alpha dan verwerp je H0. Significantieniveau alpha meestal 5%.',
   sv:[
{v:'Wat meet de standaardafwijking?',o:['Hoe sterk waarden in een dataset gemiddeld afwijken van het gemiddelde','De middelste waarde in een gesorteerde rij','Het verschil tussen hoogste en laagste waarde','De meest voorkomende waarde'],c:0,u:'Grote standaardafwijking betekent veel variatie. Kleine standaardafwijking betekent dat waarden dicht bij het gemiddelde liggen.'},
{v:'Welk percentage valt binnen mu plus of min 2 sigma bij een normale verdeling?',o:['Ongeveer 95%','Ongeveer 68%','Ongeveer 99,7%','Ongeveer 50%'],c:0,u:'Vuistregel: mu plus of min sigma is 68%, mu plus of min 2 sigma is 95%, mu plus of min 3 sigma is 99,7%. Dit geldt alleen bij een normaalverdeling.'},
{v:'Wat is de nulhypothese H0?',o:['De aanname dat er niets bijzonders is, de geen-effect-hypothese','De hypothese die je wil bewijzen','De hypothese die altijd wordt verworpen','Het gemiddelde van de populatie'],c:0,u:'H0 is de status quo: geen verschil, geen effect. Pas als de data sterk genoeg is, verwerp je H0. Je bewijst H1 nooit direct.'},
{v:'Wat is het verschil tussen mediaan en gemiddelde?',o:['Mediaan is de middelste waarde en minder gevoelig voor uitschieters. Gemiddelde is som gedeeld door n en gevoelig voor uitschieters.','Ze zijn altijd gelijk','Mediaan is som gedeeld door n','Gemiddelde is altijd de middelste waarde'],c:0,u:'Bij uitschieters geeft de mediaan een beter beeld van het midden. Het gemiddelde wordt sterk beinvloed door extreme waarden.'},
{v:'Wat is een z-score?',o:['Het aantal standaardafwijkingen dat een waarde boven of onder het gemiddelde ligt: z = (x min mu) gedeeld door sigma','De kans dat een waarde in de normaalverdeling valt','Het gemiddelde van een steekproef','De spreiding van de data'],c:0,u:'Z = (x min mu) gedeeld door sigma. Een z-score van 2 betekent 2 standaardafwijkingen boven het gemiddelde.'}
   ],
   oe:[
{bron:'HAVO Wiskunde A CE 2023 Tijdvak 2 Statistiekopgave (geen afbeelding)',ctx:'De lengte van 400 volwassen mannen is normaal verdeeld met gemiddelde mu = 181 cm en standaardafwijking sigma = 7 cm.',v:'(a) Tussen welke lengtes valt ongeveer 95% van de mannen?\n(b) Een man is 202 cm. Bereken zijn z-score en leg uit wat dit betekent.',o:[''],c:0,u:'(a) mu plus of min 2 sigma = 181 plus of min 14, dus tussen 167 en 195 cm valt 95%.\n(b) z = (202 min 181) gedeeld door 7 = 3,0. Drie standaardafwijkingen boven het gemiddelde: uitzonderlijk lang, slechts 0,15% is langer.'},
{bron:'HAVO Wiskunde A CE 2022 Tijdvak 1 Hypothesetoets (geen afbeelding)',ctx:'Een snoepfabrikant beweert dat een zak gemiddeld 50 gummies bevat. Steekproef n = 40: x gemiddeld = 47,8, s = 4,2. Significantieniveau alpha = 5%.',v:'(a) Formuleer H0 en H1.\n(b) Leg in eigen woorden uit wat het betekent als je H0 verwerpt.',o:[''],c:0,u:'(a) H0: mu = 50. H1: mu ongelijk aan 50 (tweezijdige toets).\n(b) Als je H0 verwerpt concludeer je dat het gemiddeld aantal gummies significant afwijkt van 50. De fabrikant vult de zakken niet zoals beweerd. Met alpha = 5% accepteer je een kans van 5% dat je H0 ten onrechte verwerpt.'},
{bron:'HAVO Wiskunde A CE 2024 Tijdvak 2 Beschrijvende statistiek (geen afbeelding)',ctx:'Wachttijden (minuten) bij een huisartsenpraktijk: 2, 3, 5, 5, 8, 9, 12, 14, 14, 18.\nKwaliteitsnorm: gemiddeld maximaal 8 minuten.',v:'(a) Bereken het gemiddelde en de mediaan.\n(b) Welk kenmetal is het meest representatief en waarom?',o:[''],c:0,u:'(a) Gemiddelde = 90 gedeeld door 10 = 9,0 minuten. Mediaan = (8 + 9) gedeeld door 2 = 8,5 minuten.\n(b) Mediaan is representatiever: de uitschieter 18 trekt het gemiddelde omhoog. De mediaan is robuuster voor uitschieters.'}
   ]}
 ]},

{id:'bi',naam:'Biologie',code:'BI',kleur:'#16A34A',
 beschrijving:'Biologie op HAVO-niveau aan de hand van de nieuwe syllabus 2026 (matrix: Molecuul, Orgaan, Populatie niveau).',
 ceInfo:'CE 2026 = nieuwe matrixopzet. CE-stof: M-niveau (cel en molecuul), O-niveau (orgaan en organisme) en P-niveau (populatie en ecosysteem). Domein A (vaardigheden) is verweven door alle CE-onderdelen.',
 domeinen:[
  {id:'M',naam:'Molecuul- en celniveau',beschrijving:'Stofwisseling van de cel, zelforganisatie (DNA/erfelijkheid) en selectie op moleculair niveau',
   onderwerpen:['Celorganellen en hun functies','Fotosynthese en celademhaling','Cel- en kerndelingen (mitose en meiose)','DNA-structuur, replicatie, transcriptie en translatie','Mutaties en genexpressie','Genetica: Mendelse overerving en stamboombomen'],
   sam:'<strong>Celorganellen</strong>: mitochondrion (ATP via ademhaling), chloroplast (fotosynthese), ribosoom (eiwitsynthese), kern (DNA). <strong>Fotosynthese</strong>: 6CO₂ + 6H₂O + licht → C₆H₁₂O₆ + 6O₂ (in chloroplasten). <strong>Celademhaling aeroob</strong>: C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 36-38 ATP. <strong>Anaeroob (gisting)</strong>: glucose → ethanol + CO₂ + 2 ATP (noodoplossing bij O₂-tekort). <strong>DNA</strong>: dubbelhelix, basenparen A-T en G-C. <strong>Transcriptie</strong>: DNA → mRNA (in kern). <strong>Translatie</strong>: mRNA → eiwit (op ribosoom). <strong>Codon</strong>: triplet van 3 mRNA-basen codeert voor 1 aminozuur. <strong>Mendelse overerving</strong>: dominant/recessief, genotype (allelen) vs fenotype (waarneembaar). <strong>X-gebonden</strong>: gen op X-chromosoom; mannen (XY) zijn sneller aangedaan.',
   sv:[
{v:'Wat is de functie van mitochondrien?',o:['Uitvoeren van aerobe celademhaling en produceren van ATP','Fotosynthese uitvoeren','Eiwitten produceren via ribosomen','Genetische informatie opslaan'],c:0,u:'Mitochondrien zijn de energiecentrales van de cel. Glucose en zuurstof worden omgezet in CO2, water en 36 tot 38 ATP.'},
{v:'Welke basenparen komen voor in DNA?',o:['Adenine-Thymine en Guanine-Cytosine','Adenine-Uracil en Guanine-Cytosine','Adenine-Guanine en Thymine-Cytosine','Uracil-Adenine en Guanine-Cytosine'],c:0,u:'In DNA: A koppelt aan T en G koppelt aan C. In RNA vervangt Uracil de Thymine.'},
{v:'Wat is het verschil tussen transcriptie en translatie?',o:['Transcriptie is DNA naar mRNA in de kern. Translatie is mRNA naar eiwit op het ribosoom.','Transcriptie is mRNA naar eiwit en translatie is DNA naar mRNA','Transcriptie is op het ribosoom','Ze zijn beide stappen in DNA-replicatie'],c:0,u:'Transcriptie is het overschrijven van DNA naar mRNA in de celkern. Translatie is het vertalen van mRNA naar een aminozuurketen op het ribosoom.'},
{v:'Wat is het verschil tussen aerobe en anaerobe ademhaling?',o:['Aeroob gebruikt zuurstof en levert 36 tot 38 ATP. Anaeroob gebruikt geen zuurstof en levert slechts 2 ATP.','Aeroob is zonder zuurstof en anaeroob met zuurstof','Ze leveren evenveel ATP','Anaeroob is altijd efficienter'],c:0,u:'Aeroob is volledig en levert veel ATP. Anaerobe gisting is een noodoplossing bij zuurstoftekort en levert weinig ATP.'},
{v:'Wat is het verschil tussen genotype en fenotype?',o:['Genotype zijn de allelen die het organisme draagt. Fenotype is de waarneembare eigenschap.','Genotype is het uiterlijk en fenotype zijn de genen','Genotype is altijd dominant','Ze zijn synoniemen'],c:0,u:'Genotype is de genetische samenstelling, bijv. Bb. Fenotype is wat je kunt waarnemen, bijv. bruine ogen.'}
   ],
   oe:[
{bron:'HAVO Biologie CE 2023 Tijdvak 1 Osmosevraag (geen afbeelding)',ctx:'Een biologieleraar plaatst plantencel A in gedestilleerd water en plantencel B in een geconcentreerde zoutoplossing. Na 30 minuten worden beide cellen onderzocht.',v:'Beschrijf wat er met elke cel is gebeurd en verklaar dit vanuit osmose.',o:[''],c:0,u:'Cel A (gedestilleerd water): oplosconcentratie in cel is hoger dan buiten, water stroomt de cel in via osmose, cel zwelt op en wordt turgescent. Celwand voorkomt barsten door turgordruk.\nCel B (zout): oplosconcentratie buiten is hoger, water stroomt de cel uit, vacuole krimpt, celinhoud trekt los van de celwand: plasmolyse.'},
{bron:'HAVO Biologie CE 2022 Tijdvak 2 ATP-vergelijking (geen afbeelding)',ctx:'Onderzoekers vergelijken ATP-productie bij alcoholgisting en aerobe celademhaling, beide uitgaande van 1 mol glucose.',v:'(a) Geef de reactievergelijkingen.\n(b) Verklaar waarom aerobe ademhaling zoveel meer ATP oplevert.',o:[''],c:0,u:'(a) Aeroob: C6H12O6 + 6O2 geeft 6CO2 + 6H2O + 36 tot 38 ATP.\nGisting: C6H12O6 geeft 2 C2H5OH + 2CO2 + 2 ATP.\n(b) Aeroob verloopt via glycolyse, citroenzuurcyclus en elektronentransportketen: volledige oxidatie. Gisting stopt na glycolyse, de restenergie blijft in ethanol. Gisting is noodoplossing bij zuurstoftekort.'},
{bron:'HAVO Biologie CE 2023 Tijdvak 2 X-gebonden overerving (geen afbeelding)',ctx:'Hemofilie A is X-gebonden recessief. Een vrouw (niet aangedaan, haar vader had hemofilie) trouwt met een gezonde man.',v:'(a) Bepaal het genotype van de vrouw en leg uit hoe je dit weet.\n(b) Maak een kruisingschema en geef de kansen per geslacht.',o:[''],c:0,u:'(a) Vader had hemofilie, zijn enige X draagt het aangedane allel Xh. De vrouw erfde Xh van haar vader en XH van haar moeder, dus ze is draagster: XHXh.\n(b) XHXh maal XHY:\nDochters: XHXh (draagster) of XHXH (gezond), 0% aangedaan.\nZonen: XhY (hemofilie) of XHY (gezond), 50% van zonen aangedaan.'}
   ]},
  {id:'O',naam:'Orgaan- en organismeniveau',beschrijving:'Stofwisseling van het organisme, zelfregulatie en afweer',
   onderwerpen:['Spijsvertering en opname van voedingsstoffen','Gasuitwisseling (longen, kieuwen)','Bloedsomloop en transport','Hormoonwerking en negatieve terugkoppeling','Zenuwstelsel: neuronen, synaps, reflexbogen','Afweersysteem: specifiek en aspecifiek'],
   sam:'<strong>Negatieve terugkoppeling</strong>: een effect dat de oorspronkelijke stimulus tegengaat; homeostase. Bijv. hoog bloedsuiker → insuline → bloedsuiker daalt. <strong>Hormonen</strong>: insuline (bètacellen, bloedsuiker ↓), glucagon (alfacellen, bloedsuiker ↑), ADH (waterhuishouding). <strong>Zenuwstelsel</strong>: CZS (hersenen + ruggenmerg), PZS (zenuwen). Neurotransmitters brengen signaal over synaptische spleet. <strong>Reflexboog</strong>: receptor → sensorisch neuron → ruggenmerg → motorisch neuron → effector. Sneller dan bewuste route. <strong>Afweer</strong>: aspecifiek (huid, lysozym, macrofagen, ontsteking) en specifiek (lymfocyten). B-cellen → antilichamen. T-cellen → cel-gemedieerde afweer. Immunologisch geheugen → snellere reactie bij herinfectie.',
   sv:[
{v:'Wat is negatieve terugkoppeling?',o:['Een effect dat de oorspronkelijke stimulus tegengaat en zo homeostase handhaaft','Een effect dat de stimulus versterkt','Een hormonaal signaal zonder feedback','De relatie predator-prooi'],c:0,u:'Negatieve terugkoppeling is homeostase. Hoog bloedsuiker leidt tot insuline, bloedsuiker daalt, minder insuline nodig.'},
{v:'Welk hormoon verhoogt de bloedsuikerspiegel en welk verlaagt die?',o:['Glucagon verhoogt en insuline verlaagt','Insuline verhoogt en glucagon verlaagt','Adrenaline verlaagt en insuline verhoogt','Beide verhogen de bloedsuiker'],c:0,u:'Insuline (bètacellen alvleesklier): stimuleert glucoseopname in cellen, bloedsuiker daalt. Glucagon (alfacellen): glycogeenafbraak in lever, bloedsuiker stijgt.'},
{v:'Wat is de functie van een neurotransmitter?',o:['Het overbrengen van het zenuwsignaal over de synaptische spleet naar het volgende neuron','Het geleiden van het actiepotentiaal langs het axon','Het beschermen van het axon met de myelineschede','Het produceren van hormonen'],c:0,u:'Neurotransmitters worden vrijgelaten bij de synaps, diffunderen over de spleet en binden aan receptoren op de postsynaptische cel.'},
{v:'Wat is het verschil tussen specifieke en aspecifieke afweer?',o:['Aspecifiek reageert snel op alle indringers zonder geheugen. Specifiek reageert gericht op een bepaald antigeen en vormt immunologisch geheugen.','Specifiek reageert sneller dan aspecifiek','Aspecifiek omvat alleen antilichamen','Er is geen functioneel verschil'],c:0,u:'Aspecifiek: eerste verdedigingslinie, snel, niet specifiek (huid, macrofagen, ontsteking). Specifiek: langzamer, gericht op antigeen, vormt geheugen voor snellere reactie bij herinfectie.'},
{v:'Welke cellen produceren antilichamen?',o:['B-lymfocyten (B-cellen) die zijn uitgegroeid tot plasmacellen','T-lymfocyten','Macrofagen','Rode bloedcellen'],c:0,u:'B-cellen worden bij activatie plasmacel. Plasmacellen produceren antilichamen die specifiek binden aan het bijbehorende antigeen.'}
   ],
   oe:[
{bron:'HAVO Biologie CE 2023 Tijdvak 1 Regulatievraag (geen afbeelding)',ctx:'Een sporter loopt een marathon. Halverwege de race is zijn bloedsuikerspiegel gedaald tot onder het normale niveau.',v:'Beschrijf de hormonale reactie. Noem de klier, het hormoon en het effect op de lever.',o:[''],c:0,u:'Lage bloedsuiker leidt ertoe dat de alfacellen van de alvleesklier glucagon afscheiden. Glucagon bereikt de lever via het bloed en stimuleert de glycogeenafbraak tot glucose. Glucose komt in het bloed en de bloedsuikerspiegel stijgt. Dit is negatieve terugkoppeling.'},
{bron:'HAVO Biologie CE 2022 Tijdvak 2 Reflexvraag (geen afbeelding)',ctx:'Als je per ongeluk een hete pan aanraakt, trek je je hand terug voordat je de pijn ervaart.',v:'(a) Beschrijf de route van het zenuwsignaal bij deze reflex.\n(b) Verklaar waarom de hand al teruggetrokken is voordat je de pijn ervaart.',o:[''],c:0,u:'(a) Receptor in huid detecteert hitte, sensorisch neuron, ruggenmerg (interneuron schakelt door), motorisch neuron, spier trekt samen, hand wordt teruggetrokken.\n(b) De reflexboog loopt via het ruggenmerg, niet via de hersenen. De route naar de hersenen voor bewuste pijnervaring is langer. De reflex is een snelle onbewuste beschermingsreactie.'},
{bron:'HAVO Biologie CE 2024 Tijdvak 1 Afweervraag (geen afbeelding)',ctx:'Een persoon krijgt een vaccinatie tegen griep. Een jaar later wordt hij besmet met hetzelfde griepvirus.',v:'Leg uit waarom de persoon minder ziek wordt dan iemand die nooit gevaccineerd is. Gebruik de begrippen antigeen, antilichaam en immunologisch geheugen.',o:[''],c:0,u:'Het vaccin bevat (verzwakte of dode) griepvirus-antigenen. Het immuunsysteem reageert hierop door specifieke antilichamen te maken en geheugen B-cellen te vormen (immunologisch geheugen). Bij echte besmetting herkennen de geheugen B-cellen het antigeen direct en produceren snel veel antilichamen. Het virus wordt sneller geneutraliseerd voor het ziek kan maken.'}
   ]},
  {id:'P',naam:'Populatie- en ecosysteemniveau',beschrijving:'Ecosystemen, soortvorming en evolutie',
   onderwerpen:['Voedselketens en energiedoorgifte (10%-regel)','Populatiedynamiek','Eutrofiering en ecostoornissen','Soortvorming (allopatrisch, sympatrisch)','Darwins evolutietheorie','Hardy-Weinberg evenwicht'],
   sam:'<strong>Energiedoorgifte</strong>: per trofisch niveau wordt circa 10% doorgegeven; 90% gaat verloren als warmte en uitscheiding. Voedselketens zijn daardoor beperkt tot 4-5 schakels. <strong>Eutrofiering</strong>: nutrienten (N, P) → algenbloei → zuurstofdaling → vissterfte. <strong>Darwins evolutietheorie</strong>: variatie + erfelijkheid + overproductie + selectie → evolutie. <strong>Allopatrische speciatie</strong>: soortvorming door geografische isolatie. <strong>Hardy-Weinberg</strong>: <span class="fm">p² + 2pq + q² = 1</span>. Allelfrequenties constant in grote populatie zonder selectie, mutatie of migratie. Afwijking wijst op evolutionaire krachten. <strong>Genetische drift</strong>: toevalsverandering allelfrequenties in kleine populaties.',
   sv:[
{v:'Wat is de 10%-regel in ecologie?',o:['Per trofisch niveau wordt circa 10% van de energie doorgegeven; 90% gaat verloren als warmte en uitscheiding','10% van de soorten produceert 90% van de biomassa','Populaties groeien maximaal 10% per jaar','10% energie wordt opgeslagen in de bodem'],c:0,u:'Energiestroom: elke stap verliest circa 90% als warmte, beweging en uitscheiding. Voedselketens zijn beperkt tot 4 of 5 schakels door dit verlies.'},
{v:'Wat zijn de vier kernprincipes van Darwins evolutietheorie?',o:['Variatie, erfelijkheid, overproductie en natuurlijke selectie','Mutatie, migratie, drift en selectie','Adaptatie, speciatie, extinctie en diversificatie','Variatie, mutatie, recombinatie en uitsterven'],c:0,u:'Darwin: variatie plus erfelijkheid plus overproductie plus selectie. Individuen met voordelige eigenschappen overleven beter en geven die door.'},
{v:'Wat is allopatrische speciatie?',o:['Soortvorming door geografische isolatie van twee populaties van dezelfde soort','Soortvorming binnen hetzelfde gebied zonder isolatie','Soortvorming door mutaties zonder selectie','Soortvorming door genetische drift alleen'],c:0,u:'Allopatrisch: geografische barriere isoleert twee populaties. Door verschillende selectiedruk en toevalsveranderingen worden de populaties genetisch zo anders dat ze zich niet meer kunnen voortplanten: nieuwe soorten.'},
{v:'Wat beschrijft Hardy-Weinberg?',o:['Allelfrequenties blijven constant in een grote populatie zonder selectie, mutatie of migratie','De frequentie van mutaties in een populatie','De snelheid van evolutie door selectie','Het aantal generaties voor speciatie'],c:0,u:'p kwadraat + 2pq + q kwadraat = 1. Afwijking van Hardy-Weinberg wijst op evolutionaire krachten zoals selectie, drift of migratie.'},
{v:'Wat is genetische drift?',o:['Toevalsveranderingen in allelfrequenties in kleine populaties, onafhankelijk van selectie','Gerichte verandering door selectiedruk','Verandering door migratie','Mutatieaccumulatie over generaties'],c:0,u:'Drift is willekeurig: in kleine populaties kan een allel verdwijnen door toeval, niet door voor- of nadeel.'}
   ],
   oe:[
{bron:'HAVO Biologie CE 2023 Tijdvak 2 Speciatie (geen afbeelding)',ctx:'Op een eiland leven twee populaties vogels van dezelfde soort. Door een bergketen zijn ze 50.000 jaar van elkaar geisoleerd. De vogels verschillen nu sterk in snavellengte en kunnen zich niet meer met elkaar voortplanten.',v:'(a) Welk evolutionair proces heeft plaatsgevonden?\n(b) Beschrijf de stappen die tot dit resultaat hebben geleid.',o:[''],c:0,u:'(a) Allopatrische speciatie (soortvorming door geografische isolatie).\n(b) Stap 1: geografische isolatie door de bergketen. Stap 2: in elke populatie treedt door mutatie en recombinatie toevallig variatie op. Stap 3: verschillende omgevingen selecteren voor verschillende snaveltypes. Stap 4: na 50.000 jaar zijn de genetische verschillen zo groot dat reproductie niet meer mogelijk is: nieuwe soorten.'},
{bron:'HAVO Biologie CE 2022 Tijdvak 1 Eutrofieringsvraag (geen afbeelding)',ctx:'In een meer explodeert de algengroei in de zomer. Tegelijkertijd sterft er veel vis. Boeren rondom het meer gebruiken stikstof- en fosfaatrijke kunstmest.',v:'Beschrijf het volledige ecologische proces dat leidt tot vissterfte. Noem de rol van nutrienten, algen en bacterien.',o:[''],c:0,u:'Eutrofiering: (1) nutrienten (N, P) uit kunstmest spoelen in het meer. (2) Hoge nutrientenconcentraties stimuleren explosieve algengroei. (3) Algen blokkeren zonlicht, waterplanten sterven. (4) Afgestorven algen worden afgebroken door bacterien. (5) Bacteriele afbraak verbruikt grote hoeveelheden zuurstof. (6) Zuurstofdaling (hypoxie) leidt tot vissterfte.'},
{bron:'HAVO Biologie CE 2024 Tijdvak 2 Hardy-Weinberg (geen afbeelding)',ctx:'In een vlinderpopulatie is het allel voor witte vleugels (w) recessief. 16% van de vlinders heeft witte vleugels.',v:'(a) Bereken de allelfrequenties p en q.\n(b) Bereken het percentage heterozygote vlinders.\n(c) Noem twee voorwaarden voor Hardy-Weinberg evenwicht.',o:[''],c:0,u:'(a) q kwadraat = 0,16 geeft q = 0,4. p = 1 min 0,4 = 0,6.\n(b) Heterozygoten: 2pq = 2 maal 0,6 maal 0,4 = 0,48 = 48%.\n(c) Twee uit: grote populatie, willekeurige paring, geen selectie, geen mutatie, geen migratie.'}
   ]}
 ]},

{id:'sk',naam:'Scheikunde',code:'SK',kleur:'#F59E0B',
 beschrijving:'Stoffen, chemische processen en koolstofchemie op HAVO-niveau.',
 ceInfo:'CE = domein B (Stoffen en materialen), domein C (Chemische processen) en domein D (Koolstofchemie). Binas 7e editie is toegestaan bij het CE.',
 domeinen:[
  {id:'B',naam:'Stoffen en materialen',beschrijving:'Atoomstructuur, bindingen en eigenschappen van stoffen',
   onderwerpen:['Atoomstructuur en periodiek systeem','Ionbinding en eigenschappen van ionverbindingen','Covalente binding (polair en apolair)','Waterstofbruggen en Van der Waalskrachten','Molecuulpolairiteit en geometrie','Oplossen van stoffen (like dissolves like)'],
   sam:'<strong>Periodiek systeem</strong>: geordend op atoomnummer Z. Periode = aantal schillen. Groep = valentie-elektronen. <strong>Ionbinding</strong>: metaal geeft e⁻ af aan niet-metaal → ionen. Hoog smeltpunt, geleidt als vloeistof. <strong>Covalente binding</strong>: elektronenpaar gedeeld. Polair: ongelijke EN → δ+/δ⁻. Apolair: gelijke EN. <strong>Molecuulpolairiteit</strong>: hangt af van geometrie. CO₂ lineair → dipolenvectoren heffen elkaar op → apolair. H₂O hoekig → polair. <strong>Waterstofbruggen</strong>: N-H···N, O-H···O, F-H···F. Verklaren hoog kookpunt van water. <strong>Van der Waalskrachten</strong>: tijdelijke dipolen, zwak, sterker bij grotere moleculen. <strong>Like dissolves like</strong>: polair lost op in polair (NaCl in water). Apolair in apolair (vet in benzine).',
   sv:[
{v:'Wat is het verschil tussen ionbinding en covalente binding?',o:['Ionbinding is overdracht van elektronen van metaal naar niet-metaal. Covalente binding is deling van een elektronenpaar tussen niet-metalen.','Ionbinding is altijd sterker','Covalent komt alleen in gassen voor','Ze zijn hetzelfde bij hoge temperatuur'],c:0,u:'Ionbinding geeft tegengesteld geladen ionen. Covalente binding geeft gedeelde elektronenparen in moleculen.'},
{v:'Waarom is CO2 apolair ondanks polaire bindingen?',o:['CO2 is lineair (O=C=O): de twee dipoolvectoren zijn gelijk en tegengesteld en heffen elkaar op, nettodipoolmoment = 0','CO2 heeft geen polaire bindingen','Lineaire moleculen zijn altijd polair','CO2 heeft maar een zuurstofatoom'],c:0,u:'Molecuulpolairiteit hangt af van geometrie. Symmetrische moleculen zoals CO2 zijn apolair ondanks polaire bindingen.'},
{v:'Wat zijn waterstofbruggen en wanneer ontstaan ze?',o:['Intermoleculaire aantrekking tussen een polair H-atoom en een vrij elektronenpaar op N, O of F van een naburig molecuul','Bindingen tussen waterstofatomen onderling','Krachten die alleen in water voorkomen','Covalente bindingen in watermoleculen'],c:0,u:'Waterstofbruggen zijn de sterkste intermoleculaire krachten. Ze verklaren het hoge kookpunt van water, ammonia en waterstoffluoride.'},
{v:'Wat geeft de groep aan in het periodiek systeem?',o:['Het aantal valentie-elektronen, bepalend voor het chemisch gedrag','Het aantal protonen in de kern','Het aantal elektronenschillen','De atoomstraal'],c:0,u:'Groepen zijn de kolommen. Elementen in dezelfde groep hebben hetzelfde aantal valentie-elektronen en vergelijkbare chemische eigenschappen.'},
{v:'Wat betekent like dissolves like?',o:['Polaire stoffen lossen op in polaire oplosmiddelen. Apolaire stoffen lossen op in apolaire oplosmiddelen.','Alle stoffen lossen op in water','Stoffen lossen altijd op in hetzelfde type vloeistof','Zuren lossen altijd op in water'],c:0,u:'NaCl (ionisch, polair) lost op in water (polair): hydratatie-energie compenseert de roosterenergie. In hexaan (apolair) ontbreekt die hydratatie-energie.'}
   ],
   oe:[
{bron:'HAVO Scheikunde CE 2023 Tijdvak 1 Bindingsvraag (geen afbeelding)',ctx:'Vergelijk de kookpunten van methaan (CH4, kpt min 162 graden C), chloorwaterstof (HCl, kpt min 85 graden C) en water (H2O, kpt 100 graden C). Alle drie zijn kleine moleculen.',v:'Verklaar het verschil in kookpunt van de drie stoffen op basis van intermoleculaire krachten. Noem het type kracht voor elk molecuul.',o:[''],c:0,u:'CH4: apolair, alleen zwakke Van der Waalskrachten, laagste kookpunt.\nHCl: polair covalent (H en Cl hebben ongelijke EN), permanente dipoolkrachten, hoger kookpunt dan CH4.\nH2O: vormt sterke waterstofbruggen (O-H...O) door hoge polariteit, hoogste kookpunt. Waterstofbruggen zijn sterker dan dipoolkrachten.'},
{bron:'HAVO Scheikunde CE 2022 Tijdvak 2 Molecuulgeometrie (geen afbeelding)',ctx:'CO2 heeft twee polaire C=O bindingen maar het molecuul is apolair.\nNH3 heeft drie N-H bindingen en het molecuul is polair.',v:'Leg uit hoe de geometrie van een molecuul bepaalt of het polair of apolair is. Gebruik CO2 en NH3 als voorbeelden.',o:[''],c:0,u:'CO2 is lineair (O=C=O, 180 graden): de twee identieke dipoolvectoren heffen elkaar op, nettodipoolmoment = 0, apolair.\nNH3 heeft een piramidevormige geometrie met drie N-H bindingen en een vrij elektronenpaar op N. De dipoolvectoren heffen elkaar niet op, nettodipoolmoment is ongelijk aan 0, polair molecuul.'},
{bron:'HAVO Scheikunde CE 2024 Tijdvak 1 Oploshaarheid (geen afbeelding)',ctx:'Natriumchloride (NaCl) lost goed op in water maar praktisch niet in hexaan (een apolaire vloeistof).',v:'Verklaar dit verschil vanuit het principe like dissolves like en het type krachten dat een rol speelt.',o:[''],c:0,u:'Like dissolves like: polaire en ionische stoffen lossen op in polaire oplosmiddelen; apolaire stoffen in apolaire.\nNaCl is ionisch: polaire watermoleculen omsluiten de ionen (hydratatie), hydratatie-energie compenseert de roosterenergie, NaCl lost op.\nIn hexaan (apolair) ontbreekt de hydratatie-energie: ionen kunnen het ionrooster niet verlaten, NaCl lost niet op.'}
   ]},
  {id:'C',naam:'Chemische processen',beschrijving:'Reacties, evenwicht, zuren en basen, en stoichiometrie',
   onderwerpen:['Reactietypen en reactievergelijkingen','Chemisch evenwicht (Le Chatelier)','Zuren en basen (Bronsted-Lowry)','pH berekening','Sterke vs zwakke zuren','Reactiesnelheid en katalyse','Mol, concentratie en stoichiometrie','Verdunning en titratie'],
   sam:'<strong>Zuur (Bronsted)</strong>: protondonor (H⁺ afstaan). <strong>Base</strong>: protonacceptor. Sterk zuur: volledig gedissocieerd (HCl, HNO₃). Zwak zuur: gedeeltelijk (CH₃COOH). <strong>pH</strong>: <span class="fm">pH = −log[H₃O⁺]</span>. Neutraal = 7. Zuur < 7. Basisch > 7. <span class="fm">pH + pOH = 14</span>. <strong>Le Chatelier</strong>: verstoring → evenwicht verschuift om verstoring te compenseren. Hogere druk → kant met minder mol gas. Exotherm: lagere T → meer product. <strong>Katalysator</strong>: verlaagt activeringsenergie, zelf niet verbruikt. <strong>Mol</strong>: n = m/M. <strong>Concentratie</strong>: c = n/V. <strong>Verdunning</strong>: c₁V₁ = c₂V₂. <strong>Stoichiometrie</strong>: coëfficiënten = molverhoudingen.',
   sv:[
{v:'Wat is een zuur volgens Bronsted-Lowry?',o:['Een stof die een proton (H+) kan afstaan aan een andere stof','Een stof die elektronen aanneemt','Een stof met pH groter dan 7','Een stof die hydroxide-ionen afgeeft'],c:0,u:'Bronsted: zuur is protondonor. Base is protonacceptor. Water is amfoteer en kan beide rollen aannemen.'},
{v:'Wat is het Le Chatelier-principe?',o:['Bij een verstoring verschuift het evenwicht in de richting die de verstoring compenseert','Evenwichten verschuiven altijd naar rechts bij hogere druk','Katalysatoren verschuiven het evenwicht','Temperatuur heeft nooit invloed op evenwichten'],c:0,u:'Le Chatelier: het systeem past zich aan om de stoornis te verminderen. Hogere concentratie reactant geeft meer product gevormd.'},
{v:'Wat is het verschil tussen een sterk en een zwak zuur?',o:['Sterk zuur dissocieert volledig in water. Zwak zuur dissocieert slechts gedeeltelijk.','Sterk zuur heeft altijd pH 0','Zwak zuur is gevaarlijker','Sterk en zwak verwijzen naar concentratie'],c:0,u:'Sterk: HCl, HNO3, H2SO4 zijn 100% gedissocieerd. Zwak: azijnzuur heeft een evenwicht en is slechts gedeeltelijk gedissocieerd.'},
{v:'Hoe beeinvloedt een katalysator de reactie?',o:['De katalysator verlaagt de activeringsenergie zodat de reactie sneller verloopt zonder zelf verbruikt te worden','De katalysator verhoogt de activeringsenergie','De katalysator verschuift het chemisch evenwicht','De katalysator wordt verbruikt in de reactie'],c:0,u:'Katalysator: lagere energiebarriere geeft meer moleculen die kunnen reageren. De evenwichtsligging zelf verandert niet.'},
{v:'Wat is een mol?',o:['De hoeveelheid stof die 6,022 maal 10 tot de 23de deeltjes bevat, het getal van Avogadro','De massa van een stof in grammen','De concentratie van een oplossing','Het aantal grammen per liter'],c:0,u:'1 mol = 6,022 maal 10 tot de 23de deeltjes. n = m gedeeld door M. De molaire massa M lees je af uit het periodiek systeem.'}
   ],
   oe:[
{bron:'HAVO Scheikunde CE 2023 Tijdvak 2 Evenwichtsvraag (geen afbeelding)',ctx:'De synthese van ammoniak: N2(g) + 3H2(g) is in evenwicht met 2NH3(g). Delta H = min 92 kJ/mol (exotherm).\nIn de industrie wordt dit uitgevoerd bij circa 200 atm en 450 graden C met ijzer als katalysator.',v:'(a) Voorspel met Le Chatelier de invloed van hoge druk op de NH3-opbrengst.\n(b) Verklaar waarom lage temperatuur de opbrengst verhoogt maar de reactie vertraagt.',o:[''],c:0,u:'(a) Links: 1 + 3 = 4 mol gas. Rechts: 2 mol gas. Hogere druk verschuift het evenwicht naar de kant met minder mol gas, naar rechts, hogere NH3-opbrengst.\n(b) Lage T: exotherme reactie verschuift naar rechts (meer NH3). Maar lagere T geeft moleculen minder kinetische energie, minder botsingen boven de activeringsenergie, langzamere reactie. Compromis bij 450 graden C plus ijzerkatalysator.'},
{bron:'HAVO Scheikunde CE 2022 Tijdvak 1 Titratie (geen afbeelding)',ctx:'Bij een titratie wordt 20,0 mL natriumhydroxide (NaOH) geneutraliseerd door 15,0 mL zoutzuur (HCl) met een concentratie van 0,150 mol/L.\nNaOH + HCl geeft NaCl + H2O',v:'(a) Bereken het aantal mol HCl dat wordt gebruikt.\n(b) Bereken de concentratie van de NaOH-oplossing.',o:[''],c:0,u:'(a) n(HCl) = c maal V = 0,150 maal 0,0150 = 0,00225 mol.\n(b) NaOH:HCl = 1:1 geeft n(NaOH) = 0,00225 mol. c(NaOH) = 0,00225 gedeeld door 0,0200 = 0,113 mol/L.'},
{bron:'HAVO Scheikunde CE 2024 Tijdvak 2 Stoichiometrie (geen afbeelding)',ctx:'IJzer(III)oxide reageert met waterstofgas:\nFe2O3(s) + 3H2(g) geeft 2Fe(s) + 3H2O(g)\nM(Fe2O3) = 160 g/mol, M(Fe) = 56 g/mol',v:'(a) Hoeveel gram ijzer kan maximaal worden gewonnen uit 480 g Fe2O3?\n(b) Bij 168 g Fe verkregen, bereken het rendement.',o:[''],c:0,u:'(a) n(Fe2O3) = 480 gedeeld door 160 = 3 mol. Verhouding Fe2O3:Fe = 1:2 geeft n(Fe) = 6 mol. m(Fe) = 6 maal 56 = 336 g.\n(b) Rendement = 168 gedeeld door 336 maal 100% = 50%.'}
   ]},
  {id:'D',naam:'Koolstofchemie',beschrijving:'Organische chemie: koolwaterstofverbindingen, functionele groepen en reacties',
   onderwerpen:['Homologe reeksen: alkanen, alkenen, alkynen','Functionele groepen (alcohol, carbonzuur, amine, ester)','Naamgeving organische verbindingen','Structuurisomerie','Reactietypen: additie, substitutie, esterificatie, hydrolyse','Polymeren (additie- en condensatiepolymerisatie)'],
   sam:'<strong>Alkanen</strong>: CₙH₂ₙ₊₂, verzadigd, alleen C-C bindingen. Reactief via substitutie (UV-licht). <strong>Alkenen</strong>: CₙH₂ₙ, een C=C dubbele binding. Reactief via additie. <strong>Functionele groepen</strong>: −OH (alcohol), −COOH (carbonzuur), −NH₂ (amine), −COO− (ester), −CHO (aldehyde). <strong>Structuurisomerie</strong>: zelfde molecuulformule, andere structuur. <strong>Additie</strong>: reagens wordt aan dubbele binding toegevoegd, product is verzadigd. <strong>Substitutie</strong>: H-atoom vervangen door ander atoom. <strong>Esterificatie</strong>: −COOH + −OH ⇌ ester + H₂O (katalysator H⁺). <strong>Additiepolymerisatie</strong>: alkenen koppelen aaneen (PE), geen bijproduct. <strong>Condensatiepolymerisatie</strong>: twee monomeertypen reageren, bijproduct water of HCl (PET, nylon).',
   sv:[
{v:'Wat is het verschil tussen alkanen en alkenen?',o:['Alkanen zijn verzadigd (alleen C-C enkelvoudige bindingen). Alkenen bevatten een C=C dubbele binding.','Alkanen zijn altijd gasvormig','Alkanen reageren met zuren; alkenen niet','Er is geen chemisch functioneel verschil'],c:0,u:'Alkanen CnH(2n+2): verzadigd, reactief via substitutie. Alkenen CnH(2n): onverzadigd, reactief via additie aan de dubbele binding.'},
{v:'Wat is esterificatie?',o:['De reactie van een carbonzuur met een alcohol waarbij een ester en water ontstaan. Reactie is omkeerbaar.','De reactie van een alkaan met een halogeen','De hydrolyse van een vet','De oxidatie van een alcohol tot een zuur'],c:0,u:'R-COOH + R-OH is in evenwicht met R-COO-R + H2O. Katalysator H+. Esters ruiken fruitig.'},
{v:'Wat is het verschil tussen additie- en condensatiepolymerisatie?',o:['Additie: alkenen koppelen aaneen zonder bijproduct (PE). Condensatie: twee monomeertypen reageren met bijproduct water of HCl (PET, nylon).','Additie heeft altijd een bijproduct','Condensatie is alleen voor plastics','Er is geen functioneel verschil'],c:0,u:'Additiepoly: opening van C=C, geen bijproduct. Condensatiepoly: twee monomeertypen, water of HCl als bijproduct.'},
{v:'Wat is structuurisomerie?',o:['Verbindingen met dezelfde molecuulformule maar een andere rangschikking van atomen','Verbindingen met dezelfde structuur maar andere molecuulformule','Spiegelbeeldsymmetrie van moleculen','Moleculen die kunnen roteren om een binding'],c:0,u:'Structuurisomeren: zelfde brutoformule, andere rangschikking. Bijv. butaan en methylpropaan, beide C4H10.'},
{v:'Welk reactietype treedt op bij een alkeen en broomwater?',o:['Additie: Br2 wordt toegevoegd aan de dubbele binding, broomkleur verdwijnt','Substitutie: Br vervangt een H-atoom','Esterificatie','Eliminatie: HBr wordt afgesplitst'],c:0,u:'Alkenen reageren via additie. CH2=CH2 + Br2 geeft CH2Br-CH2Br. De broomkleur verdwijnt omdat Br2 verbruikt wordt. Dit is de test voor onverzadigdheid.'}
   ],
   oe:[
{bron:'HAVO Scheikunde CE 2023 Tijdvak 1 Esterificatie (geen afbeelding)',ctx:'Een student wil boterzuurethylester synthetiseren uit boterzuur (C3H7COOH) en ethanol (C2H5OH).',v:'(a) Schrijf de reactievergelijking.\n(b) Noem twee maatregelen om de opbrengst te verhogen en leg per maatregel de reden uit.',o:[''],c:0,u:'(a) C3H7COOH + C2H5OH is in evenwicht met C3H7COOC2H5 + H2O (katalysator H+).\n(b) Maatregel 1: overmaat van een reactant toevoegen (Le Chatelier: evenwicht verschuift naar rechts). Maatregel 2: water verwijderen bijv. door destillatie (product weghalen: evenwicht verschuift naar rechts).'},
{bron:'HAVO Scheikunde CE 2022 Tijdvak 2 Polymeerchemie (geen afbeelding)',ctx:'Polyetheen (PE) en nylon zijn beide polymeren maar worden op fundamenteel andere manieren gemaakt.',v:'Vergelijk de vorming van polyetheen en nylon. Noem het type polymerisatie, de monomeren en of er een bijproduct vrijkomt.',o:[''],c:0,u:'Polyetheen: additiepolymerisatie van etheen (CH2=CH2). De C=C binding opent en moleculen koppelen aaneen. Geen bijproduct.\nNylon: condensatiepolymerisatie van een diamine en een dicarbonzuur. Amidebindingen (CO-NH) worden gevormd en bij elke koppeling komt water vrij als bijproduct.'},
{bron:'HAVO Scheikunde CE 2024 Tijdvak 1 Broomwatertest (geen afbeelding)',ctx:'Etheen (CH2=CH2) reageert met broomwater (Br2-oplossing).',v:'(a) Noem het reactietype en schrijf de vergelijking.\n(b) Hoe gebruik je dit principe om te testen of een stof verzadigd of onverzadigd is?',o:[''],c:0,u:'(a) Additiereactie: CH2=CH2 + Br2 geeft CH2Br-CH2Br (1,2-dibroomethaan).\n(b) Broomwater is oranjegeel. Bij onverzadigde stof verdwijnt de kleur omdat Br2 verbruikt wordt bij additie. Bij een verzadigde stof blijft de broomkleur behouden.'}
   ]}
 ]},

{id:'na',naam:'Natuurkunde',code:'NA',kleur:'#3B82F6',
 beschrijving:'Golven, beweging, elektriciteit en straling op HAVO-niveau.',
 ceInfo:'CE = domein B (Golven), domein C (Beweging en wisselwerking), domein D (Lading en veld) en domein E (Straling en materie). Binas 7e editie is toegestaan.',
 domeinen:[
  {id:'B',naam:'Golven',beschrijving:'Geluid, licht, elektromagnetisch spectrum en beeldvorming',
   onderwerpen:['Golfvergelijking v = f maal lambda','Trillingen en golfsoorten (transversaal/longitudinaal)','Elektromagnetisch spectrum','Reflectie en refractie (wet van Snellius)','Brekingsindex','Golflengte en kleur van licht'],
   sam:'<strong>Golfvergelijking</strong>: <span class="fm">v = f · λ</span> (m/s = Hz × m). Geluid circa 340 m/s in lucht. Licht = 3×10⁸ m/s in vacuüm. <strong>Golfsoorten</strong>: transversaal (trilling loodrecht op voortplanting; licht), longitudinaal (trilling in voortplantingsrichting; geluid). <strong>EM-spectrum</strong> (golflengte van klein naar groot): gamma — röntgen — UV — zichtbaar — IR — microgolf — radio. Kortere golflengte = hogere frequentie = meer energie. <strong>Reflectie</strong>: invalshoek = reflectiehoek (meting vanaf normaal). <strong>Refractie</strong>: licht buigt bij overgang naar ander medium doordat de snelheid verandert. <strong>Brekingsindex</strong>: <span class="fm">n = c/v</span>. Snel → langzaam medium: buigt naar normaal. <strong>Totale interne reflectie</strong>: bij overgang van optisch dicht naar optisch ijl boven kritische hoek.',
   sv:[
{v:'Wat is de golfvergelijking?',o:['v = f maal lambda: golfsnelheid = frequentie maal golflengte','v = lambda gedeeld door f','f = v maal lambda','v = lambda maal T'],c:0,u:'v = f maal lambda. Licht: v = 3 maal 10 tot de 8 m/s. Geluid: circa 340 m/s in lucht bij kamertemperatuur.'},
{v:'Welke elektromagnetische straling heeft de kortste golflengte?',o:['Gammastraling','Radiogolven','Infrarood','Zichtbaar licht'],c:0,u:'Gamma heeft de kortste golflengte, dan rontgen, UV, zichtbaar, IR, microgolf, radio. Kortere golflengte is hogere frequentie en meer energie per foton.'},
{v:'Wat is het verschil tussen een transversale en longitudinale golf?',o:['Transversaal: trilling loodrecht op de voortplantingsrichting (bijv. licht). Longitudinaal: trilling in de voortplantingsrichting (bijv. geluid).','Transversaal is longitudinaal hetzelfde','Longitudinaal heeft altijd een hogere frequentie','Transversaal kan niet door vacuüm'],c:0,u:'Licht is transversaal. Geluid is longitudinaal. Alleen transversale golven kunnen door vacuüm.'},
{v:'Wat is de brekingsindex van een materiaal?',o:['n = c gedeeld door v: de verhouding van de lichtsnelheid in vacuüm tot de lichtsnelheid in het materiaal','n = v gedeeld door c','n = f maal lambda','n = golflengte in vacuüm gedeeld door golflengte in medium'],c:0,u:'Hoe hoger de brekingsindex, hoe langzamer het licht in het materiaal en hoe sterker het buigt bij refractie.'},
{v:'Wat gebeurt er bij refractie (lichtbreking)?',o:['De lichtsnelheid en richting veranderen bij overgang naar een ander medium. De frequentie blijft gelijk.','Alleen de richting verandert, niet de snelheid','Licht wordt volledig teruggekaatst','De frequentie van het licht verandert'],c:0,u:'Bij refractie verandert de golfsnelheid in het nieuwe medium, wat de richting doet veranderen. De frequentie blijft gelijk; de golflengte verandert.'}
   ],
   oe:[
{bron:'HAVO Natuurkunde CE 2023 Tijdvak 1 Golfvraag geluid (geen afbeelding)',ctx:'Een ultrasone scanner stuurt geluidsgolven met frequentie 5 MHz (5 maal 10 tot de 6de Hz) door weefsel. De golfsnelheid in weefsel is 1540 m/s.',v:'(a) Bereken de golflengte in weefsel.\n(b) Verklaar waarom hogere frequentie betere beeldresolutie geeft.',o:[''],c:0,u:'(a) lambda = v gedeeld door f = 1540 gedeeld door (5 maal 10 tot de 6de) = 3,08 maal 10 tot de min 4 m = 0,31 mm.\n(b) Hogere frequentie geeft kortere golflengte. Details kunnen pas worden waargenomen als ze groter zijn dan de golflengte. Kortere golflengte maakt kleinere structuren zichtbaar: betere resolutie.'},
{bron:'HAVO Natuurkunde CE 2022 Tijdvak 2 Brekingsvraag (geen afbeelding)',ctx:'Licht gaat van glas met brekingsindex n = 1,5 naar lucht (n = 1,0).',v:'(a) Bereken de lichtsnelheid in glas.\n(b) Licht treft het grensvlak onder 50 graden (gemeten van de normaal). Buigt het licht naar of van de normaal? Verklaar.',o:[''],c:0,u:'(a) n = c gedeeld door v geeft v = c gedeeld door n = 3 maal 10 tot de 8de gedeeld door 1,5 = 2 maal 10 tot de 8de m/s.\n(b) Van glas (langzaam, dicht medium) naar lucht (snel, ijl medium): het licht buigt van de normaal af, de hoek wordt groter. Als de invalshoek de kritische hoek overschrijdt treedt totale interne reflectie op.'},
{bron:'HAVO Natuurkunde CE 2024 Tijdvak 1 EM-spectrum vraag (geen afbeelding)',ctx:'Een mobiele telefoon zendt radiogolven uit met frequentie 2,4 GHz (2,4 maal 10 tot de 9de Hz). De lichtsnelheid is 3 maal 10 tot de 8de m/s.',v:'(a) Bereken de golflengte van deze radiogolven.\n(b) Welke schade kunnen deze golven aan het menselijk lichaam veroorzaken vergeleken met UV-straling?',o:[''],c:0,u:'(a) lambda = v gedeeld door f = 3 maal 10 tot de 8de gedeeld door (2,4 maal 10 tot de 9de) = 0,125 m = 12,5 cm.\n(b) Radiogolven hebben een veel langere golflengte en lagere energie dan UV-straling. UV heeft genoeg energie om DNA te beschadigen (kanker). Radiogolven hebben die energie niet. Ze kunnen wel warmteeffecten veroorzaken bij hoge intensiteit maar zijn veel minder gevaarlijk dan UV.'}
   ]},
  {id:'C',naam:'Beweging en wisselwerking',beschrijving:'Krachten, kinematica en energie',
   onderwerpen:['Kinematische vergelijkingen (constante versnelling)','Wetten van Newton','Zwaartekracht, normaalkracht en wrijving','Arbeid en vermogen','Kinetische en potentiele energie','Wet van behoud van energie'],
   sam:'<strong>Kinematica</strong>: <span class="fm">v = v₀ + at</span>, <span class="fm">s = v₀t + ½at²</span>, <span class="fm">v² = v₀² + 2as</span>. <strong>Newton 1</strong>: bij F_res = 0 is de snelheid constant (traagheid). <strong>Newton 2</strong>: <span class="fm">F = ma</span> (N = kg·m/s²). <strong>Newton 3</strong>: actie = −reactie; gelijke grootte, tegengestelde richting, op VERSCHILLENDE objecten. <strong>Zwaartekracht</strong>: F_z = mg (g ≈ 10 m/s²). <strong>Arbeid</strong>: <span class="fm">W = F·s·cos θ</span> (J). <strong>Vermogen</strong>: <span class="fm">P = W/t = F·v</span> (W). <strong>Kinetische energie</strong>: <span class="fm">E_k = ½mv²</span>. <strong>Potentiele energie</strong>: <span class="fm">E_p = mgh</span>. <strong>Energiebehoud</strong>: E_k + E_p = constant (zonder wrijving).',
   sv:[
{v:'Wat zegt de tweede wet van Newton?',o:['De nettokracht op een voorwerp is gelijk aan massa maal versnelling: F = ma','Een voorwerp blijft in rust als krachten in evenwicht zijn','Actie is gelijk en tegengesteld aan reactie','Kracht is gelijk aan massa maal snelheid'],c:0,u:'F = ma in newton = kilogram maal meter per seconde kwadraat. Hoe groter de massa, hoe meer kracht nodig voor dezelfde versnelling.'},
{v:'Wat is de derde wet van Newton?',o:['Als A een kracht uitoefent op B dan oefent B een even grote maar tegengestelde kracht uit op A, op een ander object','Een voorwerp blijft in rust zonder krachten','F = ma','Zwaartekracht is altijd naar beneden gericht'],c:0,u:'Actie-reactiepaar: gelijke grootte, tegengestelde richting, maar op VERSCHILLENDE voorwerpen. Beide krachten zijn even groot maar werken op andere objecten.'},
{v:'Wat is kinetische energie?',o:['De energie die een voorwerp heeft door zijn beweging: Ek = half maal m maal v kwadraat','De energie door positie of hoogte','De energie die vrijkomt bij verbranding','De energie opgeslagen in chemische bindingen'],c:0,u:'Ek = half maal m maal v kwadraat. Verdubbel de snelheid: Ek verviervoudigt want het verband is kwadratisch.'},
{v:'Wat is de wet van behoud van energie?',o:['Energie kan niet worden gemaakt of vernietigd maar alleen omgezet. In gesloten systeem zonder wrijving: Ek + Ep = constant.','Energie neemt altijd toe bij elke omzetting','Kinetische energie is altijd gelijk aan potentiele energie','Energie en massa zijn altijd gelijk'],c:0,u:'Bij een vallend voorwerp daalt Ep en stijgt Ek maar de som blijft gelijk. Wrijving zet mechanische energie om in warmte.'},
{v:'Wat is het verschil tussen snelheid en versnelling?',o:['Snelheid is positieverandering per tijdseenheid (m/s). Versnelling is snelheidsverandering per tijdseenheid (m/s kwadraat).','Ze zijn identiek','Versnelling is altijd groter dan snelheid','Snelheid heeft geen eenheid'],c:0,u:'v = delta x gedeeld door delta t. a = delta v gedeeld door delta t. Een auto met constante snelheid heeft een grote v maar a = 0.'}
   ],
   oe:[
{bron:'HAVO Natuurkunde CE 2023 Tijdvak 1 Schuin vlak (geen afbeelding)',ctx:'Een skateboarder (massa 65 kg inclusief board) staat op een helling. De component van de zwaartekracht langs de helling is 320 N. De wrijvingskracht bedraagt 85 N.',v:'(a) Bereken de nettokracht langs de helling.\n(b) Bereken de versnelling.\n(c) Welke wet van Newton gebruik je bij (b)?',o:[''],c:0,u:'(a) F_netto = 320 min 85 = 235 N langs de helling omlaag.\n(b) a = F gedeeld door m = 235 gedeeld door 65 = 3,6 m/s kwadraat.\n(c) De tweede wet van Newton: F = ma.'},
{bron:'HAVO Natuurkunde CE 2022 Tijdvak 2 Achtbaan energiebehoud (geen afbeelding)',ctx:'Een achtbaan start op hoogte h1 = 40 m. Punt B is op hoogte h2 = 15 m. Massa karretje met inzittenden is 800 kg. g = 10 m/s kwadraat.',v:'(a) Bereken de snelheid in punt B via energiebehoud (verwaarloosbaar wrijving).\n(b) In werkelijkheid is de snelheid in B lager. Verklaar dit.',o:[''],c:0,u:'(a) Energiebehoud: mgh1 = mgh2 + half maal mv kwadraat geeft g(h1 min h2) = half v kwadraat geeft v = wortel(2 maal 10 maal 25) = wortel(500) = 22,4 m/s.\n(b) In werkelijkheid is er wrijving en luchtweerstand. Een deel van de mechanische energie gaat verloren als warmte, minder kinetische energie in B, lagere snelheid.'},
{bron:'HAVO Natuurkunde CE 2024 Tijdvak 1 Stopafstand (geen afbeelding)',ctx:'Een auto rijdt 20 m/s. Reactietijd bestuurder = 0,8 s. Na het remmen vertraagt de auto met 5 m/s kwadraat.',v:'(a) Bereken de reactieweg.\n(b) Bereken de remweg.\n(c) Wat is de totale stopafstand?',o:[''],c:0,u:'(a) s_reactie = v maal t = 20 maal 0,8 = 16 m.\n(b) v kwadraat = v0 kwadraat + 2as geeft 0 = 400 min 10s geeft s = 40 m.\n(c) Totaal: 16 + 40 = 56 m.'}
   ]},
  {id:'D',naam:'Lading en veld',beschrijving:'Elektrische schakelingen, Ohm, vermogen en elektromagnetische inductie',
   onderwerpen:['Elektrische lading en spanning','Wet van Ohm (U = IR)','Serie- en parallelschakelingen','Elektrisch vermogen (P = UI) en energie','Transformator (U1/U2 = n1/n2)','Elektromagnetische inductie'],
   sam:'<strong>Wet van Ohm</strong>: <span class="fm">U = I·R</span> (V = A × Ω). <strong>Vermogen</strong>: <span class="fm">P = U·I = I²R = U²/R</span> (W). Energie: E = P·t (J of kWh). 1 kWh = 3,6 MJ. <strong>Serieschakeling</strong>: stroom gelijk overal, spanningen optellen, R_tot = ΣR. <strong>Parallelschakeling</strong>: spanning gelijk overal, stromen optellen, 1/R_tot = Σ(1/R). Parallelweerstand altijd kleiner dan kleinste individuele weerstand. <strong>Transformator</strong>: <span class="fm">U₁/U₂ = n₁/n₂</span>. Verliesvrij: P₁ = P₂ → U₁I₁ = U₂I₂. Werkt op wisselstroom. <strong>Inductie (Faraday)</strong>: veranderend magneetveld induceert een spanning. Basis van generator en transformator. <strong>Transportverlies</strong>: P_verlies = I²R. Hoge spanning → kleine stroom → weinig verlies.',
   sv:[
{v:'Wat zegt de wet van Ohm?',o:['U = I maal R: de spanning is gelijk aan de stroom maal de weerstand','I = U maal R','R = U maal I','U = I gedeeld door R'],c:0,u:'Wet van Ohm: U in volt = I in ampere maal R in ohm. Meer spanning bij gelijke weerstand geeft meer stroom.'},
{v:'Wat is het verschil tussen serie- en parallelschakeling?',o:['Serie: stroom gelijk overal, spanningen tellen op. Parallel: spanning gelijk overal, stromen tellen op.','Serie: spanning gelijk; parallel: stroom gelijk','In beide is de stroom gelijk','Er is geen praktisch verschil'],c:0,u:'Serie: R_tot = som van weerstanden. Parallel: 1 gedeeld door R_tot = som van 1/R. Parallelweerstand is altijd kleiner dan de kleinste individuele weerstand.'},
{v:'Wat is elektrisch vermogen?',o:['De energie die per seconde wordt omgezet: P = U maal I in watt','De totaal verbruikte energie','De spanning maal de weerstand','De lading die per seconde stroomt'],c:0,u:'P = UI = I kwadraat R = U kwadraat gedeeld door R. Energie = P maal t in joule of kWh.'},
{v:'Hoe werkt een transformator?',o:['Wisselstroom in de primaire spoel geeft een wisselend magneetveld dat een spanning in de secundaire spoel induceert. U1/U2 = n1/n2.','Gelijkstroom wordt omgezet in wisselstroom','Spanning wordt versterkt door batterijen','De transformator werkt ook op gelijkstroom'],c:0,u:'Inductieprincipe van Faraday: veranderend magneetveld induceert spanning. Verliesvrij: P1 = P2. Werkt alleen op wisselstroom.'},
{v:'Waarom wordt elektrische energie getransporteerd op hoge spanning?',o:['P_verlies = I kwadraat maal R: hogere spanning geeft kleinere stroom en exponentieel minder warmteverlies in de kabels','Hogere spanning vermindert de kabelweerstand','Hoge spanning is eenvoudiger op te wekken','Hoge spanning beschermt huishoudelijke apparaten'],c:0,u:'P = UI: voor hetzelfde vermogen bij hoge U is I klein. Warmteverlies = I kwadraat R, dus kleine stroom geeft kwadratisch minder verlies.'}
   ],
   oe:[
{bron:'HAVO Natuurkunde CE 2023 Tijdvak 1 Energieverbruik (geen afbeelding)',ctx:'Een huishouden heeft drie apparaten:\nKoelkast: 150 W, 24 uur per dag.\nWasmachine: 2000 W, gemiddeld 1 uur per dag.\nTV: 80 W, gemiddeld 5 uur per dag.\nElektriciteitsprijs: 0,32 euro per kWh.',v:'(a) Bereken het totale dagelijkse energieverbruik in kWh.\n(b) Bereken de jaarlijkse elektriciteitskosten.',o:[''],c:0,u:'(a) Koelkast: 0,15 maal 24 = 3,6 kWh. Wasmachine: 2,0 maal 1 = 2,0 kWh. TV: 0,08 maal 5 = 0,4 kWh. Totaal: 6,0 kWh per dag.\n(b) Per jaar: 6,0 maal 365 = 2190 kWh. Kosten: 2190 maal 0,32 = 700,80 euro.'},
{bron:'HAVO Natuurkunde CE 2022 Tijdvak 2 Schakeling (geen afbeelding)',ctx:'Een schakeling heeft R1 = 30 ohm in serie met een parallelcombinatie van R2 = 20 ohm en R3 = 60 ohm. De totale spanning is 24 V.',v:'(a) Bereken de totale weerstand.\n(b) Bereken de totale stroom.\n(c) Bereken de spanning over de parallelcombinatie.',o:[''],c:0,u:'(a) R_par = (20 maal 60) gedeeld door (20 + 60) = 1200 gedeeld door 80 = 15 ohm. R_tot = 30 + 15 = 45 ohm.\n(b) I = U gedeeld door R = 24 gedeeld door 45 = 0,533 A.\n(c) U_par = I maal R_par = 0,533 maal 15 = 8,0 V.'},
{bron:'HAVO Natuurkunde CE 2024 Tijdvak 1 Transformator (geen afbeelding)',ctx:'Een transformator verlaagt de netspanning van 230 V naar 12 V. De primaire spoel heeft 1150 wikkelingen. De belasting verbruikt 36 W.',v:'(a) Bereken het aantal wikkelingen van de secundaire spoel.\n(b) Bereken de stroom in de primaire spoel (verliesvrije transformator).',o:[''],c:0,u:'(a) n1/n2 = U1/U2 geeft n2 = 1150 maal 12 gedeeld door 230 = 60 wikkelingen.\n(b) P1 = P2 = 36 W. I1 = P gedeeld door U1 = 36 gedeeld door 230 = 0,157 A.'}
   ]},
  {id:'E',naam:'Straling en materie',beschrijving:'Radioactiviteit, kernreacties en elektromagnetische straling met materie',
   onderwerpen:['Alfa-, beta- en gammastraling: eigenschappen en doordringvermogen','Radioactief verval: halveringstijd','Kernreactievergelijkingen','Ioniserende straling en gezondheid','Elektromagnetische straling en materie (fotonenergie)'],
   sam:'<strong>Alfastraling (α)</strong>: heliumkern (⁴He₂). A vermindert met 4, Z vermindert met 2. Stopt in papier. <strong>Betastraling (β⁻)</strong>: elektron. A ongewijzigd, Z stijgt met 1 (neutron → proton). Stopt in aluminium. <strong>Gammastraling (γ)</strong>: foton. A en Z ongewijzigd. Stopt in lood of beton. Doordringvermogen: α < β < γ. <strong>Radioactief verval</strong>: <span class="fm">N = N₀ · (½)^(t/T½)</span>. Na n halveringstijden is (½)ⁿ × N₀ over. <strong>Kernreactievergelijking</strong>: behoud van A (massagetal) en Z (atoomnummer). <strong>Fotonenergie</strong>: <span class="fm">E = h·f</span> (h = Planck constant 6,63×10⁻³⁴ J·s). Hogere frequentie = meer energie per foton.',
   sv:[
{v:'Wat is het verschil tussen alfa- beta- en gammastraling?',o:['Alfa is een heliumkern (A min 4, Z min 2). Beta min is een elektron (A gelijk, Z plus 1). Gamma is een foton (A en Z ongewijzigd).','Alfa heeft het hoogste doordringvermogen','Beta verandert het massagetal','Gamma verandert het atoomnummer'],c:0,u:'Doordringvermogen: alfa is het kleinst en stopt in papier. Beta stopt in aluminium. Gamma stopt in lood of beton en heeft het hoogste doordringvermogen.'},
{v:'Wat is de wet van radioactief verval?',o:['N = N0 maal (half) tot de macht (t gedeeld door T-half): exponentieel afnemend per halveringstijd','N = N0 min k maal t: lineair verval','De activiteit neemt toe in de tijd','Verval stopt na drie halveringstijden'],c:0,u:'Na 1 halveringstijd is 50% over. Na 2 is 25% over. Na n halveringstijden is (half) tot de n maal N0.'},
{v:'Bij beta-min-verval verandert het atoomnummer Z met:',o:['Z stijgt met 1: een neutron wordt omgezet in een proton plus een elektron','Z daalt met 1','Z daalt met 2','Z blijft gelijk'],c:0,u:'Beta-min verval: n geeft p plus e min plus antineutrino. Het massagetal A blijft gelijk, Z stijgt met 1.'},
{v:'Wat is de fotonenergie en hoe hangt die af van de frequentie?',o:['E = h maal f: hogere frequentie geeft meer energie per foton','E = h gedeeld door f: hogere frequentie geeft minder energie','Fotonenergie is onafhankelijk van frequentie','Fotonenergie hangt alleen af van de golflengte'],c:0,u:'E = h maal f. Hogere frequentie (kortere golflengte) geeft meer energie per foton. Gamma heeft de hoogste energie; radiogolven de laagste.'},
{v:'Waarom is ioniserende straling gevaarlijk voor levend weefsel?',o:['Ioniserende straling heeft genoeg energie om elektronen los te slaan uit atomen in cellen, waardoor DNA beschadigd kan worden','Ioniserende straling verwarmt het weefsel alleen maar','Ioniserende straling veroorzaakt alleen oppervlakkige brandwonden','Ioniserende straling werkt alleen in op dode cellen'],c:0,u:'Ioniserende straling (gamma, rontgen, alfa en beta) kan DNA in cellen beschadigen wat kan leiden tot mutaties, kanker of celdood. Alfastraling is intern het gevaarlijkst hoewel het extern weinig doordringing heeft.'}
   ],
   oe:[
{bron:'HAVO Natuurkunde CE 2023 Tijdvak 2 Radioactiviteit (geen afbeelding)',ctx:'Een radioactief preparaat heeft op t = 0 een activiteit van 3200 Bq. De halveringstijd is 5 jaar.',v:'(a) Bereken de activiteit na 15 jaar.\n(b) Schrijf de vervalfunctie A(t).\n(c) Na hoeveel jaar is de activiteit gedaald tot 100 Bq?',o:[''],c:0,u:'(a) 15 jaar = 3 halveringstijden geeft A = 3200 maal (half) tot de derde macht = 400 Bq.\n(b) A(t) = 3200 maal 0,5 tot de macht (t gedeeld door 5).\n(c) 3200 maal 0,5 tot de macht (t/5) = 100 geeft 0,5 tot de macht (t/5) = 1/32 = 0,5 tot de 5de macht geeft t/5 = 5 geeft t = 25 jaar.'},
{bron:'HAVO Natuurkunde CE 2022 Tijdvak 1 Kernreactie (geen afbeelding)',ctx:'Jodium-131 (131I, Z = 53) ondergaat beta-min verval en wordt gebruikt bij de behandeling van schildklierkanker. De halveringstijd is 8 dagen.',v:'(a) Schrijf de kernreactievergelijking.\n(b) Noem twee redenen waarom 131I geschikt is als radioactief medicijn.',o:[''],c:0,u:'(a) 131I_53 geeft 131Xe_54 plus e-1_0 (plus antineutrino). Bij beta-min: A ongewijzigd, Z stijgt met 1.\n(b) Twee uit: (1) schildklier neemt van nature jodium op, selectieve ophoping in doelgebied. (2) T-half van 8 dagen: lang genoeg voor behandeling, snel genoeg afgebroken. (3) Beta-straling heeft beperkt doordringvermogen en beschadigt voornamelijk het doelgebied.'},
{bron:'HAVO Natuurkunde CE 2024 Tijdvak 2 Warmte en straling (geen afbeelding)',ctx:'Een student wil 0,5 kg ijs bij min 10 graden C omzetten in water van 20 graden C.\nc(ijs) = 2100 J/(kg maal K), L_sm(ijs) = 334000 J/kg, c(water) = 4200 J/(kg maal K)',v:'Bereken de totale benodigde warmte in drie stappen.',o:[''],c:0,u:'Stap 1: ijs verwarmen min 10 naar 0 graden C: Q1 = 0,5 maal 2100 maal 10 = 10500 J.\nStap 2: smelten bij 0 graden C: Q2 = 0,5 maal 334000 = 167000 J.\nStap 3: water verwarmen 0 naar 20 graden C: Q3 = 0,5 maal 4200 maal 20 = 42000 J.\nTotaal: 10500 + 167000 + 42000 = 219500 J.'}
   ]}
 ]},

{id:'be',naam:'Bedrijfseconomie',code:'BE',kleur:'#14B8A6',
 beschrijving:'Persoonlijke financien, organisaties en bedrijfsprocessen op HAVO-niveau.',
 ceInfo:'CE = domein B (Van persoon naar rechtspersoon), domein C (Interne organisatie), domein D (Marketing), domein E (Financieel beleid) en domein F (Verslaggeving). Open vragen over berekening en theorie.',
 domeinen:[
  {id:'B',naam:'Van persoon naar rechtspersoon',beschrijving:'Persoonlijke financien, samenlevingsvormen en rechtsvormen van organisaties',
   onderwerpen:['Samenlevingsvormen (samenwonen, gehuwd, geregistreerd partnerschap)','Persoonlijke financiele planning (sparen, lenen, verzekeren)','Enkelvoudige en samengestelde interest','Rechtsvormen (eenmanszaak, VOF, BV, NV, stichting, vereniging)','Oprichting en beeindiging van organisaties','Continuiteit van de onderneming'],
   sam:'<strong>Samengevingsvormen</strong>: samenwoners (geen automatische rechten), gehuwden (gemeenschap van goederen of huwelijkse voorwaarden), geregistreerd partnerschap (zelfde rechten als huwelijk). <strong>Enkelvoudige interest</strong>: R = K₀ · r · t (interest alleen over hoofdsom). <strong>Samengestelde interest</strong>: <span class="fm">Kₙ = K₀ · (1+r)ⁿ</span> (interest ook over eerder verdiende interest). <strong>Rechtsvormen</strong>: Eenmanszaak (1 eigenaar, onbeperkte aansprakelijkheid), VOF (meerdere vennoten, elk onbeperkt aansprakelijk), BV (rechtspersoon, aansprakelijkheid beperkt tot ingebracht kapitaal), NV (aandelen vrij verhandelbaar, beursgenoteerd). Stichting en vereniging: geen winststreven. <strong>Rechtspersoon</strong>: zelfstandige drager van rechten en plichten (BV, NV, stichting, vereniging). <strong>Continuiteit</strong>: langetermijndoelstelling van een onderneming om blijvend te functioneren.',
   sv:[
{v:'Wat is het verschil tussen enkelvoudige en samengestelde interest?',o:['Enkelvoudig: interest alleen over de hoofdsom. Samengesteld: interest ook over eerder verdiende interest, leidt tot exponentiële groei.','Enkelvoudig is altijd hoger','Samengesteld is alleen voor korte looptijden','Er is geen verschil bij looptijd van 1 jaar'],c:0,u:'Samengesteld: Kn = K0 maal (1+r) tot de n. Over langere periodes is samengestelde interest veel hoger dan enkelvoudige.'},
{v:'Wat is het kenmerk van een BV als rechtsvorm?',o:['Beperkte aansprakelijkheid: aandeelhouders zijn alleen aansprakelijk voor hun ingebracht kapitaal. De BV is een rechtspersoon.','Onbeperkte aansprakelijkheid van de eigenaren','Aandelen zijn vrij verhandelbaar op de beurs','Er zijn minimaal 10 aandeelhouders vereist'],c:0,u:'BV is een rechtspersoon met beperkte aansprakelijkheid. Aandeelhouders kunnen maximaal hun inleg verliezen. Aandelen zijn niet vrij overdraagbaar (tegenstelling met NV).'},
